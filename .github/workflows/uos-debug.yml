            'else' \
            '    echo "❌ 找不到 VSCode 可执行文件！"' \
            '    exit 1' \
            'fi' \
            '' \
            'exec "$EXEC" \' \
            '  --no-sandbox \' \
            '  --disable-gpu-sandbox \' \
            '  --disable-software-rasterizer \' \
            '  --disable-gpu \' \
            '  --user-data-dir="$SCRIPT_DIR/user-data" \' \
            '  "$@"' > "$REAL_EXEC"

          chmod +x "$REAL_EXEC"

          printf '%s\n' '#!/bin/bash' \
            'SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"' \
            '' \
            'export ELECTRON_ENABLE_GPU=0' \
            'export LIBGL_ALWAYS_SOFTWARE=1' \
            'export NODE_OPTIONS="--max-old-space-size=4096"' \
            'export ELECTRON_DISABLE_SANDBOX=1' \
            'export GDK_BACKEND=x11' \
            'export QT_QPA_PLATFORM=xcb' \
            'export DISPLAY=:0' \
            'export ELECTRON_DISABLE_CRASH_REPORTER=1' \
            'export ELECTRON_DISABLE_CRASH_REPORTING=1' \
            'export CRASHPAD_DISABLE=1' \
            '' \
            'if [ -f "$SCRIPT_DIR/tscode.real" ]; then' \
            '    EXEC="$SCRIPT_DIR/tscode.real"' \
            'elif [ -f "$SCRIPT_DIR/bin/tscode.real" ]; then' \
            '    EXEC="$SCRIPT_DIR/bin/tscode.real"' \
            'else' \
            '    echo "❌ 找不到 VSCode 可执行文件！"' \
            '    exit 1' \
            'fi' \
            '' \
            'echo "=== VSCode for UOS ==="' \
            'exec "$EXEC" \' \
            '  --no-sandbox \' \
            '  --disable-gpu-sandbox \' \
            '  --disable-software-rasterizer \' \
            '  --disable-gpu \' \
            '  --user-data-dir="$SCRIPT_DIR/user-data" \' \
            '  "$@"' > start-vscode.sh

          chmod +x start-vscode.sh

          printf '%s\n' '[Desktop Entry]' \
            'Version=1.0' \
            'Type=Application' \
            'Name=VSCode for UOS' \
            'Comment=Visual Studio Code for UOS with built-in OpenCode AI' \
            'Exec=./tscode %F' \
            'Icon=./resources/app/resources/linux/code.png' \
            'Terminal=false' \
            'Categories=Development;IDE;' \
            'MimeType=text/plain;inode/directory;' \
            'StartupNotify=true' \
            'StartupWMClass=Code' > vscode-uos.desktop

          if [ -d "./opencode" ]; then
            printf '%s\n' '[Desktop Entry]' \
              'Version=1.0' \
              'Type=Application' \
              'Name=OpenCode AI' \
              'Comment=OpenCode AI Assistant (Built-in)' \
              'Exec=./opencode-server' \
              'Icon=./resources/app/resources/linux/code.png' \
              'Terminal=true' \
              'Categories=Development;AI;' \
              'StartupNotify=true' > opencode-uos.desktop
          fi

          cat > 使用说明.txt << 'EOF'
          ==========================================
          VSCode for UOS - 使用说明
          ==========================================

          🖱️ 双击运行：
          直接双击 tscode 文件即可启动 VSCode！

          🤖 OpenCode AI（内置）：
          • Ctrl+Shift+I : 快速提问
