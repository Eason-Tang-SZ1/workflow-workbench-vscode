          echo "📁 打包目录: $BUILD_DIR"
          echo "📦 包名: $PACKAGE_NAME"

          tar -czf "${PACKAGE_NAME}.tar.gz" \
            --preserve-permissions \
            -C "$(dirname "$BUILD_DIR")" \
            "$(basename "$BUILD_DIR")"

