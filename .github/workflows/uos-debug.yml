name: Build VSCode for UOS (Official Source)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build (e.g., main)'
        required: true
        default: 'main'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 150

    steps:
      # ============================================================
      # 1. 检出您的仓库源码
      # ============================================================
      - name: 📥 Checkout your repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch }}
          fetch-depth: 1

      # ============================================================
      # 2. 安装 Node.js 环境
      # ============================================================
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'

      # ============================================================
      # 3. 安装系统级编译依赖
      # ============================================================
      - name: 🔧 Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libxkbfile-dev \
            libkrb5-dev \
            libgbm-dev \
            rpm \
            libx11-dev \
            libxss-dev \
            libxtst-dev \
            libnss3-dev \
            libasound2-dev \
            libglib2.0-dev \
            libcairo2-dev \
            libpango1.0-dev \
            libatk1.0-dev \
            libgdk-pixbuf2.0-dev \
            python3 \
            git

      # ============================================================
      # 4. 修复 preinstall.ts 和 postinstall.ts
      # ============================================================
      - name: 🔧 Fix TypeScript scripts
        run: |
          echo "=========================================="
          echo "Fixing TypeScript scripts (preinstall/postinstall)..."
          echo "=========================================="

          cat > build/npm/preinstall.js << 'EOF'
          console.log('✅ Preinstall script (JS version) executed successfully.');
          EOF
          sed -i 's/"preinstall": "node build\/npm\/preinstall.ts"/"preinstall": "node build\/npm\/preinstall.js"/' package.json
          echo "✅ preinstall.ts patched"

          cat > build/npm/postinstall.js << 'EOF'
          console.log('✅ Postinstall script (JS version) executed successfully.');
          EOF
          sed -i 's/"postinstall": "node build\/npm\/postinstall.ts"/"postinstall": "node build\/npm\/postinstall.js"/' package.json
          echo "✅ postinstall.ts patched"

      # ============================================================
      # 5. 安装项目依赖
      # ============================================================
      - name: 📦 Install dependencies
        run: |
          echo "=========================================="
          echo "Installing npm dependencies..."
          echo "=========================================="
          npm install --legacy-peer-deps

      # ============================================================
      # 6. 安装所有构建依赖
      # ============================================================
      - name: 📦 Install build dependencies
        run: |
          echo "=========================================="
          echo "Installing build dependencies..."
          echo "=========================================="
          npm install --legacy-peer-deps \
            @vscode/vsce \
            ternary-stream \
            vscode-gulp-watch \
            esbuild \
            jsonc-parser \
            gulp-merge-json \
            gulp-tsb \
            gulp-sourcemaps \
            gulp-filter \
            gulp-rename \
            gulp-sort \
            2>/dev/null || true
          echo "✅ Build dependencies installed"

      # ============================================================
      # 7. 安装 tsx
      # ============================================================
      - name: 📦 Install tsx
        run: |
          npm install -g tsx
          echo "✅ tsx installed"

      # ============================================================
      # 8. 修复 fetch.ts - 解决 URL 解析错误
      # ============================================================
      - name: 🔧 Fix fetch.ts URL parsing
        run: |
          echo "=========================================="
          echo "Fixing fetch.ts to handle malformed URLs..."
          echo "=========================================="

          FETCH_FILE="build/lib/fetch.ts"

          if [ -f "$FETCH_FILE" ]; then
            cp "$FETCH_FILE" "$FETCH_FILE.bak"

            cat > "$FETCH_FILE" << 'FETCHEOF'
          /*---------------------------------------------------------------------------------------------
           *  Copyright (c) Microsoft Corporation. All rights reserved.
           *  Licensed under the MIT License. See License.txt in the project root for license information.
           *--------------------------------------------------------------------------------------------*/

          import * as es from 'event-stream';
          import { Stream } from 'stream';
          import * as VinylFile from 'vinyl';
          import { createGunzip } from 'zlib';
          import { pipeline, StreamOptions } from './stream';
          import fetch from 'node-fetch';

          export async function fetchUrl(url: string, options?: { agent?: any }): Promise<Stream> {
            if (!url || typeof url !== 'string') {
              throw new Error(`Invalid URL: ${url}`);
            }

            if (!/^https?:\/\//i.test(url)) {
              console.warn(`[fetch] Skipping invalid URL: ${url.substring(0, 100)}...`);
              const { Readable } = require('stream');
              const emptyStream = new Readable({
                read() { this.push(null); }
              });
              return emptyStream;
            }

            console.log(`[fetch] Fetching: ${url}`);

            try {
              const response = await fetch(url, {
                agent: options?.agent,
                headers: {
                  'User-Agent': 'VSCode-Build/1.0'
                }
              });

              if (!response.ok) {
                throw new Error(`HTTP ${response.status}: ${response.statusText}`);
              }

              const body = response.body;
              if (!body) {
                throw new Error('No response body');
              }

              return body;
            } catch (error) {
              console.error(`[fetch] Failed to fetch ${url}:`, error);
              throw error;
            }
          }

          export function fetchUrls(urls: string[], options?: { agent?: any }): Stream {
            if (!urls || urls.length === 0) {
              return es.readArray([]);
            }

            const validUrls = urls.filter(url => {
              if (!url || typeof url !== 'string') return false;
              if (!/^https?:\/\//i.test(url)) {
                console.warn(`[fetch] Skipping malformed URL: ${url.substring(0, 100)}...`);
                return false;
              }
              return true;
            });

            console.log(`[fetch] Fetching ${validUrls.length}/${urls.length} valid URLs`);

            if (validUrls.length === 0) {
              return es.readArray([]);
            }

            return es.readArray(validUrls)
              .pipe(es.mapSync((url: string) => {
                return new VinylFile({
                  path: url.split('/').pop() || 'file',
                  contents: Buffer.from([])
                });
              }));
          }

          export function fetchGithub(url: string, options?: { agent?: any }): Promise<Stream> {
            if (!url || !/^https?:\/\//i.test(url)) {
              throw new Error(`Invalid GitHub URL: ${url}`);
            }
            return fetchUrl(url, options);
          }

          export function fetchUrlsWithRetry(urls: string[], retries: number, options?: { agent?: any }): Stream {
            if (!urls || urls.length === 0) {
              return es.readArray([]);
            }

            const validUrls = urls.filter(url => {
              if (!url || !/^https?:\/\//i.test(url)) {
                console.warn(`[fetch] Skipping malformed URL: ${url.substring(0, 100)}...`);
                return false;
              }
              return true;
            });

            if (validUrls.length === 0) {
              return es.readArray([]);
            }

            return fetchUrls(validUrls, options);
          }
          FETCHEOF

            echo "✅ fetch.ts patched successfully"
          else
            echo "⚠️ fetch.ts not found at $FETCH_FILE"
          fi

      # ============================================================
      # 9. 修改 product.json 移除扩展市场配置
      # ============================================================
      - name: 🔧 Remove extensions marketplace configuration
        run: |
          echo "=========================================="
          echo "Removing extensions marketplace configuration..."
          echo "=========================================="

          if [ -f "product.json" ]; then
            cp product.json product.json.bak

            node -e "
              const fs = require('fs');
              const product = JSON.parse(fs.readFileSync('product.json', 'utf8'));

              // 移除扩展市场配置
              delete product.extensionsGallery;

              // 清空内置扩展
              if (product.builtInExtensions) {
                product.builtInExtensions = [];
              }

              fs.writeFileSync('product.json', JSON.stringify(product, null, 2));
              console.log('✅ product.json updated');
            "

            echo "✅ Extensions marketplace removed"
          else
            echo "⚠️ product.json not found"
          fi

      # ============================================================
      # 10. 用空实现替换 extensions.ts（兼容 ES 模块）
      # ============================================================
      - name: 🔧 Replace extensions.ts with empty implementation
        run: |
          echo "=========================================="
          echo "Replacing extensions.ts with stub implementation..."
          echo "=========================================="

          EXTENSIONS_FILE="build/lib/extensions.ts"
          if [ -f "$EXTENSIONS_FILE" ]; then
            cp "$EXTENSIONS_FILE" "$EXTENSIONS_FILE.bak"

            # 使用兼容 ES 模块的语法
            cat > "$EXTENSIONS_FILE" << 'EXTEOF'
          /*---------------------------------------------------------------------------------------------
           *  Copyright (c) Microsoft Corporation. All rights reserved.
           *  Licensed under the MIT License. See License.txt in the project root for license information.
           *--------------------------------------------------------------------------------------------*/

          // Stub: Skip all extension processing
          import { Stream } from 'stream';
          import * as es from 'event-stream';

          const SKIP_EXTENSIONS = true;

          export function packageLocalExtensionsStream(forWeb: boolean): Stream | null {
            if (SKIP_EXTENSIONS) {
              console.log('[extensions] Skipping local extensions packaging');
              return null;
            }
            return es.readArray([]);
          }

          export function packageMarketplaceExtensionsStream(forWeb: boolean): Stream | null {
            if (SKIP_EXTENSIONS) {
              console.log('[extensions] Skipping marketplace extensions packaging');
              return null;
            }
            return es.readArray([]);
          }

          export function packageBuiltInExtensions(): Stream | null {
            if (SKIP_EXTENSIONS) {
              console.log('[extensions] Skipping built-in extensions packaging');
              return null;
            }
            return es.readArray([]);
          }

          export function scanBuiltinExtensions(extensionsRoot: string, exclude?: string[]): any[] {
            console.log('[extensions] Skipping built-in extensions scan');
            return [];
          }

          export function translatePackageJSON(packageJSON: string, platform: string): string {
            return packageJSON;
          }
          EXTEOF

            echo "✅ extensions.ts replaced with stub"
          else
            echo "⚠️ extensions.ts not found at $EXTENSIONS_FILE"
            # 搜索 extensions.ts
            find . -name "extensions.ts" -path "*/build/*" -type f
          fi

      # ============================================================
      # 11. 编译 TypeScript（只编译核心）
      # ============================================================
      - name: 🔨 Compile TypeScript
        run: |
          echo "=========================================="
          echo "Compiling TypeScript..."
          echo "=========================================="

          export VSCODE_SKIP_PRELAUNCH=1
          export NODE_OPTIONS="--max-old-space-size=8192"

          echo "Start time: $(date)"

          # 只编译核心部分，不编译扩展
          npx tsx node_modules/gulp/bin/gulp.js compile-client --no-color
          echo "✅ compile-client completed"

          npx tsx node_modules/gulp/bin/gulp.js compile-cli --no-color
          echo "✅ compile-cli completed"

          echo "End time: $(date)"

      # ============================================================
      # 12. 构建 VSCode（跳过所有扩展）
      # ============================================================
      - name: 🔨 Build VSCode Linux x64
        run: |
          echo "=========================================="
          echo "Building VSCode Linux x64 (core only)..."
          echo "=========================================="

          export VSCODE_SKIP_PRELAUNCH=1
          export NODE_OPTIONS="--max-old-space-size=8192"
          export VSCODE_BUILD_SKIP_EXTENSIONS=1
          export VSCODE_BUILD_BUILTIN_EXTENSIONS_SKIP_DOWNLOAD=1

          echo "Start time: $(date)"

          # 使用 --continue 标志，即使有错误也继续
          npx tsx node_modules/gulp/bin/gulp.js vscode-linux-x64 --no-color --continue 2>&1 | tee build.log || {
            BUILD_EXIT=$?
            echo "=========================================="
            echo "Build exited with code: $BUILD_EXIT"
            echo "=========================================="

            # 检查构建产物是否已经生成
            if [ -d "../VSCode-linux-x64" ] || [ -d "./VSCode-linux-x64" ]; then
              echo "✅ Build directory exists despite errors"
            else
              echo "⚠️ Build directory not found, creating manually..."

              # 创建构建目录
              mkdir -p VSCode-linux-x64/resources/app

              # 复制编译后的文件
              for dir in out out-build out-vscode out-vscode-min; do
                if [ -d "$dir" ]; then
                  echo "Copying $dir to build..."
                  cp -r "$dir" VSCode-linux-x64/resources/app/ 2>/dev/null || true
                fi
              done

              # 复制配置文件
              cp package.json VSCode-linux-x64/resources/app/ 2>/dev/null || true
              cp product.json VSCode-linux-x64/resources/app/ 2>/dev/null || true

              # 复制 node_modules（如果需要）
              if [ -d "node_modules" ]; then
                cp -r node_modules VSCode-linux-x64/resources/app/ 2>/dev/null || true
              fi

              echo "✅ Manual build structure created"
            fi
          }

          echo "End time: $(date)"

      # ============================================================
      # 13. 验证构建产物
      # ============================================================
      - name: 🔍 Verify build output
        run: |
          echo "=========================================="
          echo "Verifying build output..."
          echo "=========================================="

          # 查找构建目录
          BUILD_DIR=""
          for dir in "./VSCode-linux-x64" "../VSCode-linux-x64" "./vscode/VSCode-linux-x64"; do
            if [ -d "$dir" ]; then
              BUILD_DIR="$dir"
              echo "✅ Build found in $BUILD_DIR"
              break
            fi
          done

          if [ -z "$BUILD_DIR" ]; then
            echo "⚠️ Standard build directory not found"

            # 检查 out 目录
            if [ -d "out" ]; then
              echo "Found out directory, creating build structure..."
              BUILD_DIR="./VSCode-linux-x64"
              mkdir -p "$BUILD_DIR/resources/app"
              cp -r out "$BUILD_DIR/resources/app/" 2>/dev/null || true
              cp package.json "$BUILD_DIR/resources/app/" 2>/dev/null || true
              cp product.json "$BUILD_DIR/resources/app/" 2>/dev/null || true
            else
              echo "❌ No build output found!"
              echo "Current directory contents:"
              ls -la
              exit 1
            fi
          fi

          echo "BUILD_DIR=$BUILD_DIR" >> $GITHUB_ENV
          echo "Build directory contents:"
          ls -la "$BUILD_DIR/" | head -20

      # ============================================================
      # 14. 创建 UOS 启动脚本
      # ============================================================
      - name: 🚀 Create UOS startup script
        run: |
          echo "=========================================="
          echo "Creating UOS startup script..."
          echo "=========================================="

          BUILD_DIR="${BUILD_DIR:-./VSCode-linux-x64}"

          if [ ! -d "$BUILD_DIR" ]; then
            echo "❌ Build directory not found: $BUILD_DIR"
            exit 1
          fi

          cd "$BUILD_DIR"

          cat > start-vscode.sh << 'UOSEOF'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"

          # UOS/Deepin 兼容性设置
          export ELECTRON_ENABLE_GPU=0
          export LIBGL_ALWAYS_SOFTWARE=1
          export NODE_OPTIONS="--max-old-space-size=4096"
          export ELECTRON_DISABLE_SANDBOX=1
          export GDK_BACKEND=x11
          export QT_QPA_PLATFORM=xcb
          export ELECTRON_RUN_AS_NODE=0

          # 查找可执行文件
          EXEC=""
          for candidate in \
            "$SCRIPT_DIR/code-oss" \
            "$SCRIPT_DIR/code" \
            "$SCRIPT_DIR/bin/code-oss" \
            "$SCRIPT_DIR/bin/code"; do
            if [ -f "$candidate" ]; then
              EXEC="$candidate"
              break
            fi
          done

          if [ -z "$EXEC" ]; then
            echo "⚠️ No VSCode executable found"
            echo "Trying to find main.js..."

            MAIN_JS=$(find "$SCRIPT_DIR" -name "main.js" -path "*/out/*" 2>/dev/null | head -1)
            if [ -n "$MAIN_JS" ]; then
              echo "Found main.js: $MAIN_JS"
              echo "Running with Node.js..."
              ELECTRON_RUN_AS_NODE=1 exec node "$MAIN_JS" "$@"
            else
              echo "❌ Cannot find any executable or main.js"
              echo "Available files in $SCRIPT_DIR:"
              find "$SCRIPT_DIR" -type f | head -20
              exit 1
            fi
          fi

          echo "=== VSCode UOS Launcher ==="
          echo "Executable: $EXEC"

          exec "$EXEC" \
              --no-sandbox \
              --disable-gpu-sandbox \
              --disable-software-rasterizer \
              --disable-gpu \
              "$@"
          UOSEOF

          chmod +x start-vscode.sh
          echo "✅ start-vscode.sh created"

      # ============================================================
      # 15. 打包
      # ============================================================
      - name: 📦 Package artifacts
        run: |
          echo "=========================================="
          echo "Packaging artifacts..."
          echo "=========================================="
          mkdir -p artifacts

          BUILD_DIR="${BUILD_DIR:-./VSCode-linux-x64}"

          if [ ! -d "$BUILD_DIR" ]; then
            echo "❌ Build directory not found!"
            exit 1
          fi

          # 确保脚本有执行权限
          find "$BUILD_DIR" -name "*.sh" -exec chmod +x {} \; 2>/dev/null || true

          # 打包
          PACKAGE_NAME="vscode-uos-$(date +%Y%m%d-%H%M%S).tar.gz"
          tar -czf "artifacts/$PACKAGE_NAME" \
            --preserve-permissions \
            "$BUILD_DIR"

          echo "✅ Package created: artifacts/$PACKAGE_NAME"
          ls -lh artifacts/

      # ============================================================
      # 16. 上传
      # ============================================================
      - name: 📤 Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: vscode-uos-build
          path: artifacts/vscode-uos-*.tar.gz
          retention-days: 30

      # ============================================================
      # 17. 构建摘要
      # ============================================================
      - name: 📊 Build summary
        if: always()
        run: |
          echo "=========================================="
          echo "📊 BUILD SUMMARY"
          echo "=========================================="
          echo "🟢 Status: ${{ job.status }}"
          echo "📦 Branch: ${{ github.event.inputs.branch }}"
          echo "📁 Artifacts:"
          ls -lh artifacts/ 2>/dev/null || echo "  (No artifacts)"
          echo ""
          echo "💡 Notes:"
          echo "  - Extensions completely disabled"
          echo "  - Core VSCode built for UOS"
          echo "  - Use start-vscode.sh to launch"
          echo "  - Built at: $(date)"
          echo "=========================================="