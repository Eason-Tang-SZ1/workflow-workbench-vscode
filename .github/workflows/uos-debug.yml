# ============================================================
# 7. 核心修复：修改 build/next/index.ts 使其可被 Node.js 执行
# ============================================================
- name: 🔧 Fix build/next/index.ts for Node.js
  run: |
    echo "Fixing build/next/index.ts for Node.js execution..."

    # 1. 首先，将文件扩展名改为 .mjs，这告诉 Node.js 它应该被当作 ES Module 处理
    mv build/next/index.ts build/next/index.mjs

    # 2. 关键步骤：修改文件内的导入语句，为所有本地 .ts 文件添加 .mjs 扩展名。
    #    因为当 Node.js 加载 ESM 模块时，需要完整的文件路径。
    #    使用 sed 命令进行替换：
    #    将 from './something.ts' 替换为 from './something.mjs'
    sed -i "s/from '\.\/\(.*\)\.ts'/from '.\/\1.mjs'/g" build/next/index.mjs
    #    同样处理双引号的情况
    sed -i 's/from "\.\/\(.*\)\.ts"/from ".\/\1.mjs"/g' build/next/index.mjs

    # 3. 最后，更新 gulpfile.vscode.ts，让它的任务去执行这个新的 .mjs 文件
    sed -i 's|build/next/index.ts|build/next/index.mjs|g' build/gulpfile.vscode.ts

    echo "✅ build/next/index.ts has been converted to index.mjs and references updated."
