name: Build Custom VSCode for UOS (Double-click)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: true
        default: 'main'
      version:
        description: 'Package version'
        required: false
        default: '1.116.0'
      include_opencode:
        description: 'Include OpenCode AI'
        required: false
        default: 'true'
        type: boolean
      extensions:
        description: 'Extensions to bundle (comma separated)'
        required: false
        default: 'ms-python.python,ms-vscode.vscode-typescript-next,esbenp.prettier-vscode,ms-vscode.vscode-json,ms-vscode.vscode-js-profile-flame,redhat.vscode-yaml,ms-vscode.makefile-tools,ms-vscode.cpptools'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch }}
          fetch-depth: 1

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'

      - name: 🔧 Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config libgtk-3-dev libxkbfile-dev \
            libkrb5-dev libgbm-dev rpm libx11-dev libxss-dev libxtst-dev \
            libnss3-dev libasound2-dev libglib2.0-dev libcairo2-dev \
            libpango1.0-dev libatk1.0-dev libgdk-pixbuf2.0-dev \
            python3 git wget curl unzip

      - name: 🔧 Fix TypeScript scripts
        run: |
          echo 'console.log("✅ Preinstall OK");' > build/npm/preinstall.js
          sed -i 's/"preinstall": "node build\/npm\/preinstall.ts"/"preinstall": "node build\/npm\/preinstall.js"/' package.json
          echo 'console.log("✅ Postinstall OK");' > build/npm/postinstall.js
          sed -i 's/"postinstall": "node build\/npm\/postinstall.ts"/"postinstall": "node build\/npm\/postinstall.js"/' package.json

      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 📦 Install build tools
        run: |
          npm install -g tsx
          npm install --legacy-peer-deps \
            ternary-stream vscode-gulp-watch esbuild jsonc-parser \
            gulp-merge-json gulp-tsb gulp-sourcemaps gulp-filter \
            gulp-rename gulp-sort 2>/dev/null || true

      - name: 🔧 Fix extensions.ts
        run: |
          cat > build/lib/extensions.ts << 'EOF'
          import { Stream } from "stream";
          const empty: any[] = [];
          function emptyStream(): Stream {
            const s = new Stream.Readable();
            s._read = () => s.push(null);
            return s;
          }
          export function isWebExtension(): boolean { return false; }
          export function getExtensionStream(): Stream { return emptyStream(); }
          export function getExtensionDownloadStream(): Stream { return emptyStream(); }
          export function packageMarketplaceExtensionsStream(): Stream { return emptyStream(); }
          export function packageNativeLocalExtensionsStream(): Stream { return emptyStream(); }
          export function packageNonNativeLocalExtensionsStream(): Stream { return emptyStream(); }
          export function packageLocalExtensionsStream(): Stream { return emptyStream(); }
          export function packageExtensionsStream(): Stream { return emptyStream(); }
          export function packageCopilotExtensionStream(): Stream { return emptyStream(); }
          export function packageCopilotChatExtensionStream(): Stream { return emptyStream(); }
          export function packageCopilotAgentsExtensionStream(): Stream { return emptyStream(); }
          export function fromMarketplace(): any[] { return empty; }
          export async function fetchUrls(urls: string[], options: any): Promise<void> {
            console.log("⚠️ fetchUrls: disabled");
            return Promise.resolve();
          }
          export function buildExtensionMedia(): void {}
          export function compileExtensionMedia(): void {}
          export function buildExtensionMediaTask(done: any): void { done(); }
          export const builtInExtensions = empty;
          export const shouldDownloadBuiltInExtensions = false;
          export const webBuiltInExtensions = empty;
          export const shouldDownloadWebBuiltInExtensions = false;
          EOF
          echo 'export const builtInExtensions: any[] = [];
          export const shouldDownloadBuiltInExtensions = false;
          export const webBuiltInExtensions: any[] = [];
          export const shouldDownloadWebBuiltInExtensions = false;' > build/lib/builtInExtensions.ts
          echo 'import { Stream } from "stream";
          export async function fetchUrls(urls: string[], options: any): Promise<void> {
            console.log("⚠️ fetchUrls: disabled");
            return Promise.resolve();
          }' > build/lib/fetch.ts

      - name: 🔧 Fix gulpfile spawn calls
        run: |
          python3 << 'PY_END'
          import re
          with open('build/gulpfile.vscode.ts', 'r') as f:
              content = f.read()
          content = re.sub(r"spawn\('node'", "spawn('tsx'", content)
          content = re.sub(r'spawn\("node"', 'spawn("tsx"', content)
          content = re.sub(r"spawn\(process\.execPath", "spawn('tsx'", content)
          with open('build/gulpfile.vscode.ts', 'w') as f:
              f.write(content)
          print("✅ spawn calls fixed")
          PY_END

      - name: 🔧 Replace copilot.ts
        run: |
          cat > build/lib/copilot.ts << 'EOF'
          export async function prepareBuiltInCopilotExtensionShims(extRoot: string): Promise<void> {
              console.log('⚠️ Copilot extension shims preparation skipped for UOS build');
              return;
          }
          export function copyCopilotNativeDeps(productRoot: string): void {
              console.log('⚠️ Copilot native deps copy skipped for UOS build');
          }
          export function getCopilotExcludeFilter(): any {
              return function() { return false; };
          }
          EOF

      - name: 🔧 Fix main.ts and disable Crashpad
        run: |
          echo "=========================================="
          echo "🔧 修复 src/main.ts 并禁用 Crashpad"
          echo "=========================================="

          if [ -f "src/main.ts" ]; then
            git checkout src/main.ts 2>/dev/null || echo "⚠️ git checkout 失败"
          else
            echo "⚠️ src/main.ts 不存在，跳过"
          fi

          python3 << 'PY_JSON_END'
          import json
          import os
          if os.path.exists('product.json'):
              with open('product.json', 'r') as f:
                  data = json.load(f)
              data['enableCrashReport'] = False
              if 'crashReporter' not in data:
                  data['crashReporter'] = {}
              data['crashReporter']['disabled'] = True
              with open('product.json', 'w') as f:
                  json.dump(data, f, indent=2)
              print("✅ product.json 已修改")
          PY_JSON_END

          mkdir -p src/vs/platform/crash/common
          cat > src/vs/platform/crash/common/crashService.ts << 'CRASH_EOF'
          /*---------------------------------------------------------------------------------------------
           *  Copyright (c) Microsoft Corporation. All rights reserved.
           *  Licensed under the MIT License. See License.txt in the project root for license information.
           *--------------------------------------------------------------------------------------------*/
          // DISABLED: Crash service for UOS build
          import { createDecorator } from '../../../base/common/instantiation.js';
          export const ICrashService = createDecorator<ICrashService>('crashService');
          export interface ICrashService { _serviceBrand: undefined; }
          export class CrashService implements ICrashService {
              declare readonly _serviceBrand: undefined;
              constructor() { console.log('⚠️ Crash service disabled for UOS build'); }
          }
          CRASH_EOF
          echo "✅ crashService.ts 已创建"

          if [ -f "src/vs/workbench/electron-main/electron-main.ts" ]; then
            sed -i '/crashReporter\.start/s/^/\/\/ DISABLED: /' src/vs/workbench/electron-main/electron-main.ts
            echo "✅ electron-main.ts 已修改"
          fi

          echo "✅ 修复完成"

      - name: ⚙️ Set env
        run: |
          echo "VSCODE_SKIP_BUILTIN_EXTENSION_DOWNLOAD=1" >> $GITHUB_ENV
          echo "VSCODE_ELECTRON_SKIP_DOWNLOAD=1" >> $GITHUB_ENV
          echo "VSCODE_SKIP_PRELAUNCH=1" >> $GITHUB_ENV
          echo "VSCODE_SKIP_BUNDLED_EXTENSIONS=1" >> $GITHUB_ENV
          echo "ELECTRON_DISABLE_CRASH_REPORTER=1" >> $GITHUB_ENV
          echo "ELECTRON_DISABLE_CRASH_REPORTING=1" >> $GITHUB_ENV

      - name: 🔨 Build VSCode
        run: |
          export NODE_OPTIONS="--max-old-space-size=8192"
          export VSCODE_SKIP_BUILTIN_EXTENSION_DOWNLOAD=1
          export VSCODE_ELECTRON_SKIP_DOWNLOAD=1
          export VSCODE_SKIP_PRELAUNCH=1
          export VSCODE_SKIP_BUNDLED_EXTENSIONS=1
          export ELECTRON_DISABLE_CRASH_REPORTER=1
          export ELECTRON_DISABLE_CRASH_REPORTING=1
          echo "Start: $(date)"
          npx tsx node_modules/gulp/bin/gulp.js vscode-linux-x64-min --no-color
          echo "Done: $(date)"

      - name: 🔍 Verify
        run: |
          BUILD_DIR=""
          for dir in "./VSCode-linux-x64" "./vscode/VSCode-linux-x64" "../VSCode-linux-x64"; do
            if [ -d "$dir" ]; then
              BUILD_DIR="$dir"
              echo "✅ Build found at: $BUILD_DIR"
              break
            fi
          done
          if [ -z "$BUILD_DIR" ]; then
            echo "❌ Build not found!"
            exit 1
          fi
          echo "BUILD_DIR=$BUILD_DIR" >> $GITHUB_ENV

      - name: 📦 Download and bundle extensions
        run: |
          BUILD_DIR="${BUILD_DIR:-./VSCode-linux-x64}"
          EXTENSIONS="${{ github.event.inputs.extensions }}"

          echo "=========================================="
          echo "📦 下载并打包插件"
          echo "=========================================="

          mkdir -p "$BUILD_DIR/extensions"

          IFS=',' read -ra EXT_LIST <<< "$EXTENSIONS"

          cat > download_extensions.py << 'PYEXTEOF'
          import os
          import json
          import subprocess
          import sys
          import urllib.request
          import urllib.parse
          import zipfile
          import shutil
          from pathlib import Path

          def get_extension_info(ext_id):
              try:
                  parts = ext_id.split('.')
                  if len(parts) < 2:
                      return None

                  publisher = parts[0]
                  extension = '.'.join(parts[1:])

                  url = f"https://marketplace.visualstudio.com/_apis/public/gallery/publishers/{publisher}/extensions/{extension}/latest"
                  req = urllib.request.Request(url, headers={'Content-Type': 'application/json'})

                  with urllib.request.urlopen(req, timeout=30) as response:
                      data = json.loads(response.read().decode('utf-8'))
                      if 'versions' in data and len(data['versions']) > 0:
                          latest = data['versions'][0]
                          return {
                              'id': ext_id,
                              'publisher': publisher,
                              'extension': extension,
                              'version': latest.get('version', 'latest'),
                              'download_url': latest.get('files', [{}])[0].get('downloadUrl', '')
                          }
              except Exception as e:
                  print(f"⚠️ 获取插件信息失败 {ext_id}: {e}", file=sys.stderr)
                  return None

              return None

          def download_extension(ext_info, target_dir):
              if not ext_info or not ext_info.get('download_url'):
                  return False

              ext_id = ext_info['id']
              ext_dir = os.path.join(target_dir, ext_id)

              os.makedirs(ext_dir, exist_ok=True)

              vsix_file = os.path.join(ext_dir, f"{ext_id}.vsix")
              try:
                  print(f"📥 下载插件: {ext_id}")
                  urllib.request.urlretrieve(ext_info['download_url'], vsix_file)

                  print(f"📦 解压插件: {ext_id}")
                  with zipfile.ZipFile(vsix_file, 'r') as zip_ref:
                      zip_ref.extractall(ext_dir)

                  os.remove(vsix_file)

                  package_json = {
                      "name": ext_info['extension'],
                      "publisher": ext_info['publisher'],
                      "version": ext_info['version'],
                      "engines": {"vscode": "^1.116.0"}
                  }

                  pkg_path = os.path.join(ext_dir, "package.json")
                  if not os.path.exists(pkg_path):
                      with open(pkg_path, 'w') as f:
                          json.dump(package_json, f, indent=2)

                  print(f"✅ 插件下载完成: {ext_id}")
                  return True

              except Exception as e:
                  print(f"❌ 下载插件失败 {ext_id}: {e}", file=sys.stderr)
                  return False

          if __name__ == "__main__":
              extensions = sys.argv[1].split(',') if len(sys.argv) > 1 else []
              target_dir = sys.argv[2] if len(sys.argv) > 2 else "./extensions"

              for ext in extensions:
                  ext = ext.strip()
                  if not ext:
                      continue

                  info = get_extension_info(ext)
                  if info:
                      download_extension(info, target_dir)
                  else:
                      print(f"⚠️ 跳过无法识别的插件: {ext}")
          PYEXTEOF

          python3 download_extensions.py "$EXTENSIONS" "$BUILD_DIR/extensions"

          echo "[" > "$BUILD_DIR/extensions/extensions.json"
          FIRST=true
          for ext in "${EXT_LIST[@]}"; do
            ext=$(echo "$ext" | xargs)
            if [ ! -z "$ext" ]; then
              if [ "$FIRST" = true ]; then
                FIRST=false
              else
                echo "," >> "$BUILD_DIR/extensions/extensions.json"
              fi
              echo "  {\"identifier\": {\"id\": \"$ext\"}, \"version\": \"1.0.0\", \"location\": \"./$ext\", \"relativeLocation\": \"./$ext\"}" >> "$BUILD_DIR/extensions/extensions.json"
            fi
          done
          echo "]" >> "$BUILD_DIR/extensions/extensions.json"

          echo "✅ 插件打包完成"

      - name: 🤖 Install and configure OpenCode
        if: github.event.inputs.include_opencode == 'true'
        run: |
          BUILD_DIR="${BUILD_DIR:-./VSCode-linux-x64}"

          echo "=========================================="
          echo "🤖 安装和配置 OpenCode"
          echo "=========================================="

          echo "📥 下载 OpenCode..."
          OPENCODE_VERSION="latest"
          OPENCODE_URL="https://github.com/opencode-ai/opencode/releases/download/${OPENCODE_VERSION}/opencode-linux-x64"

          if ! wget -q "$OPENCODE_URL" -O "$BUILD_DIR/opencode"; then
            echo "⚠️ 下载失败，尝试使用备用地址..."
            OPENCODE_URL="https://opencode.ai/downloads/opencode-linux-x64"
            wget -q "$OPENCODE_URL" -O "$BUILD_DIR/opencode" || echo "⚠️ 备用地址也失败"
          fi

          if [ -f "$BUILD_DIR/opencode" ]; then
            chmod +x "$BUILD_DIR/opencode"
            echo "✅ OpenCode 下载完成"

            printf '%s\n' '#!/bin/bash' \
              'SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"' \
              'exec "$SCRIPT_DIR/opencode" "$@"' > "$BUILD_DIR/opencode-server"
            chmod +x "$BUILD_DIR/opencode-server"
          else
            echo "❌ OpenCode 下载失败，跳过"
          fi

          mkdir -p "$BUILD_DIR/user-data/opencode"

          printf '%s\n' '{' \
            '  "version": "1.0.0",' \
            '  "server": {' \
            '    "port": 3000,' \
            '    "host": "localhost"' \
            '  },' \
            '  "models": {' \
            '    "default": "gpt-4",' \
            '    "available": ["gpt-4", "gpt-3.5-turbo", "claude-3"]' \
            '  },' \
            '  "features": {' \
            '    "codeCompletion": true,' \
            '    "codeReview": true,' \
            '    "documentation": true,' \
            '    "testGeneration": true' \
            '  }' \
            '}' > "$BUILD_DIR/user-data/opencode/config.json"

          printf '%s\n' '#!/bin/bash' \
            'SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"' \
            '' \
            'if [ -f "$SCRIPT_DIR/opencode" ]; then' \
            '  echo "🤖 启动 OpenCode 服务..."' \
            '  "$SCRIPT_DIR/opencode" --daemon --port 3000 &' \
            '  OPENCODE_PID=$!' \
            '  echo "✅ OpenCode 服务已启动 (PID: $OPENCODE_PID)"' \
            'fi' \
            '' \
            'echo "🚀 启动 VSCode..."' \
            'exec "$SCRIPT_DIR/tscode" \' \
            '  --no-sandbox \' \
            '  --disable-gpu-sandbox \' \
            '  --disable-software-rasterizer \' \
            '  --disable-gpu \' \
            '  --user-data-dir="$SCRIPT_DIR/user-data" \' \
            '  "$@"' > "$BUILD_DIR/start-with-opencode"

          chmod +x "$BUILD_DIR/start-with-opencode"

          echo "✅ OpenCode 配置完成"

      - name: ⚙️ Configure VSCode settings for extensions
        run: |
          BUILD_DIR="${BUILD_DIR:-./VSCode-linux-x64}"

          mkdir -p "$BUILD_DIR/user-data/User"

          printf '%s\n' '{' \
            '  "extensions.autoUpdate": false,' \
            '  "extensions.autoCheckUpdates": false,' \
            '  "extensions.ignoreRecommendations": true,' \
            '  "telemetry.enableCrashReporter": false,' \
            '  "telemetry.enableTelemetry": false,' \
            '  "workbench.settings.useSplitJSON": true,' \
            '  "workbench.colorTheme": "Default Dark+",' \
            '  "editor.fontSize": 14,' \
            '  "editor.fontFamily": "Monaco, '"'"'Courier New'"'"', monospace",' \
            '  "editor.tabSize": 2,' \
            '  "editor.renderWhitespace": "selection",' \
            '  "files.autoSave": "afterDelay",' \
            '  "files.autoSaveDelay": 1000,' \
            '  "terminal.integrated.shell.linux": "/bin/bash",' \
            '  "workbench.startupEditor": "none",' \
            '  "update.mode": "none",' \
            '  "update.showReleaseNotes": false' \
            '}' > "$BUILD_DIR/user-data/User/settings.json"

          echo "✅ VSCode 配置完成"

      - name: 🚀 Create double-click executable
        run: |
          BUILD_DIR="${BUILD_DIR:-./VSCode-linux-x64}"
          cd "$BUILD_DIR"

          REAL_EXEC=""
          for name in tscode code-oss code; do
            if [ -f "./$name" ]; then
              REAL_EXEC="$name"
              break
            elif [ -f "./bin/$name" ]; then
              REAL_EXEC="./bin/$name"
              break
            fi
          done

          if [ -z "$REAL_EXEC" ]; then
            REAL_EXEC=$(find . -maxdepth 2 -type f -executable 2>/dev/null | head -1)
          fi

          if [ -z "$REAL_EXEC" ] || [ ! -f "$REAL_EXEC" ]; then
            echo "❌ 找不到可执行文件！"
            echo "当前目录内容:"
            ls -la
            echo "查找可执行文件:"
            find . -maxdepth 2 -type f -executable 2>/dev/null
            exit 1
          fi

          echo "✅ 真实可执行文件: $REAL_EXEC"
          mv "$REAL_EXEC" "${REAL_EXEC}.real"

          printf '%s\n' '#!/bin/bash' \
            'SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"' \
            '' \
            'export ELECTRON_ENABLE_GPU=0' \
            'export LIBGL_ALWAYS_SOFTWARE=1' \
            'export NODE_OPTIONS="--max-old-space-size=4096"' \
            'export ELECTRON_DISABLE_SANDBOX=1' \
            'export GDK_BACKEND=x11' \
            'export QT_QPA_PLATFORM=xcb' \
            'export DISPLAY=:0' \
            'export ELECTRON_DISABLE_CRASH_REPORTER=1' \
            'export ELECTRON_DISABLE_CRASH_REPORTING=1' \
            'export CRASHPAD_DISABLE=1' \
            '' \
            'if [ -f "$SCRIPT_DIR/tscode.real" ]; then' \
            '    EXEC="$SCRIPT_DIR/tscode.real"' \
            'elif [ -f "$SCRIPT_DIR/bin/tscode.real" ]; then' \
            '    EXEC="$SCRIPT_DIR/bin/tscode.real"' \
            'elif [ -f "$SCRIPT_DIR/code-oss.real" ]; then' \
            '    EXEC="$SCRIPT_DIR/code-oss.real"' \
            'elif [ -f "$SCRIPT_DIR/bin/code-oss.real" ]; then' \
            '    EXEC="$SCRIPT_DIR/bin/code-oss.real"' \
            'else' \
            '    echo "❌ 找不到 VSCode 可执行文件！"' \
            '    exit 1' \
            'fi' \
            '' \
            'exec "$EXEC" \' \
            '  --no-sandbox \' \
            '  --disable-gpu-sandbox \' \
            '  --disable-software-rasterizer \' \
            '  --disable-gpu \' \
            '  --user-data-dir="$SCRIPT_DIR/user-data" \' \
            '  "$@"' > "$REAL_EXEC"

          chmod +x "$REAL_EXEC"

          printf '%s\n' '#!/bin/bash' \
            'SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"' \
            '' \
            'export ELECTRON_ENABLE_GPU=0' \
            'export LIBGL_ALWAYS_SOFTWARE=1' \
            'export NODE_OPTIONS="--max-old-space-size=4096"' \
            'export ELECTRON_DISABLE_SANDBOX=1' \
            'export GDK_BACKEND=x11' \
            'export QT_QPA_PLATFORM=xcb' \
            'export DISPLAY=:0' \
            'export ELECTRON_DISABLE_CRASH_REPORTER=1' \
            'export ELECTRON_DISABLE_CRASH_REPORTING=1' \
            'export CRASHPAD_DISABLE=1' \
            '' \
            'if [ -f "$SCRIPT_DIR/tscode.real" ]; then' \
            '    EXEC="$SCRIPT_DIR/tscode.real"' \
            'elif [ -f "$SCRIPT_DIR/bin/tscode.real" ]; then' \
            '    EXEC="$SCRIPT_DIR/bin/tscode.real"' \
            'else' \
            '    echo "❌ 找不到 VSCode 可执行文件！"' \
            '    exit 1' \
            'fi' \
            '' \
            'echo "=== VSCode for UOS ==="' \
            'exec "$EXEC" \' \
            '  --no-sandbox \' \
            '  --disable-gpu-sandbox \' \
            '  --disable-software-rasterizer \' \
            '  --disable-gpu \' \
            '  --user-data-dir="$SCRIPT_DIR/user-data" \' \
            '  "$@"' > start-vscode.sh

          chmod +x start-vscode.sh

          printf '%s\n' '[Desktop Entry]' \
            'Version=1.0' \
            'Type=Application' \
            'Name=VSCode for UOS' \
            'Comment=Visual Studio Code for UOS with bundled extensions' \
            'Exec=./tscode %F' \
            'Icon=./resources/app/resources/linux/code.png' \
            'Terminal=false' \
            'Categories=Development;IDE;' \
            'MimeType=text/plain;inode/directory;' \
            'StartupNotify=true' \
            'StartupWMClass=Code' > vscode-uos.desktop

          if [ -f "./opencode" ]; then
            printf '%s\n' '[Desktop Entry]' \
              'Version=1.0' \
              'Type=Application' \
              'Name=OpenCode AI' \
              'Comment=OpenCode AI Assistant' \
              'Exec=./opencode-server' \
              'Icon=./resources/app/resources/linux/code.png' \
              'Terminal=true' \
              'Categories=Development;AI;' \
              'StartupNotify=true' > opencode-uos.desktop
          fi

          cat > 使用说明.txt << 'EOF'
          ==========================================
          VSCode for UOS - 使用说明
          ==========================================

          🖱️ 双击运行：
          直接双击 tscode 文件即可启动 VSCode！

          📌 备用启动方式：
          在终端中执行: ./start-vscode.sh

          📌 启动 OpenCode（如果有）：
          在终端中执行: ./start-with-opencode

          📌 桌面快捷方式：
          将 vscode-uos.desktop 复制到桌面，双击即可

          📌 配置文件：
          所有配置保存在 ./user-data 目录

          📌 已安装插件：
          查看 ./extensions 目录

          📌 首次运行：
          如果提示权限，右键 tscode → 属性 → 勾选"允许执行"

          📌 注意事项：
          1. 所有扩展已预装，无需联网下载
          2. 使用 user-data 目录保存配置
          3. 支持离线使用
          ==========================================
          EOF

          echo "✅ 双击运行版本创建完成"
          echo ""
          echo "📁 目录内容:"
          ls -la

      - name: 📦 Package
        run: |
          BUILD_DIR="${BUILD_DIR:-./VSCode-linux-x64}"
          VERSION="${{ github.event.inputs.version || '1.116.0' }}"

          find "$BUILD_DIR" -name "*.vsix" -delete 2>/dev/null || true
          find "$BUILD_DIR" -name "*.log" -delete 2>/dev/null || true
          find "$BUILD_DIR" -name "*.map" -delete 2>/dev/null || true

          PACKAGE_NAME="vscode-uos-${VERSION}"
          if [ "${{ github.event.inputs.include_opencode }}" == "true" ]; then
            PACKAGE_NAME="${PACKAGE_NAME}-with-opencode"
          fi
          PACKAGE_NAME="${PACKAGE_NAME}-双击运行"

          tar -czf "${PACKAGE_NAME}.tar.gz" \
            --preserve-permissions \
            -C "$(dirname "$BUILD_DIR")" \
            "$(basename "$BUILD_DIR")"

          echo "✅ 打包完成:"
          ls -lh "${PACKAGE_NAME}.tar.gz"

          echo "PACKAGE_NAME=${PACKAGE_NAME}" >> $GITHUB_ENV

      - name: 📤 Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: vscode-uos-double-click
          path: vscode-uos-*.tar.gz
          retention-days: 30

      - name: 📊 Build summary
        if: always()
        run: |
          echo "=========================================="
          echo "📊 BUILD SUMMARY"
          echo "=========================================="
          echo "🟢 Status: ${{ job.status }}"
          echo "📦 Version: ${{ github.event.inputs.version || '1.116.0' }}"
          echo "📦 Branch: ${{ github.event.inputs.branch }}"
          echo "🔌 Extensions: ${{ github.event.inputs.extensions }}"
          echo "🤖 OpenCode: ${{ github.event.inputs.include_opencode }}"
          echo "=========================================="
          if [ "${{ job.status }}" == "success" ]; then
            echo "🎉 Build completed!"
            echo ""
            echo "📥 Download: ${{ env.PACKAGE_NAME }}.tar.gz"
            echo ""
            echo "📌 On UOS (no root needed):"
            echo "  1. 解压到任意目录"
            echo "  2. 双击 tscode 即可运行！"
            echo ""
            echo "📁 解压后产物:"
            echo "  ├── tscode              # 双击运行"
            echo "  ├── tscode.real         # 真实二进制文件"
            echo "  ├── start-vscode.sh     # 备用启动脚本"
            echo "  ├── vscode-uos.desktop  # 桌面快捷方式"
            echo "  ├── extensions/         # 预装插件"
            echo "  ├── user-data/          # 用户配置目录"
            if [ "${{ github.event.inputs.include_opencode }}" == "true" ]; then
              echo "  ├── opencode            # OpenCode AI"
              echo "  ├── opencode-server     # OpenCode 服务"
              echo "  ├── start-with-opencode # 带AI的启动脚本"
              echo "  └── opencode-uos.desktop # OpenCode 快捷方式"
            fi
            echo "  └── ..."
          fi
          echo "=========================================="