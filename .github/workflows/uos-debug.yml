name: Build Custom VSCode for UOS (.deb Package)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: true
        default: 'main'
      version:
        description: 'Package version'
        required: false
        default: '1.116.0'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch }}
          fetch-depth: 1

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'

      - name: 🔧 Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config libgtk-3-dev libxkbfile-dev \
            libkrb5-dev libgbm-dev rpm libx11-dev libxss-dev libxtst-dev \
            libnss3-dev libasound2-dev libglib2.0-dev libcairo2-dev \
            libpango1.0-dev libatk1.0-dev libgdk-pixbuf2.0-dev \
            python3 git wget curl

      - name: 🔧 Fix TypeScript scripts
        run: |
          echo 'console.log("✅ Preinstall OK");' > build/npm/preinstall.js
          sed -i 's/"preinstall": "node build\/npm\/preinstall.ts"/"preinstall": "node build\/npm\/preinstall.js"/' package.json
          echo 'console.log("✅ Postinstall OK");' > build/npm/postinstall.js
          sed -i 's/"postinstall": "node build\/npm\/postinstall.ts"/"postinstall": "node build\/npm\/postinstall.js"/' package.json

      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 📦 Install build tools
        run: |
          npm install -g tsx
          npm install --legacy-peer-deps \
            ternary-stream vscode-gulp-watch esbuild jsonc-parser \
            gulp-merge-json gulp-tsb gulp-sourcemaps gulp-filter \
            gulp-rename gulp-sort 2>/dev/null || true

      - name: 🔧 Fix extensions.ts
        run: |
          cat > build/lib/extensions.ts << 'EOF'
          import { Stream } from "stream";
          const empty: any[] = [];
          function emptyStream(): Stream {
            const s = new Stream.Readable();
            s._read = () => s.push(null);
            return s;
          }
          export function isWebExtension(): boolean { return false; }
          export function getExtensionStream(): Stream { return emptyStream(); }
          export function getExtensionDownloadStream(): Stream { return emptyStream(); }
          export function packageMarketplaceExtensionsStream(): Stream { return emptyStream(); }
          export function packageNativeLocalExtensionsStream(): Stream { return emptyStream(); }
          export function packageNonNativeLocalExtensionsStream(): Stream { return emptyStream(); }
          export function packageLocalExtensionsStream(): Stream { return emptyStream(); }
          export function packageExtensionsStream(): Stream { return emptyStream(); }
          export function packageCopilotExtensionStream(): Stream { return emptyStream(); }
          export function packageCopilotChatExtensionStream(): Stream { return emptyStream(); }
          export function packageCopilotAgentsExtensionStream(): Stream { return emptyStream(); }
          export function fromMarketplace(): any[] { return empty; }
          export async function fetchUrls(urls: string[], options: any): Promise<void> {
            console.log("⚠️ fetchUrls: disabled");
            return Promise.resolve();
          }
          export function buildExtensionMedia(): void {}
          export function compileExtensionMedia(): void {}
          export function buildExtensionMediaTask(done: any): void { done(); }
          export const builtInExtensions = empty;
          export const shouldDownloadBuiltInExtensions = false;
          export const webBuiltInExtensions = empty;
          export const shouldDownloadWebBuiltInExtensions = false;
          EOF

          echo 'export const builtInExtensions: any[] = [];
          export const shouldDownloadBuiltInExtensions = false;
          export const webBuiltInExtensions: any[] = [];
          export const shouldDownloadWebBuiltInExtensions = false;' > build/lib/builtInExtensions.ts

          echo 'import { Stream } from "stream";
          export async function fetchUrls(urls: string[], options: any): Promise<void> {
            console.log("⚠️ fetchUrls: disabled");
            return Promise.resolve();
          }' > build/lib/fetch.ts

      - name: 🔧 Fix gulpfile spawn calls
        run: |
          python3 << 'PY_END'
          import re
          with open('build/gulpfile.vscode.ts', 'r') as f:
              content = f.read()
          content = re.sub(r"spawn\('node'", "spawn('tsx'", content)
          content = re.sub(r'spawn\("node"', 'spawn("tsx"', content)
          content = re.sub(r"spawn\(process\.execPath", "spawn('tsx'", content)
          with open('build/gulpfile.vscode.ts', 'w') as f:
              f.write(content)
          print("✅ spawn calls fixed")
          PY_END

      - name: 🔧 Replace copilot.ts
        run: |
          cat > build/lib/copilot.ts << 'EOF'
          export async function prepareBuiltInCopilotExtensionShims(extRoot: string): Promise<void> {
              console.log('⚠️ Copilot extension shims preparation skipped for UOS build');
              return;
          }
          export function copyCopilotNativeDeps(productRoot: string): void {
              console.log('⚠️ Copilot native deps copy skipped for UOS build');
          }
          export function getCopilotExcludeFilter(): any {
              return function() { return false; };
          }
          EOF

      - name: ⚙️ Set env
        run: |
          echo "VSCODE_SKIP_BUILTIN_EXTENSION_DOWNLOAD=1" >> $GITHUB_ENV
          echo "VSCODE_ELECTRON_SKIP_DOWNLOAD=1" >> $GITHUB_ENV
          echo "VSCODE_SKIP_PRELAUNCH=1" >> $GITHUB_ENV
          echo "VSCODE_SKIP_BUNDLED_EXTENSIONS=1" >> $GITHUB_ENV

      - name: 🔨 Build VSCode
        run: |
          export NODE_OPTIONS="--max-old-space-size=8192"
          export VSCODE_SKIP_BUILTIN_EXTENSION_DOWNLOAD=1
          export VSCODE_ELECTRON_SKIP_DOWNLOAD=1
          export VSCODE_SKIP_PRELAUNCH=1
          export VSCODE_SKIP_BUNDLED_EXTENSIONS=1
          echo "Start: $(date)"
          npx tsx node_modules/gulp/bin/gulp.js vscode-linux-x64-min --no-color
          echo "Done: $(date)"

      - name: 🔍 Verify
        run: |
          BUILD_DIR=""
          for dir in "./VSCode-linux-x64" "./vscode/VSCode-linux-x64" "../VSCode-linux-x64"; do
            if [ -d "$dir" ]; then
              BUILD_DIR="$dir"
              echo "✅ Build found at: $BUILD_DIR"
              break
            fi
          done
          if [ -z "$BUILD_DIR" ]; then
            echo "❌ Build not found!"
            exit 1
          fi
          echo "BUILD_DIR=$BUILD_DIR" >> $GITHUB_ENV

          EXEC_NAME=""
          for name in tscode code-oss code; do
            if [ -f "$BUILD_DIR/$name" ] || [ -f "$BUILD_DIR/bin/$name" ]; then
              EXEC_NAME="$name"
              echo "✅ Executable: $EXEC_NAME"
              break
            fi
          done
          echo "EXEC_NAME=$EXEC_NAME" >> $GITHUB_ENV

      - name: 📦 Create .deb package
        run: |
          BUILD_DIR="${BUILD_DIR:-./VSCode-linux-x64}"
          EXEC_NAME="${EXEC_NAME:-tscode}"
          VERSION="${{ github.event.inputs.version || '1.116.0' }}"

          echo "Creating .deb package structure..."
          echo "Build dir: $BUILD_DIR"
          echo "Executable: $EXEC_NAME"
          echo "Version: $VERSION"

          DEB_ROOT="vscode-uos"
          mkdir -p $DEB_ROOT/DEBIAN
          mkdir -p $DEB_ROOT/opt/vscode-uos
          mkdir -p $DEB_ROOT/usr/bin
          mkdir -p $DEB_ROOT/usr/share/applications
          mkdir -p $DEB_ROOT/usr/share/icons/hicolor/512x512/apps

          cp -r "$BUILD_DIR"/* $DEB_ROOT/opt/vscode-uos/

          # ============================================================
          # 【关键】创建更健壮的启动脚本
          # ============================================================
          cat > $DEB_ROOT/opt/vscode-uos/start-vscode.sh << 'EOF'
          #!/bin/bash
          SCRIPT_DIR="/opt/vscode-uos"
          EXEC_NAME="tscode"

          export ELECTRON_ENABLE_GPU=0
          export LIBGL_ALWAYS_SOFTWARE=1
          export NODE_OPTIONS="--max-old-space-size=4096"
          export ELECTRON_DISABLE_SANDBOX=1
          export GDK_BACKEND=x11
          export QT_QPA_PLATFORM=xcb
          export DISPLAY=:0
          export DESKTOP_STARTUP_ID=""

          if [ -f "$SCRIPT_DIR/bin/$EXEC_NAME" ]; then
              EXEC="$SCRIPT_DIR/bin/$EXEC_NAME"
          elif [ -f "$SCRIPT_DIR/$EXEC_NAME" ]; then
              EXEC="$SCRIPT_DIR/$EXEC_NAME"
          else
              echo "❌ VSCode executable not found!"
              exit 1
          fi

          echo "=== Custom VSCode UOS ==="
          $EXEC --version 2>/dev/null | head -1

          # 检查沙箱权限
          SANDBOX="$SCRIPT_DIR/chrome-sandbox"
          if [ -f "$SANDBOX" ] && [ "$(stat -c %u "$SANDBOX" 2>/dev/null)" = "0" ] && [ "$(stat -c %a "$SANDBOX" 2>/dev/null)" = "4755" ]; then
              echo "✅ 沙箱已启用"
              exec "$EXEC" "$@"
          else
              echo "⚠️ 使用兼容模式 (--no-sandbox)"
              exec "$EXEC" --no-sandbox --disable-gpu-sandbox --disable-software-rasterizer --disable-gpu "$@"
          fi
          EOF
          chmod 755 $DEB_ROOT/opt/vscode-uos/start-vscode.sh

          # ============================================================
          # 【关键】创建可双击运行的 .desktop 文件
          # ============================================================
          cat > $DEB_ROOT/usr/share/applications/vscode-uos.desktop << 'EOF'
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=VSCode for UOS
          Comment=Visual Studio Code for UOS
          Exec=/opt/vscode-uos/start-vscode.sh %F
          Icon=vscode-uos
          Terminal=false
          Categories=Development;IDE;
          MimeType=text/plain;inode/directory;
          StartupNotify=true
          StartupWMClass=Code
          Actions=new-window;

          [Desktop Action new-window]
          Name=New Window
          Exec=/opt/vscode-uos/start-vscode.sh -n
          EOF

          # ============================================================
          # 【关键】创建可双击运行的包装器（直接双击 tscode 也能工作）
          # ============================================================
          cat > $DEB_ROOT/opt/vscode-uos/tscode-wrapper << 'EOF'
          #!/bin/bash
          # 包装器：双击 tscode 时自动设置环境变量和参数
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          export ELECTRON_ENABLE_GPU=0
          export LIBGL_ALWAYS_SOFTWARE=1
          export NODE_OPTIONS="--max-old-space-size=4096"
          export ELECTRON_DISABLE_SANDBOX=1
          export GDK_BACKEND=x11
          export QT_QPA_PLATFORM=xcb
          export DISPLAY=:0
          exec "$SCRIPT_DIR/bin/tscode" --no-sandbox --disable-gpu-sandbox --disable-software-rasterizer --disable-gpu "$@"
          EOF
          chmod 755 $DEB_ROOT/opt/vscode-uos/tscode-wrapper

          # ============================================================
          # 【关键】替换 bin/tscode 为包装器
          # ============================================================
          # 备份原始 tscode
          mv $DEB_ROOT/opt/vscode-uos/bin/tscode $DEB_ROOT/opt/vscode-uos/bin/tscode.real
          # 创建软链接指向包装器
          ln -s ../tscode-wrapper $DEB_ROOT/opt/vscode-uos/bin/tscode

          # ============================================================
          # 创建命令行软链接
          # ============================================================
          cd $DEB_ROOT/usr/bin
          ln -s ../../opt/vscode-uos/start-vscode.sh vscode-uos
          cd ../../..

          # ============================================================
          # 复制图标
          # ============================================================
          if [ -f "$DEB_ROOT/opt/vscode-uos/resources/app/resources/linux/code.png" ]; then
            cp "$DEB_ROOT/opt/vscode-uos/resources/app/resources/linux/code.png" \
               $DEB_ROOT/usr/share/icons/hicolor/512x512/apps/vscode-uos.png
          fi

          # ============================================================
          # 创建 DEBIAN/control 文件
          # ============================================================
          cat > $DEB_ROOT/DEBIAN/control << EOF
          Package: vscode-uos
          Version: $VERSION
          Section: devel
          Priority: optional
          Architecture: amd64
          Maintainer: VSCode UOS Build <vscode@uos.local>
          Description: Visual Studio Code for UOS
           A custom build of Visual Studio Code optimized for UOS.
          Depends: libgtk-3-0, libx11-6, libxss1, libxtst6, libnss3, libasound2
          EOF

          # ============================================================
          # 创建 DEBIAN/postinst 脚本
          # ============================================================
          cat > $DEB_ROOT/DEBIAN/postinst << 'EOF'
          #!/bin/bash
          set -e

          echo "=========================================="
          echo "🔧 Configuring VSCode for UOS..."
          echo "=========================================="

          # 1. 修复 chrome-sandbox 权限
          if [ -f "/opt/vscode-uos/chrome-sandbox" ]; then
              echo "🔧 Setting chrome-sandbox permissions..."
              chown root:root /opt/vscode-uos/chrome-sandbox
              chmod 4755 /opt/vscode-uos/chrome-sandbox
              echo "✅ chrome-sandbox configured (root:root 4755)"
          fi

          # 2. 确保包装器可执行
          chmod 755 /opt/vscode-uos/tscode-wrapper
          chmod 755 /opt/vscode-uos/bin/tscode.real
          chmod 755 /opt/vscode-uos/bin/tscode

          # 3. 更新桌面数据库
          if command -v update-desktop-database >/dev/null 2>&1; then
              update-desktop-database /usr/share/applications/ 2>/dev/null || true
              echo "✅ Desktop database updated"
          fi

          echo "=========================================="
          echo "✅ VSCode for UOS installed successfully!"
          echo ""
          echo "📌 Launch:"
          echo "  - Terminal: vscode-uos"
          echo "  - Desktop: Search for 'VSCode for UOS'"
          echo "  - Double-click: /opt/vscode-uos/bin/tscode"
          echo "=========================================="

          exit 0
          EOF
          chmod 755 $DEB_ROOT/DEBIAN/postinst

          # ============================================================
          # 创建 DEBIAN/prerm 脚本
          # ============================================================
          cat > $DEB_ROOT/DEBIAN/prerm << 'EOF'
          #!/bin/bash
          set -e
          echo "Removing VSCode for UOS..."
          exit 0
          EOF
          chmod 755 $DEB_ROOT/DEBIAN/prerm

          # ============================================================
          # 创建 DEBIAN/postrm 脚本
          # ============================================================
          cat > $DEB_ROOT/DEBIAN/postrm << 'EOF'
          #!/bin/bash
          set -e
          echo "VSCode for UOS has been removed."
          echo "User data (settings, extensions) may remain in ~/.config/vscode-uos"
          exit 0
          EOF
          chmod 755 $DEB_ROOT/DEBIAN/postrm

          echo "✅ .deb package structure created"

      - name: 🔨 Build .deb package
        run: |
          echo "Building .deb package with gzip compression..."

          find vscode-uos -type f -not -name "*.so" -exec chmod 644 {} \;
          chmod 755 vscode-uos/DEBIAN/postinst
          chmod 755 vscode-uos/DEBIAN/prerm
          chmod 755 vscode-uos/DEBIAN/postrm
          chmod 755 vscode-uos/opt/vscode-uos/start-vscode.sh
          chmod 755 vscode-uos/opt/vscode-uos/tscode-wrapper
          chmod 755 vscode-uos/opt/vscode-uos/bin/* 2>/dev/null || true

          dpkg-deb -Zgzip --build vscode-uos

          if [ -f "vscode-uos.deb" ]; then
            echo "✅ .deb package created:"
            ls -lh vscode-uos.deb
            ar t vscode-uos.deb
          else
            echo "❌ Failed to build .deb package!"
            exit 1
          fi

      - name: 📤 Upload .deb
        uses: actions/upload-artifact@v7
        with:
          name: vscode-uos-deb
          path: vscode-uos.deb
          retention-days: 30

      - name: 📦 Package tar.gz
        run: |
          BUILD_DIR="${BUILD_DIR:-./VSCode-linux-x64}"
          VERSION="${{ github.event.inputs.version || '1.116.0' }}"

          cd "$(dirname "$BUILD_DIR")"
          cat > "$(basename "$BUILD_DIR")/install.sh" << 'EOF'
          #!/bin/bash
          echo "=========================================="
          echo "📦 Installing VSCode for UOS..."
          echo "=========================================="
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          cd "$SCRIPT_DIR"
          echo "🔧 Fixing chrome-sandbox permissions..."
          sudo chown root:root chrome-sandbox 2>/dev/null
          sudo chmod 4755 chrome-sandbox 2>/dev/null
          echo "✅ Done!"
          echo "📌 Run: ./start-vscode.sh"
          EOF
          chmod +x "$(basename "$BUILD_DIR")/install.sh"

          tar -czf "$OLDPWD/vscode-uos-${VERSION}.tar.gz" \
            --preserve-permissions \
            "$(basename "$BUILD_DIR")"
          cd "$OLDPWD"

          echo "✅ tar.gz package created:"
          ls -lh vscode-uos-*.tar.gz

      - name: 📤 Upload tar.gz
        uses: actions/upload-artifact@v7
        with:
          name: vscode-uos-tar
          path: vscode-uos-*.tar.gz
          retention-days: 30

      - name: 📊 Build summary
        if: always()
        run: |
          echo "=========================================="
          echo "📊 BUILD SUMMARY"
          echo "=========================================="
          echo "🟢 Status: ${{ job.status }}"
          echo "📦 Version: ${{ github.event.inputs.version || '1.116.0' }}"
          echo "=========================================="
          if [ "${{ job.status }}" == "success" ]; then
            echo "🎉 Build completed successfully!"
            echo ""
            echo "📥 Download artifacts:"
            echo "  - vscode-uos.deb (recommended)"
            echo "  - vscode-uos-*.tar.gz (portable)"
            echo ""
            echo "📌 Install on UOS:"
            echo "  sudo dpkg -i vscode-uos.deb"
            echo ""
            echo "📌 Or portable:"
            echo "  tar -xzf vscode-uos-*.tar.gz"
            echo "  cd VSCode-linux-x64"
            echo "  ./start-vscode.sh"
          fi
          echo "=========================================="