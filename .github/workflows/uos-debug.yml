name: Build Custom VSCode for UOS (Debug Double-click)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: true
        default: 'main'
      version:
        description: 'Package version'
        required: false
        default: '1.116.0'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch }}
          fetch-depth: 1

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'

      - name: 🔧 Install system dependencies
        run: |
          echo "=========================================="
          echo "📦 安装系统依赖"
          echo "=========================================="
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config libgtk-3-dev libxkbfile-dev \
            libkrb5-dev libgbm-dev rpm libx11-dev libxss-dev libxtst-dev \
            libnss3-dev libasound2-dev libglib2.0-dev libcairo2-dev \
            libpango1.0-dev libatk1.0-dev libgdk-pixbuf2.0-dev \
            python3 git wget curl
          echo "✅ 系统依赖安装完成"

      - name: 🔧 Fix TypeScript scripts
        run: |
          echo "=========================================="
          echo "🔧 修复 TypeScript 脚本"
          echo "=========================================="
          echo 'console.log("✅ Preinstall OK");' > build/npm/preinstall.js
          sed -i 's/"preinstall": "node build\/npm\/preinstall.ts"/"preinstall": "node build\/npm\/preinstall.js"/' package.json
          echo 'console.log("✅ Postinstall OK");' > build/npm/postinstall.js
          sed -i 's/"postinstall": "node build\/npm\/postinstall.ts"/"postinstall": "node build\/npm\/postinstall.js"/' package.json
          echo "✅ TypeScript 脚本修复完成"

      - name: 📦 Install dependencies
        run: |
          echo "=========================================="
          echo "📦 安装 npm 依赖"
          echo "=========================================="
          npm install --legacy-peer-deps
          echo "✅ npm 依赖安装完成"

      - name: 📦 Install build tools
        run: |
          echo "=========================================="
          echo "📦 安装构建工具"
          echo "=========================================="
          npm install -g tsx
          npm install --legacy-peer-deps \
            ternary-stream vscode-gulp-watch esbuild jsonc-parser \
            gulp-merge-json gulp-tsb gulp-sourcemaps gulp-filter \
            gulp-rename gulp-sort 2>/dev/null || true
          echo "✅ 构建工具安装完成"

      - name: 🔧 Fix extensions.ts
        run: |
          echo "=========================================="
          echo "🔧 修复 extensions.ts"
          echo "=========================================="
          cat > build/lib/extensions.ts << 'EOF'
          import { Stream } from "stream";
          const empty: any[] = [];
          function emptyStream(): Stream {
            const s = new Stream.Readable();
            s._read = () => s.push(null);
            return s;
          }
          export function isWebExtension(): boolean { return false; }
          export function getExtensionStream(): Stream { return emptyStream(); }
          export function getExtensionDownloadStream(): Stream { return emptyStream(); }
          export function packageMarketplaceExtensionsStream(): Stream { return emptyStream(); }
          export function packageNativeLocalExtensionsStream(): Stream { return emptyStream(); }
          export function packageNonNativeLocalExtensionsStream(): Stream { return emptyStream(); }
          export function packageLocalExtensionsStream(): Stream { return emptyStream(); }
          export function packageExtensionsStream(): Stream { return emptyStream(); }
          export function packageCopilotExtensionStream(): Stream { return emptyStream(); }
          export function packageCopilotChatExtensionStream(): Stream { return emptyStream(); }
          export function packageCopilotAgentsExtensionStream(): Stream { return emptyStream(); }
          export function fromMarketplace(): any[] { return empty; }
          export async function fetchUrls(urls: string[], options: any): Promise<void> {
            console.log("⚠️ fetchUrls: disabled");
            return Promise.resolve();
          }
          export function buildExtensionMedia(): void {}
          export function compileExtensionMedia(): void {}
          export function buildExtensionMediaTask(done: any): void { done(); }
          export const builtInExtensions = empty;
          export const shouldDownloadBuiltInExtensions = false;
          export const webBuiltInExtensions = empty;
          export const shouldDownloadWebBuiltInExtensions = false;
          EOF
          echo 'export const builtInExtensions: any[] = [];
          export const shouldDownloadBuiltInExtensions = false;
          export const webBuiltInExtensions: any[] = [];
          export const shouldDownloadWebBuiltInExtensions = false;' > build/lib/builtInExtensions.ts
          echo 'import { Stream } from "stream";
          export async function fetchUrls(urls: string[], options: any): Promise<void> {
            console.log("⚠️ fetchUrls: disabled");
            return Promise.resolve();
          }' > build/lib/fetch.ts
          echo "✅ extensions.ts 修复完成"

      - name: 🔧 Fix gulpfile spawn calls
        run: |
          echo "=========================================="
          echo "🔧 修复 gulpfile spawn 调用"
          echo "=========================================="
          python3 << 'PY_END'
          import re
          with open('build/gulpfile.vscode.ts', 'r') as f:
              content = f.read()
          content = re.sub(r"spawn\('node'", "spawn('tsx'", content)
          content = re.sub(r'spawn\("node"', 'spawn("tsx"', content)
          content = re.sub(r"spawn\(process\.execPath", "spawn('tsx'", content)
          with open('build/gulpfile.vscode.ts', 'w') as f:
              f.write(content)
          print("✅ spawn calls fixed")
          PY_END
          echo "✅ gulpfile 修复完成"

      - name: 🔧 Replace copilot.ts
        run: |
          echo "=========================================="
          echo "🔧 替换 copilot.ts"
          echo "=========================================="
          cat > build/lib/copilot.ts << 'EOF'
          export async function prepareBuiltInCopilotExtensionShims(extRoot: string): Promise<void> {
              console.log('⚠️ Copilot extension shims preparation skipped for UOS build');
              return;
          }
          export function copyCopilotNativeDeps(productRoot: string): void {
              console.log('⚠️ Copilot native deps copy skipped for UOS build');
          }
          export function getCopilotExcludeFilter(): any {
              return function() { return false; };
          }
          EOF
          echo "✅ copilot.ts 替换完成"

      # ============================================================
      # 10. 修复 src/main.ts 并禁用 Crashpad
      # ============================================================
      - name: 🔧 Fix main.ts and disable Crashpad
        run: |
          echo "=========================================="
          echo "🔧 修复 src/main.ts 并禁用 Crashpad"
          echo "=========================================="

          # 从原始仓库恢复 src/main.ts
          echo "📌 恢复 src/main.ts..."
          if [ -f "src/main.ts" ]; then
            git checkout src/main.ts 2>/dev/null || echo "⚠️ git checkout 失败"
          else
            echo "⚠️ src/main.ts 不存在，跳过"
          fi

          # 修改 product.json
          python3 << 'PY_JSON_END'
          import json
          import os
          if os.path.exists('product.json'):
              with open('product.json', 'r') as f:
                  data = json.load(f)
              data['enableCrashReport'] = False
              if 'crashReporter' not in data:
                  data['crashReporter'] = {}
              data['crashReporter']['disabled'] = True
              with open('product.json', 'w') as f:
                  json.dump(data, f, indent=2)
              print("✅ product.json 已修改")
          PY_JSON_END

          # 创建禁用的 crash 服务
          mkdir -p src/vs/platform/crash/common
          cat > src/vs/platform/crash/common/crashService.ts << 'CRASH_EOF'
          /*---------------------------------------------------------------------------------------------
           *  Copyright (c) Microsoft Corporation. All rights reserved.
           *  Licensed under the MIT License. See License.txt in the project root for license information.
           *--------------------------------------------------------------------------------------------*/
          // DISABLED: Crash service for UOS build
          import { createDecorator } from '../../../base/common/instantiation.js';
          export const ICrashService = createDecorator<ICrashService>('crashService');
          export interface ICrashService { _serviceBrand: undefined; }
          export class CrashService implements ICrashService {
              declare readonly _serviceBrand: undefined;
              constructor() { console.log('⚠️ Crash service disabled for UOS build'); }
          }
          CRASH_EOF
          echo "✅ crashService.ts 已创建"

          # 只修改 electron-main.ts 中的 crashReporter.start
          if [ -f "src/vs/workbench/electron-main/electron-main.ts" ]; then
            sed -i '/crashReporter\.start/s/^/\/\/ DISABLED: /' src/vs/workbench/electron-main/electron-main.ts
            echo "✅ electron-main.ts 已修改"
          fi

          echo "✅ 修复完成"

      - name: ⚙️ Set env
        run: |
          echo "=========================================="
          echo "⚙️ 设置环境变量"
          echo "=========================================="
          echo "VSCODE_SKIP_BUILTIN_EXTENSION_DOWNLOAD=1" >> $GITHUB_ENV
          echo "VSCODE_ELECTRON_SKIP_DOWNLOAD=1" >> $GITHUB_ENV
          echo "VSCODE_SKIP_PRELAUNCH=1" >> $GITHUB_ENV
          echo "VSCODE_SKIP_BUNDLED_EXTENSIONS=1" >> $GITHUB_ENV
          echo "ELECTRON_DISABLE_CRASH_REPORTER=1" >> $GITHUB_ENV
          echo "ELECTRON_DISABLE_CRASH_REPORTING=1" >> $GITHUB_ENV
          echo "✅ 环境变量设置完成"

      - name: 🔨 Build VSCode
        run: |
          echo "=========================================="
          echo "🔨 构建 VSCode"
          echo "=========================================="
          export NODE_OPTIONS="--max-old-space-size=8192"
          export VSCODE_SKIP_BUILTIN_EXTENSION_DOWNLOAD=1
          export VSCODE_ELECTRON_SKIP_DOWNLOAD=1
          export VSCODE_SKIP_PRELAUNCH=1
          export VSCODE_SKIP_BUNDLED_EXTENSIONS=1
          export ELECTRON_DISABLE_CRASH_REPORTER=1
          export ELECTRON_DISABLE_CRASH_REPORTING=1
          echo "Start: $(date)"

          # 使用完整构建
          npx tsx node_modules/gulp/bin/gulp.js vscode-linux-x64 --no-color

          echo "Done: $(date)"
          echo "✅ 构建完成"

      # ============================================================
      # 11. 验证构建产物内容
      # ============================================================
      - name: 🔍 Verify build contents
        run: |
          echo "=========================================="
          echo "🔍 验证构建产物内容"
          echo "=========================================="

          # 查找构建目录
          BUILD_DIR=""
          for dir in "./VSCode-linux-x64" "./vscode/VSCode-linux-x64" "../VSCode-linux-x64"; do
            echo "检查目录: $dir"
            if [ -d "$dir" ]; then
              BUILD_DIR="$dir"
              echo "✅ 找到构建目录: $BUILD_DIR"
              break
            fi
          done

          if [ -z "$BUILD_DIR" ]; then
            echo "❌ 找不到构建目录!"
            echo "当前目录内容:"
            ls -la
            exit 1
          fi

          echo "BUILD_DIR=$BUILD_DIR" >> $GITHUB_ENV

          echo ""
          echo "📁 构建目录内容:"
          ls -la "$BUILD_DIR"

          # 检查 extensions 目录
          echo ""
          echo "📌 检查 extensions 目录..."
          if [ -d "$BUILD_DIR/extensions" ]; then
            EXT_COUNT=$(find "$BUILD_DIR/extensions" -maxdepth 1 -type d | wc -l)
            echo "   ✅ extensions 存在 ($EXT_COUNT 个目录)"
          else
            echo "   ❌ extensions 不存在!"
          fi

          # 检查 node_modules 目录
          echo ""
          echo "📌 检查 node_modules..."
          if [ -d "$BUILD_DIR/node_modules" ]; then
            NODE_SIZE=$(du -sh "$BUILD_DIR/node_modules" | cut -f1)
            echo "   ✅ node_modules 存在 (大小: $NODE_SIZE)"
          else
            echo "   ❌ node_modules 不存在!"
          fi

          echo ""
          echo "✅ 验证完成"

      # ============================================================
      # 12. 复制 extensions、node_modules 和预构建扩展
      # ============================================================
      - name: 📂 Copy extensions and prebuilt extensions
        run: |
          echo "=========================================="
          echo "📂 复制 extensions、node_modules 和预构建扩展"
          echo "=========================================="

          BUILD_DIR="${BUILD_DIR:-./VSCode-linux-x64}"

          echo "📁 构建目录: $BUILD_DIR"
          echo "📁 源码目录: $(pwd)"

          # 1. 复制 extensions
          if [ -d "./extensions" ]; then
            echo "📌 复制 extensions..."
            cp -r ./extensions "$BUILD_DIR/"
            echo "✅ extensions 已复制"
          else
            echo "❌ 源码中找不到 extensions 目录!"
            exit 1
          fi

          # 2. 复制 node_modules
          if [ -d "./node_modules" ]; then
            echo "📌 复制 node_modules..."
            cp -r ./node_modules "$BUILD_DIR/"
            echo "✅ node_modules 已复制"
          else
            echo "⚠️ 源码中找不到 node_modules 目录"
          fi

          # 3. 【关键】复制预构建扩展到 extensions 目录
          if [ -d "./prebuilt-extensions" ]; then
            echo "📌 复制预构建扩展到 extensions..."

            echo "   📋 预构建扩展列表:"
            ls -la ./prebuilt-extensions/ || echo "   目录为空"

            # 复制所有预构建扩展到 extensions 目录
            cp -r ./prebuilt-extensions/* "$BUILD_DIR/extensions/" 2>/dev/null || true

            echo "✅ 预构建扩展已复制到 extensions"
          else
            echo "⚠️ 源码中找不到 prebuilt-extensions 目录"
            echo "查找 prebuilt-extensions..."
            find . -name "prebuilt-extensions" -type d 2>/dev/null | head -5
          fi

          # 4. 检查 extensions 内容
          echo ""
          echo "📁 extensions 内容:"
          ls -la "$BUILD_DIR/extensions" | head -30

          # 5. 检查预构建扩展
          echo ""
          echo "📌 检查预构建扩展:"
          PREBUILT_EXTS="cweijan.vscode-office test-tech.beeeyes test-tech.skillhub MS-CEINTL.vscode-language-pack-zh-hans test-tech.TestAgent"
          for ext in $PREBUILT_EXTS; do
            if [ -d "$BUILD_DIR/extensions/$ext" ]; then
              echo "   ✅ $ext"
            elif find "$BUILD_DIR/extensions" -name "$ext" -type d 2>/dev/null | grep -q .; then
              echo "   ✅ $ext (在其他位置)"
            else
              echo "   ❌ $ext (未找到)"
            fi
          done

          echo ""
          echo "✅ 复制完成"

      # ============================================================
      # 13. 创建可直接双击运行的 VSCode
      # ============================================================
      - name: 🚀 Create double-click executable
        run: |
          echo "=========================================="
          echo "🚀 创建双击运行版本"
          echo "=========================================="

          BUILD_DIR="${BUILD_DIR:-./VSCode-linux-x64}"
          cd "$BUILD_DIR"

          # 查找真正的二进制文件
          REAL_EXEC=""
          echo "🔍 查找可执行文件..."
          for name in tscode code-oss code; do
            if [ -f "./$name" ]; then
              REAL_EXEC="$name"
              echo "  找到: ./$name"
              break
            elif [ -f "./bin/$name" ]; then
              REAL_EXEC="./bin/$name"
              echo "  找到: ./bin/$name"
              break
            fi
          done

          if [ -z "$REAL_EXEC" ]; then
            echo "🔍 搜索可执行文件..."
            REAL_EXEC=$(find . -maxdepth 2 -type f -executable 2>/dev/null | head -1)
            echo "  找到: $REAL_EXEC"
          fi

          if [ -z "$REAL_EXEC" ] || [ ! -f "$REAL_EXEC" ]; then
            echo "❌ 找不到可执行文件！"
            echo "当前目录内容:"
            ls -la
            exit 1
          fi

          echo "✅ 真实可执行文件: $REAL_EXEC"

          # 备份真实二进制文件
          echo "📌 备份真实二进制文件..."
          mv "$REAL_EXEC" "${REAL_EXEC}.real"
          echo "✅ 已备份为: ${REAL_EXEC}.real"

          # 创建 tscode 包装器
          echo "📌 创建包装器脚本..."
          cat > "$REAL_EXEC" << 'WRAPPER_EOF'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"

          export ELECTRON_ENABLE_GPU=0
          export LIBGL_ALWAYS_SOFTWARE=1
          export NODE_OPTIONS="--max-old-space-size=4096"
          export ELECTRON_DISABLE_SANDBOX=1
          export GDK_BACKEND=x11
          export QT_QPA_PLATFORM=xcb
          export DISPLAY=:0
          export ELECTRON_DISABLE_CRASH_REPORTER=1
          export ELECTRON_DISABLE_CRASH_REPORTING=1
          export CRASHPAD_DISABLE=1

          if [ -f "$SCRIPT_DIR/tscode.real" ]; then
              EXEC="$SCRIPT_DIR/tscode.real"
          elif [ -f "$SCRIPT_DIR/bin/tscode.real" ]; then
              EXEC="$SCRIPT_DIR/bin/tscode.real"
          elif [ -f "$SCRIPT_DIR/code-oss.real" ]; then
              EXEC="$SCRIPT_DIR/code-oss.real"
          elif [ -f "$SCRIPT_DIR/bin/code-oss.real" ]; then
              EXEC="$SCRIPT_DIR/bin/code-oss.real"
          else
              echo "❌ 找不到 VSCode 可执行文件！"
              exit 1
          fi

          exec "$EXEC" \
              --no-sandbox \
              --disable-gpu-sandbox \
              --disable-software-rasterizer \
              --disable-gpu \
              --user-data-dir="$SCRIPT_DIR/user-data" \
              "$@"
          WRAPPER_EOF

          chmod +x "$REAL_EXEC"
          echo "✅ 包装器已创建: $REAL_EXEC"

          # 创建 start-vscode.sh 备用启动脚本
          echo "📌 创建备用启动脚本..."
          cat > start-vscode.sh << 'START_EOF'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"

          export ELECTRON_ENABLE_GPU=0
          export LIBGL_ALWAYS_SOFTWARE=1
          export NODE_OPTIONS="--max-old-space-size=4096"
          export ELECTRON_DISABLE_SANDBOX=1
          export GDK_BACKEND=x11
          export QT_QPA_PLATFORM=xcb
          export DISPLAY=:0
          export ELECTRON_DISABLE_CRASH_REPORTER=1
          export ELECTRON_DISABLE_CRASH_REPORTING=1
          export CRASHPAD_DISABLE=1

          if [ -f "$SCRIPT_DIR/tscode.real" ]; then
              EXEC="$SCRIPT_DIR/tscode.real"
          elif [ -f "$SCRIPT_DIR/bin/tscode.real" ]; then
              EXEC="$SCRIPT_DIR/bin/tscode.real"
          else
              echo "❌ 找不到 VSCode 可执行文件！"
              exit 1
          fi

          echo "=== VSCode for UOS ==="
          exec "$EXEC" \
              --no-sandbox \
              --disable-gpu-sandbox \
              --disable-software-rasterizer \
              --disable-gpu \
              --user-data-dir="$SCRIPT_DIR/user-data" \
              "$@"
          START_EOF

          chmod +x start-vscode.sh
          echo "✅ start-vscode.sh 已创建"

          # 创建桌面快捷方式
          echo "📌 创建桌面快捷方式..."
          cat > vscode-uos.desktop << 'EOF'
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=VSCode for UOS
          Comment=Visual Studio Code for UOS
          Exec=./tscode %F
          Icon=./resources/app/resources/linux/code.png
          Terminal=false
          Categories=Development;IDE;
          MimeType=text/plain;inode/directory;
          StartupNotify=true
          StartupWMClass=Code
          EOF
          echo "✅ vscode-uos.desktop 已创建"

          # 创建使用说明
          cat > 使用说明.txt << 'EOF'
          ==========================================
          VSCode for UOS - 使用说明
          ==========================================

          🖱️ 双击运行：直接双击 tscode
          📌 终端运行：./start-vscode.sh
          📌 桌面快捷方式：双击 vscode-uos.desktop
          📌 配置文件：./user-data 目录

          📦 预构建扩展：
          - cweijan.vscode-office
          - test-tech.beeeyes
          - test-tech.skillhub
          - MS-CEINTL.vscode-language-pack-zh-hans
          - test-tech.TestAgent
          ==========================================
          EOF

          echo "✅ 使用说明已创建"

          echo ""
          echo "📁 目录内容:"
          ls -la
          echo ""
          echo "✅ 双击运行版本创建完成"

      # ============================================================
      # 14. 打包（包含所有内容）
      # ============================================================
      - name: 📦 Package artifacts
        run: |
          echo "=========================================="
          echo "📦 打包产物"
          echo "=========================================="

          BUILD_DIR="${BUILD_DIR:-./VSCode-linux-x64}"

          echo "📁 构建目录: $BUILD_DIR"
          echo ""
          echo "📁 目录内容:"
          ls -la "$BUILD_DIR"

          # 检查关键目录
          echo ""
          echo "🔍 检查关键目录..."

          if [ -d "$BUILD_DIR/extensions" ]; then
            EXT_COUNT=$(ls -la "$BUILD_DIR/extensions" | wc -l)
            echo "✅ extensions 存在 ($EXT_COUNT 项)"
          else
            echo "❌ extensions 不存在!"
            echo "查找 extensions 位置..."
            find . -name "extensions" -type d 2>/dev/null | head -10
            exit 1
          fi

          if [ -d "$BUILD_DIR/node_modules" ]; then
            NODE_COUNT=$(ls -la "$BUILD_DIR/node_modules" | wc -l)
            echo "✅ node_modules 存在 ($NODE_COUNT 项)"
          else
            echo "❌ node_modules 不存在!"
            exit 1
          fi

          # 检查预构建扩展
          echo ""
          echo "📌 检查预构建扩展:"
          for ext in cweijan.vscode-office test-tech.beeeyes test-tech.skillhub MS-CEINTL.vscode-language-pack-zh-hans test-tech.TestAgent; do
            if [ -d "$BUILD_DIR/extensions/$ext" ]; then
              echo "   ✅ $ext"
            else
              echo "   ❌ $ext (未找到)"
            fi
          done

          # 确保所有脚本可执行
          echo ""
          echo "🔧 设置执行权限..."
          chmod +x $BUILD_DIR/tscode 2>/dev/null || echo "  ⚠️ tscode 不存在"
          chmod +x $BUILD_DIR/start-vscode.sh 2>/dev/null || echo "  ⚠️ start-vscode.sh 不存在"
          chmod +x $BUILD_DIR/*.desktop 2>/dev/null || true
          echo "✅ 权限设置完成"

          # 创建 artifacts 目录
          mkdir -p artifacts

          # 打包（不排除任何目录）
          VERSION="${{ github.event.inputs.version || '1.116.0' }}"
          echo ""
          echo "📌 开始打包..."

          # 使用完整路径打包
          cd "$(dirname "$BUILD_DIR")"
          tar -czf "$OLDPWD/artifacts/custom-vscode-uos-${VERSION}.tar.gz" \
            --preserve-permissions \
            "$(basename "$BUILD_DIR")"
          cd "$OLDPWD"

          echo "✅ 打包完成"
          echo ""
          echo "📦 打包结果:"
          ls -lh artifacts/

          # 验证包内容
          echo ""
          echo "🔍 验证包内容..."
          if tar -tzf "artifacts/custom-vscode-uos-${VERSION}.tar.gz" | grep -q "extensions"; then
            echo "✅ 包中包含 extensions"
          else
            echo "❌ 包中不包含 extensions!"
            exit 1
          fi

          if tar -tzf "artifacts/custom-vscode-uos-${VERSION}.tar.gz" | grep -q "node_modules"; then
            echo "✅ 包中包含 node_modules"
