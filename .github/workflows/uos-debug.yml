name: Build Custom VSCode for UOS (Double-click)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: true
        default: 'main'
      version:
        description: 'Package version'
        required: false
        default: '1.116.0'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch }}
          fetch-depth: 1

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'

      - name: 🔧 Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config libgtk-3-dev libxkbfile-dev \
            libkrb5-dev libgbm-dev rpm libx11-dev libxss-dev libxtst-dev \
            libnss3-dev libasound2-dev libglib2.0-dev libcairo2-dev \
            libpango1.0-dev libatk1.0-dev libgdk-pixbuf2.0-dev \
            python3 git wget curl

      - name: 🔧 Fix TypeScript scripts
        run: |
          echo 'console.log("✅ Preinstall OK");' > build/npm/preinstall.js
          sed -i 's/"preinstall": "node build\/npm\/preinstall.ts"/"preinstall": "node build\/npm\/preinstall.js"/' package.json
          echo 'console.log("✅ Postinstall OK");' > build/npm/postinstall.js
          sed -i 's/"postinstall": "node build\/npm\/postinstall.ts"/"postinstall": "node build\/npm\/postinstall.js"/' package.json

      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 📦 Install build tools
        run: |
          npm install -g tsx
          npm install --legacy-peer-deps \
            ternary-stream vscode-gulp-watch esbuild jsonc-parser \
            gulp-merge-json gulp-tsb gulp-sourcemaps gulp-filter \
            gulp-rename gulp-sort 2>/dev/null || true

      - name: 🔧 Fix extensions.ts
        run: |
          cat > build/lib/extensions.ts << 'EOF'
          import { Stream } from "stream";
          const empty: any[] = [];
          function emptyStream(): Stream {
            const s = new Stream.Readable();
            s._read = () => s.push(null);
            return s;
          }
          export function isWebExtension(): boolean { return false; }
          export function getExtensionStream(): Stream { return emptyStream(); }
          export function getExtensionDownloadStream(): Stream { return emptyStream(); }
          export function packageMarketplaceExtensionsStream(): Stream { return emptyStream(); }
          export function packageNativeLocalExtensionsStream(): Stream { return emptyStream(); }
          export function packageNonNativeLocalExtensionsStream(): Stream { return emptyStream(); }
          export function packageLocalExtensionsStream(): Stream { return emptyStream(); }
          export function packageExtensionsStream(): Stream { return emptyStream(); }
          export function packageCopilotExtensionStream(): Stream { return emptyStream(); }
          export function packageCopilotChatExtensionStream(): Stream { return emptyStream(); }
          export function packageCopilotAgentsExtensionStream(): Stream { return emptyStream(); }
          export function fromMarketplace(): any[] { return empty; }
          export async function fetchUrls(urls: string[], options: any): Promise<void> {
            console.log("⚠️ fetchUrls: disabled");
            return Promise.resolve();
          }
          export function buildExtensionMedia(): void {}
          export function compileExtensionMedia(): void {}
          export function buildExtensionMediaTask(done: any): void { done(); }
          export const builtInExtensions = empty;
          export const shouldDownloadBuiltInExtensions = false;
          export const webBuiltInExtensions = empty;
          export const shouldDownloadWebBuiltInExtensions = false;
          EOF
          echo 'export const builtInExtensions: any[] = [];
          export const shouldDownloadBuiltInExtensions = false;
          export const webBuiltInExtensions: any[] = [];
          export const shouldDownloadWebBuiltInExtensions = false;' > build/lib/builtInExtensions.ts
          echo 'import { Stream } from "stream";
          export async function fetchUrls(urls: string[], options: any): Promise<void> {
            console.log("⚠️ fetchUrls: disabled");
            return Promise.resolve();
          }' > build/lib/fetch.ts

      - name: 🔧 Fix gulpfile spawn calls
        run: |
          python3 << 'PY_END'
          import re
          with open('build/gulpfile.vscode.ts', 'r') as f:
              content = f.read()
          content = re.sub(r"spawn\('node'", "spawn('tsx'", content)
          content = re.sub(r'spawn\("node"', 'spawn("tsx"', content)
          content = re.sub(r"spawn\(process\.execPath", "spawn('tsx'", content)
          with open('build/gulpfile.vscode.ts', 'w') as f:
              f.write(content)
          print("✅ spawn calls fixed")
          PY_END

      - name: 🔧 Replace copilot.ts
        run: |
          cat > build/lib/copilot.ts << 'EOF'
          export async function prepareBuiltInCopilotExtensionShims(extRoot: string): Promise<void> {
              console.log('⚠️ Copilot extension shims preparation skipped for UOS build');
              return;
          }
          export function copyCopilotNativeDeps(productRoot: string): void {
              console.log('⚠️ Copilot native deps copy skipped for UOS build');
          }
          export function getCopilotExcludeFilter(): any {
              return function() { return false; };
          }
          EOF

      - name: 🔧 Disable Crashpad
        run: |
          echo "=========================================="
          echo "🔧 禁用 Crashpad"
          echo "=========================================="

          python3 << 'PY_JSON_END'
          import json
          import os
          if os.path.exists('product.json'):
              with open('product.json', 'r') as f:
                  data = json.load(f)
              data['enableCrashReport'] = False
              if 'crashReporter' not in data:
                  data['crashReporter'] = {}
              data['crashReporter']['disabled'] = True
              with open('product.json', 'w') as f:
                  json.dump(data, f, indent=2)
              print("✅ product.json 已修改")
          PY_JSON_END

          mkdir -p src/vs/platform/crash/common
          cat > src/vs/platform/crash/common/crashService.ts << 'CRASH_EOF'
          /*---------------------------------------------------------------------------------------------
           *  Copyright (c) Microsoft Corporation. All rights reserved.
           *  Licensed under the MIT License. See License.txt in the project root for license information.
           *--------------------------------------------------------------------------------------------*/
          // DISABLED: Crash service for UOS build
          import { createDecorator } from '../../../base/common/instantiation.js';
          export const ICrashService = createDecorator<ICrashService>('crashService');
          export interface ICrashService { _serviceBrand: undefined; }
          export class CrashService implements ICrashService {
              declare readonly _serviceBrand: undefined;
              constructor() { console.log('⚠️ Crash service disabled for UOS build'); }
          }
          CRASH_EOF
          echo "✅ crashService.ts 已创建"
          echo "✅ Crashpad 已禁用"

      - name: ⚙️ Set env
        run: |
          echo "VSCODE_SKIP_BUILTIN_EXTENSION_DOWNLOAD=1" >> $GITHUB_ENV
          echo "VSCODE_ELECTRON_SKIP_DOWNLOAD=1" >> $GITHUB_ENV
          echo "VSCODE_SKIP_PRELAUNCH=1" >> $GITHUB_ENV
          echo "VSCODE_SKIP_BUNDLED_EXTENSIONS=1" >> $GITHUB_ENV
          echo "ELECTRON_DISABLE_CRASH_REPORTER=1" >> $GITHUB_ENV
          echo "ELECTRON_DISABLE_CRASH_REPORTING=1" >> $GITHUB_ENV

      - name: 🔨 Build VSCode
        run: |
          export NODE_OPTIONS="--max-old-space-size=8192"
          export VSCODE_SKIP_BUILTIN_EXTENSION_DOWNLOAD=1
          export VSCODE_ELECTRON_SKIP_DOWNLOAD=1
          export VSCODE_SKIP_PRELAUNCH=1
          export VSCODE_SKIP_BUNDLED_EXTENSIONS=1
          export ELECTRON_DISABLE_CRASH_REPORTER=1
          export ELECTRON_DISABLE_CRASH_REPORTING=1
          echo "Start: $(date)"
          npx tsx node_modules/gulp/bin/gulp.js vscode-linux-x64 --no-color
          echo "Done: $(date)"

      - name: 🔍 Verify build contents
        run: |
          echo "=========================================="
          echo "🔍 验证构建产物"
          echo "=========================================="

          BUILD_DIR=""
          for dir in "./VSCode-linux-x64" "./vscode/VSCode-linux-x64" "../VSCode-linux-x64"; do
            if [ -d "$dir" ]; then
              BUILD_DIR="$dir"
              echo "✅ 找到构建目录: $BUILD_DIR"
              break
            fi
          done

          if [ -z "$BUILD_DIR" ]; then
            echo "❌ 找不到构建目录!"
            exit 1
          fi

          echo "BUILD_DIR=$BUILD_DIR" >> $GITHUB_ENV

          echo ""
          echo "📌 构建目录内容:"
          ls -la "$BUILD_DIR"

      # ============================================================
      # 12. 核心修复：保留自定义二进制，从官方复制原生模块
      # ============================================================
      - name: 📥 Extract official and copy native modules
        run: |
          echo "=========================================="
          echo "📥 保留自定义二进制，从官方复制原生模块"
          echo "=========================================="

          BUILD_DIR="${BUILD_DIR:-./VSCode-linux-x64}"

          # 1. 检查自定义二进制
          echo ""
          echo "📌 1. 检查自定义二进制..."
          if [ -f "$BUILD_DIR/code" ]; then
            echo "   ✅ 找到 code 文件"
            mv "$BUILD_DIR/code" "$BUILD_DIR/tscode.real"
            echo "   ✅ 重命名为 tscode.real"
          elif [ -f "$BUILD_DIR/tscode.real" ]; then
            echo "   ✅ 找到 tscode.real"
          else
            echo "   ❌ 找不到任何可执行文件！"
            echo "   搜索所有可执行文件..."
            find "$BUILD_DIR" -maxdepth 1 -type f -executable 2>/dev/null | head -10
            exit 1
          fi

          # 2. 备份自定义二进制和配置文件
          echo ""
          echo "📌 2. 备份自定义文件..."
          mkdir -p /tmp/backup-custom

          if [ -f "$BUILD_DIR/tscode.real" ]; then
            cp "$BUILD_DIR/tscode.real" /tmp/backup-custom/
            echo "   ✅ 备份 tscode.real"
          fi
          if [ -f "$BUILD_DIR/tscode" ]; then
            cp "$BUILD_DIR/tscode" /tmp/backup-custom/
            echo "   ✅ 备份 tscode"
          fi
          if [ -f "$BUILD_DIR/package.json" ]; then
            cp "$BUILD_DIR/package.json" /tmp/backup-custom/
            echo "   ✅ 备份 package.json"
          fi
          if [ -f "$BUILD_DIR/product.json" ]; then
            cp "$BUILD_DIR/product.json" /tmp/backup-custom/
            echo "   ✅ 备份 product.json"
          fi

          # 3. 下载官方 tar.gz
          echo ""
          echo "📌 3. 下载官方 tar.gz..."
          wget -q --show-progress https://update.code.visualstudio.com/latest/linux-x64/stable -O /tmp/code.tar.gz

          if [ ! -f "/tmp/code.tar.gz" ]; then
            echo "❌ 下载失败!"
            exit 1
          fi

          mkdir -p /tmp/code-tar
          echo "📌 解压官方 tar.gz..."
          tar -xzf /tmp/code.tar.gz -C /tmp/code-tar 2>/dev/null

          OFFICIAL_DIR=$(find /tmp/code-tar -type d -name "VSCode-linux-x64" 2>/dev/null | head -1)

          if [ -z "$OFFICIAL_DIR" ] || [ ! -d "$OFFICIAL_DIR" ]; then
            echo "❌ 找不到官方 VSCode 目录！"
            exit 1
          fi

          echo "✅ 找到官方目录: $OFFICIAL_DIR"

          # 4. 从官方复制原生模块到构建目录
          echo ""
          echo "📌 4. 从官方复制原生模块..."

          OFFICIAL_NODE_MODULES=""
          if [ -d "$OFFICIAL_DIR/resources/app/node_modules" ]; then
            OFFICIAL_NODE_MODULES="$OFFICIAL_DIR/resources/app/node_modules"
          elif [ -d "$OFFICIAL_DIR/node_modules" ]; then
            OFFICIAL_NODE_MODULES="$OFFICIAL_DIR/node_modules"
          fi

          if [ -z "$OFFICIAL_NODE_MODULES" ]; then
            echo "❌ 找不到官方 node_modules"
            exit 1
          fi

          echo "   ✅ 找到官方 node_modules: $OFFICIAL_NODE_MODULES"

          NATIVE_MODULES=(
            "node-pty"
            "@vscode/spdlog"
            "@vscode/sqlite3"
            "native-keymap"
          )

          mkdir -p "$BUILD_DIR/resources/app/node_modules"

          for module in "${NATIVE_MODULES[@]}"; do
            if [ -d "$OFFICIAL_NODE_MODULES/$module" ]; then
              echo "   ✅ 找到 $module"
              TARGET_DIR="$BUILD_DIR/resources/app/node_modules/$(dirname $module 2>/dev/null || echo $module)"
              mkdir -p "$TARGET_DIR"
              rm -rf "$TARGET_DIR/$(basename $module)" 2>/dev/null
              cp -r "$OFFICIAL_NODE_MODULES/$module" "$TARGET_DIR/"
              NODE_FILES=$(find "$BUILD_DIR/resources/app/node_modules/$module" -name "*.node" -type f 2>/dev/null | wc -l)
              echo "   ✅ $module 复制成功 ($NODE_FILES 个 .node 文件)"
            else
              echo "   ❌ 找不到 $module"
            fi
          done

          # 5. 从官方复制 snapshot 文件
          echo ""
          echo "📌 5. 从官方复制 snapshot 文件..."
          if [ -f "$OFFICIAL_DIR/snapshot_blob.bin" ]; then
            cp "$OFFICIAL_DIR/snapshot_blob.bin" "$BUILD_DIR/"
            echo "   ✅ 复制 snapshot_blob.bin"
          fi
          if [ -f "$OFFICIAL_DIR/v8_context_snapshot.bin" ]; then
            cp "$OFFICIAL_DIR/v8_context_snapshot.bin" "$BUILD_DIR/"
            echo "   ✅ 复制 v8_context_snapshot.bin"
          fi

          # 6. 从官方复制 chrome-sandbox
          echo ""
          echo "📌 6. 从官方复制 chrome-sandbox..."
          if [ -f "$OFFICIAL_DIR/chrome-sandbox" ]; then
            cp "$OFFICIAL_DIR/chrome-sandbox" "$BUILD_DIR/"
            chmod 4755 "$BUILD_DIR/chrome-sandbox" 2>/dev/null || true
            echo "   ✅ 复制 chrome-sandbox"
          fi

          # 7. 恢复自定义二进制
          echo ""
          echo "📌 7. 恢复自定义二进制..."
          if [ -f "/tmp/backup-custom/tscode.real" ]; then
            cp "/tmp/backup-custom/tscode.real" "$BUILD_DIR/"
            chmod +x "$BUILD_DIR/tscode.real"
            echo "   ✅ 恢复 tscode.real"
          fi
          if [ -f "/tmp/backup-custom/tscode" ]; then
            cp "/tmp/backup-custom/tscode" "$BUILD_DIR/"
            chmod +x "$BUILD_DIR/tscode"
            echo "   ✅ 恢复 tscode"
          fi

          # 8. 恢复配置文件
          echo ""
          echo "📌 8. 恢复配置文件..."
          if [ -f "/tmp/backup-custom/package.json" ]; then
            cp "/tmp/backup-custom/package.json" "$BUILD_DIR/"
            echo "   ✅ 恢复 package.json"
          fi
          if [ -f "/tmp/backup-custom/product.json" ]; then
            cp "/tmp/backup-custom/product.json" "$BUILD_DIR/"
            echo "   ✅ 恢复 product.json"
          fi

          # 9. 清理
          rm -rf /tmp/code-tar /tmp/code.tar.gz /tmp/backup-custom

          # 10. 最终验证
          echo ""
          echo "📌 9. 最终验证:"

          echo "   自定义二进制:"
          ls -la "$BUILD_DIR" | grep -E "tscode" || echo "   ❌ 找不到 tscode 文件"

          echo ""
          echo "   原生模块:"
          for module in node-pty @vscode/spdlog @vscode/sqlite3 native-keymap; do
            if [ -d "$BUILD_DIR/resources/app/node_modules/$module" ]; then
              NODE_FILES=$(find "$BUILD_DIR/resources/app/node_modules/$module" -name "*.node" -type f 2>/dev/null | wc -l)
              echo "   ✅ $module ($NODE_FILES 个 .node 文件)"
            else
              echo "   ❌ $module (缺失)"
            fi
          done

          echo ""
          echo "   Snapshot 文件:"
          ls -la "$BUILD_DIR" | grep -E "snapshot" || echo "   ❌ 找不到 snapshot 文件"

      # ============================================================
      # 13. 查找并复制预构建扩展
      # ============================================================
      - name: 📂 Find and copy prebuilt extensions
        run: |
          echo "=========================================="
          echo "🔍 查找并复制预构建扩展"
          echo "=========================================="

          BUILD_DIR="${BUILD_DIR:-./VSCode-linux-x64}"
          TARGET_DIR="$BUILD_DIR/resources/app/extensions"
          mkdir -p "$TARGET_DIR"

          if [ -d "./prebuilt-extensions" ]; then
            echo "✅ 找到 prebuilt-extensions 目录"

            # 查找 testagent
            VSIX_FILE=""
            for pattern in "./prebuilt-extensions/linux/x64/testagent*.vsix" "./prebuilt-extensions/*testagent*.vsix"; do
              FOUND=$(ls -1 $pattern 2>/dev/null | head -1)
              if [ -n "$FOUND" ] && [ -f "$FOUND" ]; then
                VSIX_FILE="$FOUND"
                break
              fi
            done

            if [ -n "$VSIX_FILE" ]; then
              echo "   ✅ 找到 testagent: $VSIX_FILE"
              rm -rf "$TARGET_DIR/test-tech.TestAgent" 2>/dev/null
              mkdir -p "$TARGET_DIR/test-tech.TestAgent"
              unzip -q "$VSIX_FILE" -d "$TARGET_DIR/test-tech.TestAgent"
              if [ -d "$TARGET_DIR/test-tech.TestAgent/extension" ]; then
                mv "$TARGET_DIR/test-tech.TestAgent/extension"/* "$TARGET_DIR/test-tech.TestAgent/"
                rm -rf "$TARGET_DIR/test-tech.TestAgent/extension"
              fi
              echo "   ✅ test-tech.TestAgent 已安装"
            fi

            # 解压其他扩展
            declare -A EXTS=(
              ["cweijan.vscode-office"]="cweijan.vscode-office-4.1.5.vsix"
              ["test-tech.beeeyes"]="test-tech.beeeyes-0.0.1.vsix"
              ["test-tech.skillhub"]="test-tech.skillhub-1.0.3-uat.vsix"
              ["MS-CEINTL.vscode-language-pack-zh-hans"]="vscode-language-pack-zh-hans-v1.108.0.vsix"
            )

            for ext in "${!EXTS[@]}"; do
              vsix_file="./prebuilt-extensions/${EXTS[$ext]}"
              if [ -f "$vsix_file" ]; then
                echo "   📦 解压 $ext..."
                rm -rf "$TARGET_DIR/$ext" 2>/dev/null
                mkdir -p "$TARGET_DIR/$ext"
                unzip -q "$vsix_file" -d "$TARGET_DIR/$ext"
                if [ -d "$TARGET_DIR/$ext/extension" ]; then
                  mv "$TARGET_DIR/$ext/extension"/* "$TARGET_DIR/$ext/"
                  rm -rf "$TARGET_DIR/$ext/extension"
                fi
                echo "   ✅ $ext 已安装"
              fi
            done
          fi

      # ============================================================
      # 14. 创建启动脚本
      # ============================================================
      - name: 🚀 Create double-click executable
        run: |
          echo "=========================================="
          echo "🚀 创建双击运行版本"
          echo "=========================================="

          BUILD_DIR="${BUILD_DIR:-./VSCode-linux-x64}"
          cd "$BUILD_DIR"

          # 检查 tscode.real 是否存在
          if [ ! -f "./tscode.real" ]; then
            echo "❌ tscode.real 不存在！"
            echo "当前目录内容:"
            ls -la
            exit 1
          fi

          # 确保可执行
          chmod +x tscode.real

          # 创建 tscode 包装脚本
          cat > tscode << 'WRAPPER_EOF'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"

          export ELECTRON_ENABLE_GPU=0
          export LIBGL_ALWAYS_SOFTWARE=1
          export NODE_OPTIONS="--max-old-space-size=4096"
          export ELECTRON_DISABLE_SANDBOX=1
          export GDK_BACKEND=x11
          export QT_QPA_PLATFORM=xcb
          export DISPLAY=:0
          export ELECTRON_DISABLE_CRASH_REPORTER=1
          export ELECTRON_DISABLE_CRASH_REPORTING=1
          export CRASHPAD_DISABLE=1

          if [ -f "$SCRIPT_DIR/tscode.real" ]; then
              EXEC="$SCRIPT_DIR/tscode.real"
          else
              echo "❌ 找不到 VSCode 可执行文件！"
              exit 1
          fi

          USER_DATA_DIR="$SCRIPT_DIR/user-data"
          mkdir -p "$USER_DATA_DIR"

          exec "$EXEC" \
              --no-sandbox \
              --disable-gpu-sandbox \
              --disable-software-rasterizer \
              --disable-gpu \
              --user-data-dir="$USER_DATA_DIR" \
              "$@"
          WRAPPER_EOF

          chmod +x tscode

          # 创建 start-vscode.sh
          cat > start-vscode.sh << 'START_EOF'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"

          export ELECTRON_ENABLE_GPU=0
          export LIBGL_ALWAYS_SOFTWARE=1
          export NODE_OPTIONS="--max-old-space-size=4096"
          export ELECTRON_DISABLE_SANDBOX=1
          export GDK_BACKEND=x11
          export QT_QPA_PLATFORM=xcb
          export DISPLAY=:0
          export ELECTRON_DISABLE_CRASH_REPORTER=1
          export ELECTRON_DISABLE_CRASH_REPORTING=1
          export CRASHPAD_DISABLE=1

          if [ -f "$SCRIPT_DIR/tscode.real" ]; then
              EXEC="$SCRIPT_DIR/tscode.real"
          else
              echo "❌ 找不到 VSCode 可执行文件！"
              exit 1
          fi

          echo "=== VSCode for UOS ==="
          USER_DATA_DIR="$SCRIPT_DIR/user-data"
          mkdir -p "$USER_DATA_DIR"

          exec "$EXEC" \
              --no-sandbox \
              --disable-gpu-sandbox \
              --disable-software-rasterizer \
              --disable-gpu \
              --user-data-dir="$USER_DATA_DIR" \
              "$@"
          START_EOF

          chmod +x start-vscode.sh

          # 创建桌面快捷方式
          cat > vscode-uos.desktop << 'EOF'
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=VSCode for UOS
          Comment=Visual Studio Code for UOS
          Exec=./tscode %F
          Icon=./resources/app/resources/linux/code.png
          Terminal=false
          Categories=Development;IDE;
          MimeType=text/plain;inode/directory;
          StartupNotify=true
          StartupWMClass=Code
          EOF

          echo "✅ 双击运行版本创建完成"
          echo ""
          echo "📁 目录内容:"
          ls -la | head -20

      # ============================================================
      # 15. 打包
      # ============================================================
      - name: 📦 Package
        run: |
          BUILD_DIR="${BUILD_DIR:-./VSCode-linux-x64}"
          VERSION="${{ github.event.inputs.version || '1.116.0' }}"

          chmod +x $BUILD_DIR/tscode 2>/dev/null || true
          chmod +x $BUILD_DIR/start-vscode.sh 2>/dev/null || true
          chmod +x $BUILD_DIR/chrome-sandbox 2>/dev/null || true
          chmod +x $BUILD_DIR/tscode.real 2>/dev/null || true

          echo ""
          echo "📌 打包前验证:"
          echo "   tscode.real: $(if [ -f $BUILD_DIR/tscode.real ]; then echo '✅'; else echo '❌'; fi)"
          echo "   tscode: $(if [ -f $BUILD_DIR/tscode ]; then echo '✅'; else echo '❌'; fi)"
          echo "   extensions 数量: $(ls -la $BUILD_DIR/resources/app/extensions/ 2>/dev/null | wc -l)"
          echo "   node_modules 存在: $(if [ -d $BUILD_DIR/resources/app/node_modules ]; then echo '✅'; else echo '❌'; fi)"

          echo ""
          echo "📌 原生模块验证:"
          for module in @vscode/spdlog @vscode/sqlite3 native-keymap node-pty; do
            if [ -d "$BUILD_DIR/resources/app/node_modules/$module" ]; then
              NODE_FILES=$(find "$BUILD_DIR/resources/app/node_modules/$module" -name "*.node" -type f 2>/dev/null | wc -l)
              if [ "$NODE_FILES" -gt 0 ]; then
                echo "   ✅ $module ($NODE_FILES 个 .node 文件)"
              else
                echo "   ⚠️ $module (存在但无 .node 文件)"
              fi
            else
              echo "   ❌ $module"
            fi
          done

          echo ""
          echo "📌 自定义二进制:"
          ls -la $BUILD_DIR | grep tscode

          tar -czf "vscode-uos-${VERSION}-双击运行.tar.gz" \
            --preserve-permissions \
            -C "$(dirname "$BUILD_DIR")" \
            "$(basename "$BUILD_DIR")"

          echo "✅ 打包完成:"
          ls -lh vscode-uos-*.tar.gz

      - name: 📤 Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: vscode-uos-double-click
          path: vscode-uos-*.tar.gz
          retention-days: 30

      - name: 📊 Build summary
        if: always()
        run: |
          echo "=========================================="
          echo "📊 BUILD SUMMARY"
          echo "=========================================="
          echo "🟢 Status: ${{ job.status }}"
          echo "📦 Version: ${{ github.event.inputs.version || '1.116.0' }}"
          echo "=========================================="
          if [ "${{ job.status }}" == "success" ]; then
            echo "🎉 Build completed!"
            echo ""
            echo "✅ 保留了自定义二进制（包含所有二次开发修改）"
            echo "✅ 从官方复制了原生模块和 snapshot"
            echo ""
            echo "📌 On UOS:"
            echo "   1. tar -xzf vscode-uos-*.tar.gz"
            echo "   2. cd VSCode-linux-x64"
            echo "   3. ./tscode"
          fi