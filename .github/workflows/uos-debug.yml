name: Build VSCode for UOS (glibc 2.28)

on:
  workflow_dispatch:
    inputs:
      vscode_version:
        description: 'VSCode version to build'
        required: false
        default: '1.116.0'
        type: string

jobs:
  build-for-uos:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout VSCode source
        uses: actions/checkout@v6
        with:
          repository: microsoft/vscode  # 明确指定VSCode仓库
          lfs: false
          fetch-depth: 1
          ref: ${{ github.event.inputs.vscode_version || '1.116.0' }}

      - name: Debug - Verify checkout
        run: |
          echo "=== CHECKOUT STATUS ==="
          echo "Current directory: $(pwd)"
          echo "Files count: $(find . -type f | wc -l)"
          echo "Git describe: $(git describe --tags 2>/dev/null || echo 'no tag')"
          echo "Version from package.json: $(cat package.json 2>/dev/null | grep '"version"' | head -1 || echo 'not found')"
          echo "Current branch/tag: $(git branch --show-current 2>/dev/null || git describe --tags 2>/dev/null || echo 'detached')"

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'  # VSCode 1.116.0 需要 Node 20
          cache: 'yarn'

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libxkbfile-dev \
            libkrb5-dev \
            libgbm-dev \
            rpm \
            libx11-dev \
            libxss-dev \
            libxtst-dev \
            libnss3-dev \
            libasound2-dev \
            libglib2.0-dev \
            libcairo2-dev \
            libpango1.0-dev \
            libatk1.0-dev \
            libgdk-pixbuf2.0-dev

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            node_modules
            .yarn/cache
            ~/.cache/electron
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-vscode-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-vscode-

      - name: Install yarn and dependencies
        run: |
          npm install -g yarn@1.22.22
          yarn --version
          # VSCode 1.116.0 使用新的构建系统
          yarn install --frozen-lockfile --network-timeout 600000

      - name: Compile TypeScript
        run: |
          yarn compile-build
          yarn compile-extensions-build

      - name: Build VSCode Linux x64
        run: |
          export VSCODE_SKIP_PRELAUNCH=1
          export NODE_OPTIONS="--max-old-space-size=4096"
          # VSCode 1.116.0 的构建命令
          yarn gulp vscode-linux-x64-min

      - name: Find build output
        run: |
          echo "=== SEARCHING FOR BUILD OUTPUT ==="
          find . -name "VSCode-linux-x64" -type d 2>/dev/null
          find .. -name "VSCode-linux-x64" -type d 2>/dev/null

          # 检查可能的输出位置
          for dir in "./VSCode-linux-x64" "../VSCode-linux-x64" "./out" "./build"; do
            if [ -d "$dir" ]; then
              echo "Found: $dir"
              ls -la "$dir" | head -20
            fi
          done

      - name: Create UOS startup scripts
        run: |
          # 查找构建输出
          BUILD_DIR=""
          if [ -d "../VSCode-linux-x64" ]; then
            BUILD_DIR="../VSCode-linux-x64"
          elif [ -d "./VSCode-linux-x64" ]; then
            BUILD_DIR="./VSCode-linux-x64"
          else
            echo "ERROR: Build output not found!"
            echo "Creating debug info..."
            echo "Current directory contents:"
            ls -la
            echo "Searching for code executable:"
            find . -name "code" -type f 2>/dev/null | head -10
            exit 1
          fi

          cd "$BUILD_DIR"

          # 验证code可执行文件存在
          if [ ! -f "./code" ]; then
            echo "ERROR: code executable not found in $BUILD_DIR"
            echo "Files in directory:"
            ls -la
            exit 1
          fi

          # 创建UOS启动脚本
          cat > run-uos.sh << 'EOF'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          echo "=== VSCode UOS Launcher ==="
          echo "Version: 1.116.0"
          echo "Script directory: $SCRIPT_DIR"

          # 检查是否在UOS环境
          if grep -q "UOS" /etc/os-release 2>/dev/null; then
            echo "Detected UOS system, enabling compatibility mode..."
            export ELECTRON_ENABLE_GPU=0
            export LIBGL_ALWAYS_SOFTWARE=1
          fi

          # 启动VSCode
          exec "$SCRIPT_DIR/code" \
            --no-sandbox \
            --disable-gpu-sandbox \
            --disable-software-rasterizer \
            --enable-features=UseOzonePlatform \
            --ozone-platform=wayland \
            "$@"
          EOF
          chmod +x run-uos.sh

          # 创建桌面入口文件
          cat > vscode-uos.desktop << 'EOF'
          [Desktop Entry]
          Version=1.0
          Name=Visual Studio Code (UOS)
          Comment=Code Editing. Redefined.
          Exec=/path/to/VSCode-linux-x64/run-uos.sh %F
          Icon=/path/to/VSCode-linux-x64/resources/app/resources/linux/code.png
          Terminal=false
          Type=Application
          Categories=Development;IDE;
          MimeType=text/plain;inode/directory;
          StartupWMClass=Code
          Actions=new-window;

          [Desktop Action new-window]
          Name=New Window
          Exec=/path/to/VSCode-linux-x64/run-uos.sh -n
          EOF

          echo "Startup script created successfully"
          cat run-uos.sh

      - name: Package artifacts
        run: |
          mkdir -p artifacts
          BUILD_DIR=""
          if [ -d "../VSCode-linux-x64" ]; then
            BUILD_DIR="../VSCode-linux-x64"
            cd ..
          elif [ -d "./VSCode-linux-x64" ]; then
            BUILD_DIR="./VSCode-linux-x64"
          else
            echo "ERROR: Build output not found!"
            exit 1
          fi

          # 打包，排除不必要的文件
          tar -czf artifacts/vscode-uos-1.116.0.tar.gz \
            --exclude='*.map' \
            --exclude='node_modules' \
            --exclude='.git' \
            --exclude='*.ts' \
            "$BUILD_DIR" 2>/dev/null || tar -czf artifacts/vscode-uos-1.116.0.tar.gz "$BUILD_DIR"

          echo "Package created: $(du -h artifacts/vscode-uos-1.116.0.tar.gz)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: vscode-uos-1.116.0
          path: artifacts/vscode-uos-1.116.0.tar.gz
          retention-days: 30

      - name: Create release notes
        if: success()
        run: |
          cat > artifacts/README.md << 'EOF'
          # VSCode 1.116.0 for UOS (统信UOS)

          ## 构建信息
          - Version: 1.116.0
          - Build Date: $(date)
          - Architecture: x64
          - Compatible with: UOS (glibc 2.28+)

          ## 安装方法
          1. 解压: `tar -xzf vscode-uos-1.116.0.tar.gz`
          2. 进入目录: `cd VSCode-linux-x64`
          3. 运行: `./run-uos.sh`

          ## 特性
          - 自动启用 UOS 兼容模式
          - 默认禁用沙箱（--no-sandbox）
          - 支持 Wayland 显示服务器
          - 包含桌面快捷方式文件

          ## 注意事项
          - 如果遇到显示问题，尝试设置环境变量：