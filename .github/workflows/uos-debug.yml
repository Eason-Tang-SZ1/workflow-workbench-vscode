name: Build VSCode for UOS (glibc 2.28)

on:
  workflow_dispatch:
    inputs:
      vscode_version:
        description: 'VSCode version to build'
        required: false
        default: '1.116.0'
        type: string

jobs:
  build-for-uos:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout VSCode source
        uses: actions/checkout@v6
        with:
          repository: microsoft/vscode
          lfs: false
          fetch-depth: 1
          ref: ${{ github.event.inputs.vscode_version || '1.116.0' }}
          path: vscode

      - name: Debug - Verify checkout
        run: |
          echo "=== CHECKOUT STATUS ==="
          echo "Current directory: $(pwd)"
          ls -la
          echo "VSCode source directory:"
          ls -la vscode/ | head -20
          if [ -f "vscode/package.json" ]; then
            echo "VSCode version: $(cat vscode/package.json | grep '"version"' | head -1)"
          fi
          # VSCode 1.116.0 使用 package-lock.json 而不是 yarn.lock
          if [ -f "vscode/package-lock.json" ]; then
            echo "package-lock.json found ✅"
          else
            echo "ERROR: package-lock.json not found!"
            echo "Available files:"
            ls -la vscode/ | grep -E "lock|json"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: vscode/package-lock.json

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libxkbfile-dev \
            libkrb5-dev \
            libgbm-dev \
            rpm \
            libx11-dev \
            libxss-dev \
            libxtst-dev \
            libnss3-dev \
            libasound2-dev \
            libglib2.0-dev \
            libcairo2-dev \
            libpango1.0-dev \
            libatk1.0-dev \
            libgdk-pixbuf2.0-dev \
            libsecret-1-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev

      - name: Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: |
            vscode/node_modules
            ~/.npm
            ~/.cache/electron
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-npm-vscode-${{ hashFiles('vscode/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-vscode-

      - name: Install npm dependencies
        working-directory: ./vscode
        run: |
          npm --version
          node --version
          # VSCode 1.116.0 使用 npm 安装
          npm ci --prefer-offline --no-audit --progress=false

      - name: Compile TypeScript
        working-directory: ./vscode
        run: |
          npm run compile-build
          npm run compile-extensions-build

      - name: Build VSCode Linux x64
        working-directory: ./vscode
        run: |
          export VSCODE_SKIP_PRELAUNCH=1
          export NODE_OPTIONS="--max-old-space-size=4096"
          # VSCode 1.116.0 使用 npm run gulp
          npm run gulp vscode-linux-x64-min

      - name: Find and verify build output
        run: |
          echo "=== SEARCHING FOR BUILD OUTPUT ==="
          find ./vscode -name "VSCode-linux-x64" -type d 2>/dev/null
          find . -name "VSCode-linux-x64" -type d 2>/dev/null

          # 检查可能的输出位置
          for dir in "./vscode/VSCode-linux-x64" "./vscode/../VSCode-linux-x64" "./VSCode-linux-x64"; do
            if [ -d "$dir" ]; then
              echo "Found build output: $dir"
              ls -la "$dir" | head -20
            fi
          done

      - name: Create UOS startup scripts
        run: |
          # 查找构建输出
          BUILD_DIR=""
          if [ -d "./vscode/VSCode-linux-x64" ]; then
            BUILD_DIR="./vscode/VSCode-linux-x64"
          elif [ -d "./VSCode-linux-x64" ]; then
            BUILD_DIR="./VSCode-linux-x64"
          else
            echo "ERROR: Build output not found!"
            echo "Searching for any VSCode directory:"
            find . -name "*VSCode*" -type d 2>/dev/null | head -10
            exit 1
          fi

          cd "$BUILD_DIR"

          # 验证 code 可执行文件存在
          if [ ! -f "./code" ]; then
            echo "ERROR: code executable not found in $BUILD_DIR"
            echo "Files in directory:"
            ls -la
            exit 1
          fi

          # 创建 UOS 启动脚本
          cat > run-uos.sh << 'EOF'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          echo "=== VSCode UOS Launcher ==="
          echo "Version: 1.116.0"
          echo "Script directory: $SCRIPT_DIR"

          # 检测 UOS 系统
          if grep -q "UOS" /etc/os-release 2>/dev/null; then
            echo "Detected UOS system, enabling compatibility mode..."
            export ELECTRON_ENABLE_GPU=0
            export LIBGL_ALWAYS_SOFTWARE=1
            export NODE_OPTIONS="--max-old-space-size=4096"
          fi

          # 检查是否设置了不安全的运行
          echo "Starting VSCode with UOS compatibility..."
          exec "$SCRIPT_DIR/code" \
            --no-sandbox \
            --disable-gpu-sandbox \
            --disable-software-rasterizer \
            --enable-features=UseOzonePlatform \
            --ozone-platform=wayland \
            "$@"
          EOF
          chmod +x run-uos.sh

          echo "Startup script created successfully"
          cat run-uos.sh

      - name: Package artifacts
        run: |
          mkdir -p artifacts
          BUILD_DIR=""
          if [ -d "./vscode/VSCode-linux-x64" ]; then
            BUILD_DIR="./vscode/VSCode-linux-x64"
          elif [ -d "./VSCode-linux-x64" ]; then
            BUILD_DIR="./VSCode-linux-x64"
          else
            echo "ERROR: Build output not found!"
            exit 1
          fi

          # 打包
          VERSION="${{ github.event.inputs.vscode_version || '1.116.0' }}"
          cd "$(dirname "$BUILD_DIR")"
          tar -czf "$OLDPWD/artifacts/vscode-uos-${VERSION}.tar.gz" \
            --exclude='*.map' \
            --exclude='*.ts' \
            --exclude='node_modules' \
            "$(basename "$BUILD_DIR")"
          cd "$OLDPWD"

          echo "Package created: $(du -h artifacts/vscode-uos-*.tar.gz)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: vscode-uos-${{ github.event.inputs.vscode_version || '1.116.0' }}
          path: artifacts/vscode-uos-*.tar.gz
          retention-days: 30

      - name: Create release notes
        if: success()
        run: |
          cat > artifacts/README.md << 'EOF'
          # VSCode 1.116.0 for UOS (统信UOS)

          ## 构建信息
          - Version: 1.116.0
          - Build Date: $(date)
          - Architecture: x64
          - Package Manager: npm
          - Compatible with: UOS (glibc 2.28+)

          ## 安装方法
          ```bash
          # 1. 解压
          tar -xzf vscode-uos-1.116.0.tar.gz

          # 2. 进入目录
          cd VSCode-linux-x64

          # 3. 运行
          ./run-uos.sh