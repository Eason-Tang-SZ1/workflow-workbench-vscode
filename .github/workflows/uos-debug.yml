name: Build VSCode for UOS (glibc 2.28 Compatible)

on:
  workflow_dispatch:
    inputs:
      vscode_version:
        description: 'VSCode version to build'
        required: false
        default: '1.116.0'
        type: string

jobs:
  build-for-uos:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      # ========== 步骤 1: 环境信息 ==========
      - name: 📊 Environment info
        run: |
          echo "=========================================="
          echo "🚀 Starting VSCode build for UOS"
          echo "📦 Version: ${{ github.event.inputs.vscode_version || '1.116.0' }}"
          echo "🖥️  Runner: $(cat /etc/os-release | grep PRETTY_NAME)"
          echo "=========================================="

      # ========== 步骤 2: 克隆 VSCode 源码 ==========
      - name: 📥 Checkout VSCode source
        uses: actions/checkout@v6
        with:
          repository: microsoft/vscode
          lfs: false
          fetch-depth: 1
          ref: ${{ github.event.inputs.vscode_version || '1.116.0' }}
          path: vscode

      # ========== 步骤 3: 安装 Node.js 22 ==========
      - name: 📦 Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'

      # ========== 步骤 4: 安装系统依赖 ==========
      - name: 🔧 Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libxkbfile-dev \
            libkrb5-dev \
            libgbm-dev \
            rpm \
            libx11-dev \
            libxss-dev \
            libxtst-dev \
            libnss3-dev \
            libasound2-dev \
            libglib2.0-dev \
            libcairo2-dev \
            libpango1.0-dev \
            libatk1.0-dev \
            libgdk-pixbuf2.0-dev \
            libsecret-1-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-x11-dev \
            python3 \
            git

      # ========== 步骤 5: 设置 glibc 兼容性 ==========
      - name: 🔄 Set glibc compatibility for UOS
        run: |
          echo "CXXFLAGS=-D_GLIBCXX_USE_CXX11_ABI=0" >> $GITHUB_ENV
          echo "CFLAGS=-D_GLIBCXX_USE_CXX11_ABI=0" >> $GITHUB_ENV
          echo "✅ Compatibility flags set"

      # ========== 步骤 6: 缓存 npm 依赖 ==========
      - name: 💾 Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: |
            vscode/node_modules
            ~/.npm
            ~/.cache/electron
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-npm22-vscode-${{ hashFiles('vscode/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm22-vscode-

      # ========== 步骤 7: 修复 preinstall 脚本 ==========
      - name: 🔧 Fix preinstall script
        run: |
          echo "=========================================="
          echo "🔧 Fixing preinstall script..."
          echo "=========================================="
          cd vscode

          # 创建 JS 版本
          cat > build/npm/preinstall.js << 'EOF'
          console.log('Running preinstall script (JS version)...');
          console.log('Node version:', process.version);
          if (process.env.CI) {
            console.log('CI environment detected');
          }
          console.log('✅ Preinstall completed successfully');
          EOF

          echo "✅ Preinstall script fixed"

      # ========== 步骤 8: 安装所有 npm 依赖 ==========
      - name: 📦 Install all npm dependencies
        working-directory: ./vscode
        run: |
          echo "=========================================="
          echo "📦 Installing all npm dependencies..."
          echo "Node version: $(node --version)"
          echo "npm version: $(npm --version)"
          echo "=========================================="
          echo "Start time: $(date)"

          # 安装所有依赖（包括 devDependencies）
          npm install --legacy-peer-deps --ignore-scripts

          echo "✅ npm install completed at: $(date)"
          echo "📁 node_modules size: $(du -sh node_modules 2>/dev/null | cut -f1 || echo 'N/A')"

      # ========== 步骤 9: 手动安装缺失的包 ==========
      - name: 📦 Install missing packages
        working-directory: ./vscode
        run: |
          echo "=========================================="
          echo "📦 Installing missing packages..."
          echo "=========================================="

          # 安装缺失的 ternary-stream 和其他可能缺失的包
          npm install ternary-stream gulp-tsb gulp-sourcemaps --legacy-peer-deps --ignore-scripts

          echo "✅ Missing packages installed"

      # ========== 步骤 10: 手动运行 preinstall ==========
      - name: 🔨 Run preinstall script
        working-directory: ./vscode
        run: |
          echo "=========================================="
          echo "🔨 Running preinstall script..."
          echo "=========================================="
          node build/npm/preinstall.js
          echo "✅ preinstall completed"

      # ========== 步骤 11: 构建 VSCode Linux x64 ==========
      - name: 🔨 Build VSCode Linux x64
        working-directory: ./vscode
        run: |
          echo "=========================================="
          echo "🔨 Building VSCode Linux x64..."
          echo "⏰ This may take 30-40 minutes..."
          echo "=========================================="
          export VSCODE_SKIP_PRELAUNCH=1
          export NODE_OPTIONS="--max-old-space-size=8192"
          echo "Start time: $(date)"

          # 直接运行 gulp
          npx gulp vscode-linux-x64 --no-color

          echo "✅ Build completed at: $(date)"

      # ========== 步骤 12: 验证构建输出 ==========
      - name: 🔍 Verify build output
        run: |
          echo "=========================================="
          echo "🔍 Verifying build output..."
          echo "=========================================="

          if [ -d "./vscode/VSCode-linux-x64" ]; then
            echo "✅ Build found at: ./vscode/VSCode-linux-x64"
            ls -la ./vscode/VSCode-linux-x64/ | head -20
            if [ -f "./vscode/VSCode-linux-x64/code" ]; then
              echo "✅ code executable exists"
              file ./vscode/VSCode-linux-x64/code
            else
              echo "❌ code executable not found!"
              exit 1
            fi
          else
            echo "❌ Build not found!"
            echo "Searching for code executable..."
            find ./vscode -name "code" -type f 2>/dev/null | head -10
            exit 1
          fi

      # ========== 步骤 13: 创建 UOS 启动脚本 ==========
      - name: 🚀 Create UOS startup scripts
        run: |
          echo "=========================================="
          echo "🚀 Creating UOS startup scripts..."
          echo "=========================================="
          cd ./vscode/VSCode-linux-x64

          cat > run-uos.sh << 'EOF'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          echo "=== VSCode UOS Launcher ==="
          echo "Version: $($SCRIPT_DIR/code --version | head -1)"

          export ELECTRON_ENABLE_GPU=0
          export LIBGL_ALWAYS_SOFTWARE=1
          export NODE_OPTIONS="--max-old-space-size=4096"

          if grep -q "UOS" /etc/os-release 2>/dev/null; then
            echo "✅ Detected UOS system, enabling compatibility mode..."
          fi

          exec "$SCRIPT_DIR/code" \
            --no-sandbox \
            --disable-gpu-sandbox \
            --disable-software-rasterizer \
            "$@"
          EOF

          chmod +x run-uos.sh
          echo "✅ run-uos.sh created"

      # ========== 步骤 14: 打包 ==========
      - name: 📦 Package artifacts
        run: |
          echo "=========================================="
          echo "📦 Packaging artifacts..."
          echo "=========================================="
          mkdir -p artifacts
          VERSION="${{ github.event.inputs.vscode_version || '1.116.0' }}"

          cd ./vscode
          tar -czf "../artifacts/vscode-uos-${VERSION}.tar.gz" \
            --exclude='*.map' \
            --exclude='*.ts' \
            --exclude='node_modules' \
            --exclude='.git' \
            VSCode-linux-x64
          cd ..

          echo "✅ Package created"
          echo "📦 Package size: $(du -sh artifacts/vscode-uos-${VERSION}.tar.gz)"

      # ========== 步骤 15: 上传 ==========
      - name: 📤 Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: vscode-uos-${{ github.event.inputs.vscode_version || '1.116.0' }}
          path: artifacts/vscode-uos-*.tar.gz
          retention-days: 30

      # ========== 步骤 16: 构建摘要 ==========
      - name: 📊 Build summary
        if: always()
        run: |
          echo "=========================================="
          echo "📊 BUILD SUMMARY"
          echo "=========================================="
          echo "🟢 Status: ${{ job.status }}"
          echo "📦 Version: ${{ github.event.inputs.vscode_version || '1.116.0' }}"
          echo "📦 Node version: $(node --version)"
          echo "=========================================="
          if [ "${{ job.status }}" == "success" ]; then
            echo "🎉 Build completed successfully!"
            ls -la artifacts/
            echo "📥 On UOS: tar -xzf vscode-uos-*.tar.gz && cd VSCode-linux-x64 && ./run-uos.sh"
          else
            echo "❌ Build failed. Check logs above."
          fi
          echo "=========================================="