name: Build VSCode for UOS (Simple)

on:
  workflow_dispatch:
    inputs:
      vscode_version:
        description: 'VSCode version'
        required: true
        default: '1.116.0'

jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential git python3 libgtk-3-dev libxkbfile-dev libgbm-dev

      - name: Clone and build
        run: |
          git clone --depth 1 --branch ${{ github.event.inputs.vscode_version }} https://github.com/microsoft/vscode.git
          cd vscode

          # 安装 Node 18
          curl -fsSL https://deb.nodesource.com/setup_18.x | sudo -E bash -
          sudo apt-get install -y nodejs

          # 安装依赖
          npm install --no-audit

          # 构建
          export VSCODE_SKIP_PRELAUNCH=1
          ./node_modules/.bin/gulp vscode-linux-x64-min

      - name: Package
        run: |
          if [ -d "./vscode/VSCode-linux-x64" ]; then
            tar -czf vscode-uos.tar.gz -C ./vscode VSCode-linux-x64
          fi

      - name: Upload
        uses: actions/upload-artifact@v7
        with:
          name: vscode-uos
          path: vscode-uos.tar.gz