name: Build VSCode for UOS

on:
  workflow_dispatch:
    inputs:
      vscode_version:
        description: 'VSCode version'
        required: false
        default: '1.116.0'
        type: string

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: 📊 Environment info
        run: |
          echo "=========================================="
          echo "🚀 Starting VSCode build for UOS"
          echo "📦 Version: ${{ github.event.inputs.vscode_version || '1.116.0' }}"
          echo "=========================================="

      - name: 📥 Checkout VSCode source
        uses: actions/checkout@v6
        with:
          repository: microsoft/vscode
          lfs: false
          fetch-depth: 1
          ref: ${{ github.event.inputs.vscode_version || '1.116.0' }}
          path: vscode

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'

      - name: 🔧 Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libxkbfile-dev \
            libkrb5-dev \
            libgbm-dev \
            rpm \
            libx11-dev \
            libxss-dev \
            libxtst-dev \
            libnss3-dev \
            libasound2-dev \
            libglib2.0-dev \
            python3 \
            git

      - name: 🔄 Set glibc compatibility
        run: |
          echo "CXXFLAGS=-D_GLIBCXX_USE_CXX11_ABI=0" >> $GITHUB_ENV
          echo "CFLAGS=-D_GLIBCXX_USE_CXX11_ABI=0" >> $GITHUB_ENV

      - name: 💾 Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            vscode/node_modules
            ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('vscode/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-

      - name: 📦 Install dependencies
        working-directory: ./vscode
        run: |
          echo "Installing dependencies..."
          npm install --legacy-peer-deps

      - name: 🔨 Build VSCode
        working-directory: ./vscode
        run: |
          echo "=========================================="
          echo "🔨 Building VSCode..."
          echo "=========================================="
          export VSCODE_SKIP_PRELAUNCH=1
          export NODE_OPTIONS="--max-old-space-size=8192"

          # 使用 npm run 脚本
          npm run compile-build
          npm run compile-extensions-build
          npm run gulp -- vscode-linux-x64-min --no-color

      - name: 🔍 Verify build
        run: |
          if [ -d "./vscode/VSCode-linux-x64" ]; then
            echo "✅ Build found"
            ls -la ./vscode/VSCode-linux-x64/
          elif [ -d "./VSCode-linux-x64" ]; then
            echo "✅ Build found"
            ls -la ./VSCode-linux-x64/
          else
            echo "❌ Build not found!"
            find . -name "VSCode-linux-x64" -type d 2>/dev/null
            exit 1
          fi

      - name: 📦 Package
        run: |
          mkdir -p artifacts
          if [ -d "./vscode/VSCode-linux-x64" ]; then
            tar -czf artifacts/vscode-uos.tar.gz -C ./vscode VSCode-linux-x64
          elif [ -d "./VSCode-linux-x64" ]; then
            tar -czf artifacts/vscode-uos.tar.gz VSCode-linux-x64
          fi

      - name: 📤 Upload
        uses: actions/upload-artifact@v7
        with:
          name: vscode-uos
          path: artifacts/vscode-uos.tar.gz
          retention-days: 30