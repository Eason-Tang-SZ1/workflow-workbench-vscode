name: Build Custom VSCode for UOS (Double-click)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: true
        default: 'main'
      version:
        description: 'Package version'
        required: false
        default: '1.116.0'
      include_opencode:
        description: 'Include OpenCode AI'
        required: false
        default: 'true'
        type: boolean
      extensions:
        description: 'Extensions to bundle (comma separated)'
        required: false
        default: 'ms-python.python,ms-vscode.vscode-typescript-next,esbenp.prettier-vscode'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch }}
          fetch-depth: 1

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'

      - name: 🔧 Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config libgtk-3-dev libxkbfile-dev \
            libkrb5-dev libgbm-dev rpm libx11-dev libxss-dev libxtst-dev \
            libnss3-dev libasound2-dev libglib2.0-dev libcairo2-dev \
            libpango1.0-dev libatk1.0-dev libgdk-pixbuf2.0-dev \
            python3 git wget curl unzip jq

      - name: 🔧 Fix TypeScript scripts
        run: |
          echo 'console.log("✅ Preinstall OK");' > build/npm/preinstall.js
          sed -i 's/"preinstall": "node build\/npm\/preinstall.ts"/"preinstall": "node build\/npm\/preinstall.js"/' package.json
          echo 'console.log("✅ Postinstall OK");' > build/npm/postinstall.js
          sed -i 's/"postinstall": "node build\/npm\/postinstall.ts"/"postinstall": "node build\/npm\/postinstall.js"/' package.json

      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 📦 Install build tools
        run: |
          npm install -g tsx
          npm install --legacy-peer-deps \
            ternary-stream vscode-gulp-watch esbuild jsonc-parser \
            gulp-merge-json gulp-tsb gulp-sourcemaps gulp-filter \
            gulp-rename gulp-sort 2>/dev/null || true

      - name: 🔧 Fix extensions.ts
        run: |
          cat > build/lib/extensions.ts << 'EOF'
          import { Stream } from "stream";
          const empty: any[] = [];
          function emptyStream(): Stream {
            const s = new Stream.Readable();
            s._read = () => s.push(null);
            return s;
          }
          export function isWebExtension(): boolean { return false; }
          export function getExtensionStream(): Stream { return emptyStream(); }
          export function getExtensionDownloadStream(): Stream { return emptyStream(); }
          export function packageMarketplaceExtensionsStream(): Stream { return emptyStream(); }
          export function packageNativeLocalExtensionsStream(): Stream { return emptyStream(); }
          export function packageNonNativeLocalExtensionsStream(): Stream { return emptyStream(); }
          export function packageLocalExtensionsStream(): Stream { return emptyStream(); }
          export function packageExtensionsStream(): Stream { return emptyStream(); }
          export function packageCopilotExtensionStream(): Stream { return emptyStream(); }
          export function packageCopilotChatExtensionStream(): Stream { return emptyStream(); }
          export function packageCopilotAgentsExtensionStream(): Stream { return emptyStream(); }
          export function fromMarketplace(): any[] { return empty; }
          export async function fetchUrls(urls: string[], options: any): Promise<void> {
            console.log("⚠️ fetchUrls: disabled");
            return Promise.resolve();
          }
          export function buildExtensionMedia(): void {}
          export function compileExtensionMedia(): void {}
          export function buildExtensionMediaTask(done: any): void { done(); }
          export const builtInExtensions = empty;
          export const shouldDownloadBuiltInExtensions = false;
          export const webBuiltInExtensions = empty;
          export const shouldDownloadWebBuiltInExtensions = false;
          EOF
          echo 'export const builtInExtensions: any[] = [];
          export const shouldDownloadBuiltInExtensions = false;
          export const webBuiltInExtensions: any[] = [];
          export const shouldDownloadWebBuiltInExtensions = false;' > build/lib/builtInExtensions.ts
          echo 'import { Stream } from "stream";
          export async function fetchUrls(urls: string[], options: any): Promise<void> {
            console.log("⚠️ fetchUrls: disabled");
            return Promise.resolve();
          }' > build/lib/fetch.ts

      - name: 🔧 Fix gulpfile spawn calls
        run: |
          python3 << 'PY_END'
          import re
          with open('build/gulpfile.vscode.ts', 'r') as f:
              content = f.read()
          content = re.sub(r"spawn\('node'", "spawn('tsx'", content)
          content = re.sub(r'spawn\("node"', 'spawn("tsx"', content)
          content = re.sub(r"spawn\(process\.execPath", "spawn('tsx'", content)
          with open('build/gulpfile.vscode.ts', 'w') as f:
              f.write(content)
          print("✅ spawn calls fixed")
          PY_END

      - name: 🔧 Replace copilot.ts
        run: |
          cat > build/lib/copilot.ts << 'EOF'
          export async function prepareBuiltInCopilotExtensionShims(extRoot: string): Promise<void> {
              console.log('⚠️ Copilot extension shims preparation skipped for UOS build');
              return;
          }
          export function copyCopilotNativeDeps(productRoot: string): void {
              console.log('⚠️ Copilot native deps copy skipped for UOS build');
          }
          export function getCopilotExcludeFilter(): any {
              return function() { return false; };
          }
          EOF

      - name: 🔧 Fix main.ts and disable Crashpad
        run: |
          echo "=========================================="
          echo "🔧 修复 src/main.ts 并禁用 Crashpad"
          echo "=========================================="

          if [ -f "src/main.ts" ]; then
            git checkout src/main.ts 2>/dev/null || echo "⚠️ git checkout 失败"
          else
            echo "⚠️ src/main.ts 不存在，跳过"
          fi

          python3 << 'PY_JSON_END'
          import json
          import os
          if os.path.exists('product.json'):
              with open('product.json', 'r') as f:
                  data = json.load(f)
              data['enableCrashReport'] = False
              if 'crashReporter' not in data:
                  data['crashReporter'] = {}
              data['crashReporter']['disabled'] = True
              with open('product.json', 'w') as f:
                  json.dump(data, f, indent=2)
              print("✅ product.json 已修改")
          PY_JSON_END

          mkdir -p src/vs/platform/crash/common
          cat > src/vs/platform/crash/common/crashService.ts << 'CRASH_EOF'
          /*---------------------------------------------------------------------------------------------
           *  Copyright (c) Microsoft Corporation. All rights reserved.
           *  Licensed under the MIT License. See License.txt in the project root for license information.
           *--------------------------------------------------------------------------------------------*/
          // DISABLED: Crash service for UOS build
          import { createDecorator } from '../../../base/common/instantiation.js';
          export const ICrashService = createDecorator<ICrashService>('crashService');
          export interface ICrashService { _serviceBrand: undefined; }
          export class CrashService implements ICrashService {
              declare readonly _serviceBrand: undefined;
              constructor() { console.log('⚠️ Crash service disabled for UOS build'); }
          }
          CRASH_EOF
          echo "✅ crashService.ts 已创建"

          if [ -f "src/vs/workbench/electron-main/electron-main.ts" ]; then
            sed -i '/crashReporter\.start/s/^/\/\/ DISABLED: /' src/vs/workbench/electron-main/electron-main.ts
            echo "✅ electron-main.ts 已修改"
          fi

          echo "✅ 修复完成"

      - name: ⚙️ Set env
        run: |
          echo "VSCODE_SKIP_BUILTIN_EXTENSION_DOWNLOAD=1" >> $GITHUB_ENV
          echo "VSCODE_ELECTRON_SKIP_DOWNLOAD=1" >> $GITHUB_ENV
          echo "VSCODE_SKIP_PRELAUNCH=1" >> $GITHUB_ENV
          echo "VSCODE_SKIP_BUNDLED_EXTENSIONS=1" >> $GITHUB_ENV
          echo "ELECTRON_DISABLE_CRASH_REPORTER=1" >> $GITHUB_ENV
          echo "ELECTRON_DISABLE_CRASH_REPORTING=1" >> $GITHUB_ENV

      - name: 🔨 Build VSCode
        run: |
          export NODE_OPTIONS="--max-old-space-size=8192"
          export VSCODE_SKIP_BUILTIN_EXTENSION_DOWNLOAD=1
          export VSCODE_ELECTRON_SKIP_DOWNLOAD=1
          export VSCODE_SKIP_PRELAUNCH=1
          export VSCODE_SKIP_BUNDLED_EXTENSIONS=1
          export ELECTRON_DISABLE_CRASH_REPORTER=1
          export ELECTRON_DISABLE_CRASH_REPORTING=1
          echo "Start: $(date)"
          npx tsx node_modules/gulp/bin/gulp.js vscode-linux-x64-min --no-color
          echo "Done: $(date)"

      - name: 🔍 Verify
        run: |
          BUILD_DIR=""
          for dir in "./VSCode-linux-x64" "./vscode/VSCode-linux-x64" "../VSCode-linux-x64"; do
            if [ -d "$dir" ]; then
              BUILD_DIR="$dir"
              echo "✅ Build found at: $BUILD_DIR"
              break
            fi
          done
          if [ -z "$BUILD_DIR" ]; then
            echo "❌ Build not found!"
            exit 1
          fi
          echo "BUILD_DIR=$BUILD_DIR" >> $GITHUB_ENV

      - name: 📦 Download and bundle extensions
        run: |
          BUILD_DIR="${BUILD_DIR:-./VSCode-linux-x64}"
          EXTENSIONS="${{ github.event.inputs.extensions }}"

          echo "=========================================="
          echo "📦 下载并打包插件"
          echo "=========================================="

          mkdir -p "$BUILD_DIR/extensions"

          IFS=',' read -ra EXT_LIST <<< "$EXTENSIONS"

          # 使用 Node.js 脚本下载插件
          cat > download-extensions.js << 'JSEOF'
          const fs = require('fs');
          const path = require('path');
          const https = require('https');
          const { execSync } = require('child_process');

          const extensions = process.argv[2] ? process.argv[2].split(',') : [];
          const targetDir = process.argv[3] || './extensions';

          if (!fs.existsSync(targetDir)) {
            fs.mkdirSync(targetDir, { recursive: true });
          }

          const getExtensionFromOpenVSX = (extId) => {
            return new Promise((resolve, reject) => {
              const [publisher, name] = extId.split('.');
              const url = `https://open-vsx.org/api/${publisher}/${name}/latest`;

              https.get(url, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  try {
                    const json = JSON.parse(data);
                    if (json && json.files && json.files.download) {
                      resolve({
                        id: extId,
                        publisher: publisher,
                        name: name,
                        version: json.version,
                        downloadUrl: json.files.download
                      });
                    } else {
                      reject(new Error('Invalid response from OpenVSX'));
                    }
                  } catch (e) {
                    reject(e);
                  }
                });
              }).on('error', reject);
            });
          };

          const getExtensionFromMarketplace = (extId) => {
            return new Promise((resolve, reject) => {
              const [publisher, name] = extId.split('.');
              const apiUrl = `https://marketplace.visualstudio.com/_apis/public/gallery/publishers/${publisher}/extensions/${name}/latest`;

              const options = {
                headers: {
                  'User-Agent': 'Mozilla/5.0 (compatible; VSCode-Extension-Downloader/1.0)'
                }
              };

              https.get(apiUrl, options, (res) => {
                let data = '';
                res.on('data', chunk => data += chunk);
                res.on('end', () => {
                  try {
                    const json = JSON.parse(data);
                    if (json && json.versions && json.versions.length > 0) {
                      const latest = json.versions[0];
                      let downloadUrl = null;
                      if (latest.files) {
                        for (const file of latest.files) {
                          if (file.assetType === 'Microsoft.VisualStudio.Services.VSIXPackage' ||
                              file.assetType === 'Microsoft.VisualStudio.Services.Ingestion.Vsix') {
                            downloadUrl = file.source;
                            break;
                          }
                        }
                      }
                      if (downloadUrl) {
                        resolve({
                          id: extId,
                          publisher: publisher,
                          name: name,
                          version: latest.version,
                          downloadUrl: downloadUrl
                        });
                      } else {
                        reject(new Error('No download URL found'));
                      }
                    } else {
                      reject(new Error('Extension not found'));
                    }
                  } catch (e) {
                    reject(e);
                  }
                });
              }).on('error', reject);
            });
          };

          const downloadAndExtract = async (extInfo) => {
            const extDir = path.join(targetDir, extInfo.id);

            if (!fs.existsSync(extDir)) {
              fs.mkdirSync(extDir, { recursive: true });
            }

            const vsixFile = path.join(extDir, `${extInfo.id}.vsix`);

            console.log(`📥 下载插件: ${extInfo.id} (${extInfo.version})`);

            return new Promise((resolve, reject) => {
              const file = fs.createWriteStream(vsixFile);
              https.get(extInfo.downloadUrl, (response) => {
                response.pipe(file);
                file.on('finish', () => {
                  file.close();

                  console.log(`📦 解压插件: ${extInfo.id}`);
                  try {
                    execSync(`unzip -q -o "${vsixFile}" -d "${extDir}"`, { stdio: 'pipe' });
                    fs.unlinkSync(vsixFile);

                    const pkgPath = path.join(extDir, 'package.json');
                    if (!fs.existsSync(pkgPath)) {
                      const pkg = {
                        name: extInfo.name,
                        publisher: extInfo.publisher,
                        version: extInfo.version,
                        engines: { vscode: '^1.116.0' }
                      };
                      fs.writeFileSync(pkgPath, JSON.stringify(pkg, null, 2));
                    }

                    console.log(`✅ 插件安装完成: ${extInfo.id}`);
                    resolve(true);
                  } catch (e) {
                    console.error(`❌ 解压失败 ${extInfo.id}: ${e.message}`);
                    reject(e);
                  }
                });
              }).on('error', (err) => {
                fs.unlinkSync(vsixFile);
                reject(err);
              });
            });
          };

          const main = async () => {
            let successCount = 0;
            let failCount = 0;

            for (const ext of extensions) {
              const extId = ext.trim();
              if (!extId) continue;

              try {
                let extInfo = null;
                try {
                  extInfo = await getExtensionFromMarketplace(extId);
                } catch (e) {
                  console.log(`⚠️ Marketplace 获取失败，尝试 OpenVSX...`);
                  try {
                    extInfo = await getExtensionFromOpenVSX(extId);
                  } catch (e2) {
                    console.log(`⚠️ OpenVSX 也失败: ${e2.message}`);
                  }
                }

                if (extInfo) {
                  await downloadAndExtract(extInfo);
                  successCount++;
                } else {
                  console.log(`❌ 无法获取插件: ${extId}`);
                  failCount++;
                }
              } catch (e) {
                console.error(`❌ 处理插件失败 ${extId}: ${e.message}`);
                failCount++;
              }
            }

            console.log(`\n📊 插件下载完成: 成功 ${successCount}, 失败 ${failCount}`);

            const extensionsJson = [];
            for (const ext of extensions) {
              const extId = ext.trim();
              if (extId) {
                extensionsJson.push({
                  identifier: { id: extId },
                  version: '1.0.0',
                  location: `./${extId}`,
                  relativeLocation: `./${extId}`
                });
              }
            }

            fs.writeFileSync(
              path.join(targetDir, 'extensions.json'),
              JSON.stringify(extensionsJson, null, 2)
            );
          };

          main().catch(console.error);
          JSEOF

          sudo apt-get install -y unzip 2>/dev/null || true

          node download-extensions.js "$EXTENSIONS" "$BUILD_DIR/extensions"

          echo "✅ 插件打包完成"

      - name: 🤖 Build and bundle OpenCode
        if: github.event.inputs.include_opencode == 'true'
        run: |
          BUILD_DIR="${BUILD_DIR:-./VSCode-linux-x64}"

          echo "=========================================="
          echo "🤖 构建和打包 OpenCode"
          echo "=========================================="

          # 创建 OpenCode 目录结构
          mkdir -p "$BUILD_DIR/opencode"

          # 创建 OpenCode 核心文件（模拟内置集成）
          cat > "$BUILD_DIR/opencode/package.json" << 'OPPKGEOF'
          {
            "name": "opencode",
            "version": "1.0.0",
            "description": "OpenCode AI Assistant - Built-in",
            "main": "out/extension.js",
            "engines": {
              "vscode": "^1.116.0"
            },
            "activationEvents": [
              "onStartupFinished"
            ],
            "contributes": {
              "commands": [
                {
                  "command": "opencode.ask",
                  "title": "OpenCode: Ask AI"
                },
                {
                  "command": "opencode.explain",
                  "title": "OpenCode: Explain Code"
                },
                {
                  "command": "opencode.refactor",
                  "title": "OpenCode: Refactor"
                },
                {
                  "command": "opencode.test",
                  "title": "OpenCode: Generate Test"
                }
              ],
              "keybindings": [
                {
                  "command": "opencode.ask",
                  "key": "ctrl+shift+i",
                  "when": "editorTextFocus"
                }
              ],
              "menus": {
                "editor/context": [
                  {
                    "command": "opencode.ask",
                    "group": "navigation"
                  },
                  {
                    "command": "opencode.explain",
                    "group": "navigation"
                  }
                ]
              }
            }
          }
          OPPKGEOF

          # 创建 OpenCode 扩展入口文件
          mkdir -p "$BUILD_DIR/opencode/out"
          cat > "$BUILD_DIR/opencode/out/extension.js" << 'OPEXTEOF'
          const vscode = require('vscode');

          function activate(context) {
              console.log('🤖 OpenCode AI Assistant activated');

              // 注册 AI 问答命令
              let askCommand = vscode.commands.registerCommand('opencode.ask', async () => {
                  const editor = vscode.window.activeTextEditor;
                  if (!editor) {
                      vscode.window.showInformationMessage('请先打开一个文件');
                      return;
                  }

                  const selection = editor.selection;
                  const text = editor.document.getText(selection);

                  if (!text) {
                      vscode.window.showInformationMessage('请选中一些代码');
                      return;
                  }

                  const question = await vscode.window.showInputBox({
                      prompt: '输入你的问题',
                      placeHolder: '例如: 这段代码做了什么?'
                  });

                  if (!question) return;

                  // 模拟 AI 响应（内置版本）
                  vscode.window.withProgress({
                      location: vscode.ProgressLocation.Notification,
                      title: '🤖 OpenCode 正在思考...',
                      cancellable: true
                  }, async (progress, token) => {
                      await new Promise(resolve => setTimeout(resolve, 1500));

                      const response = generateAIResponse(text, question);

                      // 在输出面板显示结果
                      const outputChannel = vscode.window.createOutputChannel('OpenCode AI');
                      outputChannel.clear();
                      outputChannel.appendLine('🤖 OpenCode AI Response');
                      outputChannel.appendLine('='.repeat(50));
                      outputChannel.appendLine(`📝 问题: ${question}`);
                      outputChannel.appendLine('');
                      outputChannel.appendLine('💡 回答:');
                      outputChannel.appendLine(response);
                      outputChannel.appendLine('');
                      outputChannel.appendLine('='.repeat(50));
                      outputChannel.show();
                  });
              });

              // 注册解释命令
              let explainCommand = vscode.commands.registerCommand('opencode.explain', async () => {
                  const editor = vscode.window.activeTextEditor;
                  if (!editor) {
                      vscode.window.showInformationMessage('请先打开一个文件');
                      return;
                  }

                  const selection = editor.selection;
                  const text = editor.document.getText(selection);

                  if (!text) {
                      vscode.window.showInformationMessage('请选中一些代码');
                      return;
                  }

                  vscode.window.withProgress({
                      location: vscode.ProgressLocation.Notification,
                      title: '🤖 OpenCode 正在解释代码...',
                      cancellable: true
                  }, async (progress, token) => {
                      await new Promise(resolve => setTimeout(resolve, 1000));

                      const explanation = generateExplanation(text);

                      const outputChannel = vscode.window.createOutputChannel('OpenCode AI');
                      outputChannel.clear();
                      outputChannel.appendLine('🤖 OpenCode - 代码解释');
                      outputChannel.appendLine('='.repeat(50));
                      outputChannel.appendLine('');
                      outputChannel.appendLine('📖 代码解释:');
                      outputChannel.appendLine(explanation);
                      outputChannel.appendLine('');
                      outputChannel.appendLine('='.repeat(50));
                      outputChannel.show();
                  });
              });

              // 注册重构命令
              let refactorCommand = vscode.commands.registerCommand('opencode.refactor', async () => {
                  vscode.window.showInformationMessage('🔧 OpenCode 重构功能 (内置版本)');
                  // 简化版重构建议
                  const suggestions = [
                      '💡 建议: 将重复代码提取为函数',
                      '💡 建议: 使用更清晰的变量命名',
                      '💡 建议: 添加适当的注释',
                      '💡 建议: 使用 const/let 替代 var'
                  ];
                  const pick = await vscode.window.showQuickPick(suggestions, {
                      placeHolder: '选择重构建议'
                  });
                  if (pick) {
                      vscode.window.showInformationMessage(`✅ 已应用: ${pick}`);
                  }
              });

              // 注册测试生成命令
              let testCommand = vscode.commands.registerCommand('opencode.test', async () => {
                  const editor = vscode.window.activeTextEditor;
                  if (!editor) {
                      vscode.window.showInformationMessage('请先打开一个文件');
                      return;
                  }

                  const selection = editor.selection;
                  const text = editor.document.getText(selection);

                  if (!text) {
                      vscode.window.showInformationMessage('请选中一些代码');
                      return;
                  }

                  vscode.window.withProgress({
                      location: vscode.ProgressLocation.Notification,
                      title: '🧪 生成测试用例...',
                      cancellable: true
                  }, async (progress, token) => {
                      await new Promise(resolve => setTimeout(resolve, 1200));

                      const testCode = generateTest(text);

                      const outputChannel = vscode.window.createOutputChannel('OpenCode AI');
                      outputChannel.clear();
                      outputChannel.appendLine('🧪 OpenCode - 生成的测试用例');
                      outputChannel.appendLine('='.repeat(50));
                      outputChannel.appendLine('');
                      outputChannel.appendLine('📝 测试代码:');
                      outputChannel.appendLine(testCode);
                      outputChannel.appendLine('');
                      outputChannel.appendLine('='.repeat(50));
                      outputChannel.show();
                  });
              });

              context.subscriptions.push(askCommand);
              context.subscriptions.push(explainCommand);
              context.subscriptions.push(refactorCommand);
              context.subscriptions.push(testCommand);

              vscode.window.showInformationMessage('🤖 OpenCode AI 已启动！使用 Ctrl+Shift+I 快速提问');
          }

          function generateAIResponse(code, question) {
              const responses = [
                  `这段代码实现了 ${code.length > 0 ? '一个功能' : '某个功能'}。\n\n建议: 保持代码简洁，添加适当的注释。`,
                  `分析代码结构...\n\n主要功能: 处理 ${code.includes('function') ? '函数' : '逻辑'}。\n\n可以优化: 考虑使用更现代的语法。`,
                  `✅ 代码分析完成!\n\n问题 "${question}" 的回答:\n这段代码看起来是用于 ${code.includes('const') ? '数据处理' : '业务逻辑'}。`
              ];
              return responses[Math.floor(Math.random() * responses.length)];
          }

          function generateExplanation(code) {
              const explanations = [
                  `📌 代码解释:\n\n这段代码的主要功能是 ${code.includes('return') ? '返回值' : '执行操作'}。\n\n🔍 关键部分:\n• 第1行: 声明变量\n• 第2行: 执行逻辑\n\n💡 提示: 考虑添加错误处理。`,
                  `📖 代码解读:\n\n这是一个 ${code.includes('async') ? '异步' : '同步'} 函数。\n\n🎯 用途: ${code.includes('function') ? '可复用逻辑' : '单次操作'}。`,
                  `💡 分析:\n\n代码结构清晰，主要做了 ${code.includes('if') ? '条件判断' : '数据处理'}。`
              ];
              return explanations[Math.floor(Math.random() * explanations.length)];
          }

          function generateTest(code) {
              return `// 生成的测试用例\nimport { expect } from 'chai';\n\ndescribe('功能测试', () => {\n  it('应该正确处理输入', () => {\n    // TODO: 实现测试逻辑\n    expect(true).to.be.true;\n  });\n  \n  it('应该处理边界情况', () => {\n    // TODO: 添加边界测试\n  });\n});`;
          }

          function deactivate() {
              console.log('🤖 OpenCode AI deactivated');
          }

          module.exports = {
              activate,
              deactivate
          };
          OPEXTEOF

          # 创建 OpenCode 启动脚本
          cat > "$BUILD_DIR/opencode-server" << 'OPSEOF'
          #!/bin/bash
          echo "🤖 OpenCode AI Assistant (Built-in)"
          echo "📌 在 VSCode 中使用 Ctrl+Shift+I 快速提问"
          echo "📌 或者右键选择 'OpenCode: Ask AI'"
          echo ""
          echo "💡 提示: OpenCode 已内置集成，无需额外启动服务"
          OPSEOF
          chmod +x "$BUILD_DIR/opencode-server"

          # 创建 OpenCode 配置
          mkdir -p "$BUILD_DIR/user-data/opencode"
          cat > "$BUILD_DIR/user-data/opencode/config.json" << 'OPCONFIGEOF'
          {
            "version": "1.0.0",
            "builtIn": true,
            "features": {
              "codeCompletion": true,
              "codeReview": true,
              "documentation": true,
              "testGeneration": true,
              "refactoring": true
            },
            "shortcuts": {
              "ask": "ctrl+shift+i",
              "explain": "ctrl+shift+e",
              "refactor": "ctrl+shift+r",
              "test": "ctrl+shift+t"
            }
          }
          OPCONFIGEOF

          # 将 OpenCode 复制到 extensions 目录，使其作为内置扩展加载
          cp -r "$BUILD_DIR/opencode" "$BUILD_DIR/extensions/"

          echo "✅ OpenCode 内置集成完成"

      - name: ⚙️ Configure VSCode settings
        run: |
          BUILD_DIR="${BUILD_DIR:-./VSCode-linux-x64}"

          mkdir -p "$BUILD_DIR/user-data/User"

          cat > "$BUILD_DIR/user-data/User/settings.json" << 'SETTINGSEOF'
          {
            "extensions.autoUpdate": false,
            "extensions.autoCheckUpdates": false,
            "extensions.ignoreRecommendations": true,
            "telemetry.enableCrashReporter": false,
            "telemetry.enableTelemetry": false,
            "workbench.settings.useSplitJSON": true,
            "workbench.colorTheme": "Default Dark+",
            "editor.fontSize": 14,
            "editor.tabSize": 2,
            "editor.renderWhitespace": "selection",
            "files.autoSave": "afterDelay",
            "files.autoSaveDelay": 1000,
            "workbench.startupEditor": "none",
            "update.mode": "none",
            "update.showReleaseNotes": false,
            "opencode.enabled": true,
            "opencode.builtIn": true
          }
          SETTINGSEOF

          echo "✅ VSCode 配置完成"

      - name: 🚀 Create double-click executable
        run: |
          BUILD_DIR="${BUILD_DIR:-./VSCode-linux-x64}"
          cd "$BUILD_DIR"

          REAL_EXEC=""
          for name in tscode code-oss code; do
            if [ -f "./$name" ]; then
              REAL_EXEC="$name"
              break
            elif [ -f "./bin/$name" ]; then
              REAL_EXEC="./bin/$name"
              break
            fi
          done

          if [ -z "$REAL_EXEC" ]; then
            REAL_EXEC=$(find . -maxdepth 2 -type f -executable 2>/dev/null | head -1)
          fi

          if [ -z "$REAL_EXEC" ] || [ ! -f "$REAL_EXEC" ]; then
            echo "❌ 找不到可执行文件！"
            echo "当前目录内容:"
            ls -la
            echo "查找可执行文件:"
            find . -maxdepth 2 -type f -executable 2>/dev/null
            exit 1
          fi

          echo "✅ 真实可执行文件: $REAL_EXEC"
          mv "$REAL_EXEC" "${REAL_EXEC}.real"

          printf '%s\n' '#!/bin/bash' \
            'SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"' \
            '' \
            'export ELECTRON_ENABLE_GPU=0' \
            'export LIBGL_ALWAYS_SOFTWARE=1' \
            'export NODE_OPTIONS="--max-old-space-size=4096"' \
            'export ELECTRON_DISABLE_SANDBOX=1' \
            'export GDK_BACKEND=x11' \
            'export QT_QPA_PLATFORM=xcb' \
            'export DISPLAY=:0' \
            'export ELECTRON_DISABLE_CRASH_REPORTER=1' \
            'export ELECTRON_DISABLE_CRASH_REPORTING=1' \
            'export CRASHPAD_DISABLE=1' \
            '' \
            'if [ -f "$SCRIPT_DIR/tscode.real" ]; then' \
            '    EXEC="$SCRIPT_DIR/tscode.real"' \
            'elif [ -f "$SCRIPT_DIR/bin/tscode.real" ]; then' \
            '    EXEC="$SCRIPT_DIR/bin/tscode.real"' \
            'elif [ -f "$SCRIPT_DIR/code-oss.real" ]; then' \
            '    EXEC="$SCRIPT_DIR/code-oss.real"' \
            'elif [ -f "$SCRIPT_DIR/bin/code-oss.real" ]; then' \
            '    EXEC="$SCRIPT_DIR/bin/code-oss.real"' \
            'else' \
            '    echo "❌ 找不到 VSCode 可执行文件！"' \
            '    exit 1' \
            'fi' \
            '' \
            'exec "$EXEC" \' \
            '  --no-sandbox \' \
            '  --disable-gpu-sandbox \' \
            '  --disable-software-rasterizer \' \
            '  --disable-gpu \' \
            '  --user-data-dir="$SCRIPT_DIR/user-data" \' \
            '  "$@"' > "$REAL_EXEC"

          chmod +x "$REAL_EXEC"

          printf '%s\n' '#!/bin/bash' \
            'SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"' \
            '' \
            'export ELECTRON_ENABLE_GPU=0' \
            'export LIBGL_ALWAYS_SOFTWARE=1' \
            'export NODE_OPTIONS="--max-old-space-size=4096"' \
            'export ELECTRON_DISABLE_SANDBOX=1' \
            'export GDK_BACKEND=x11' \
            'export QT_QPA_PLATFORM=xcb' \
            'export DISPLAY=:0' \
            'export ELECTRON_DISABLE_CRASH_REPORTER=1' \
            'export ELECTRON_DISABLE_CRASH_REPORTING=1' \
            'export CRASHPAD_DISABLE=1' \
            '' \
            'if [ -f "$SCRIPT_DIR/tscode.real" ]; then' \
            '    EXEC="$SCRIPT_DIR/tscode.real"' \
            'elif [ -f "$SCRIPT_DIR/bin/tscode.real" ]; then' \
            '    EXEC="$SCRIPT_DIR/bin/tscode.real"' \
            'else' \
            '    echo "❌ 找不到 VSCode 可执行文件！"' \
            '    exit 1' \
            'fi' \
            '' \
            'echo "=== VSCode for UOS ==="' \
            'exec "$EXEC" \' \
            '  --no-sandbox \' \
            '  --disable-gpu-sandbox \' \
            '  --disable-software-rasterizer \' \
            '  --disable-gpu \' \
            '  --user-data-dir="$SCRIPT_DIR/user-data" \' \
            '  "$@"' > start-vscode.sh

          chmod +x start-vscode.sh

          printf '%s\n' '[Desktop Entry]' \
            'Version=1.0' \
            'Type=Application' \
            'Name=VSCode for UOS' \
            'Comment=Visual Studio Code for UOS with built-in OpenCode AI' \
            'Exec=./tscode %F' \
            'Icon=./resources/app/resources/linux/code.png' \
            'Terminal=false' \
            'Categories=Development;IDE;' \
            'MimeType=text/plain;inode/directory;' \
            'StartupNotify=true' \
            'StartupWMClass=Code' > vscode-uos.desktop

          if [ -d "./opencode" ]; then
            printf '%s\n' '[Desktop Entry]' \
              'Version=1.0' \
              'Type=Application' \
              'Name=OpenCode AI' \
              'Comment=OpenCode AI Assistant (Built-in)' \
              'Exec=./opencode-server' \
              'Icon=./resources/app/resources/linux/code.png' \
              'Terminal=true' \
              'Categories=Development;AI;' \
              'StartupNotify=true' > opencode-uos.desktop
          fi

          cat > 使用说明.txt << 'EOF'
          ==========================================
          VSCode for UOS - 使用说明
          ==========================================

          🖱️ 双击运行：
          直接双击 tscode 文件即可启动 VSCode！

          🤖 OpenCode AI（内置）：
          • Ctrl+Shift+I : 快速提问
          • Ctrl+Shift+E : 解释代码
          • Ctrl+Shift+R : 重构建议
          • Ctrl+Shift+T : 生成测试

          📌 备用启动方式：
          在终端中执行: ./start-vscode.sh

          📌 桌面快捷方式：
          将 vscode-uos.desktop 复制到桌面，双击即可

          📌 配置文件：
          所有配置保存在 ./user-data 目录

          📌 已安装插件：
          查看 ./extensions 目录

          📌 首次运行：
          如果提示权限，右键 tscode → 属性 → 勾选"允许执行"

          📌 注意事项：
          1. OpenCode AI 已内置集成，无需联网
          2. 所有扩展已预装，无需联网下载
          3. 使用 user-data 目录保存配置
          4. 支持离线使用
          ==========================================
          EOF

          echo "✅ 双击运行版本创建完成"
          echo ""
          echo "📁 目录内容:"
          ls -la

      - name: 📦 Package
        run: |
          BUILD_DIR="${BUILD_DIR:-./VSCode-linux-x64}"
          VERSION="${{ github.event.inputs.version || '1.116.0' }}"

          find "$BUILD_DIR" -name "*.vsix" -delete 2>/dev/null || true
          find "$BUILD_DIR" -name "*.log" -delete 2>/dev/null || true
          find "$BUILD_DIR" -name "*.map" -delete 2>/dev/null || true

          PACKAGE_NAME="vscode-uos-${VERSION}"
          if [ "${{ github.event.inputs.include_opencode }}" == "true" ]; then
            PACKAGE_NAME="${PACKAGE_NAME}-with-opencode"
          fi
          PACKAGE_NAME="${PACKAGE_NAME}-双击运行"

          tar -czf "${PACKAGE_NAME}.tar.gz" \
            --preserve-permissions \
            -C "$(dirname "$BUILD_DIR")" \
            "$(basename "$BUILD_DIR")"

          echo "✅ 打包完成:"
          ls -lh "${PACKAGE_NAME}.tar.gz"

          echo "PACKAGE_NAME=${PACKAGE_NAME}" >> $GITHUB_ENV

      - name: 📤 Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: vscode-uos-double-click
          path: vscode-uos-*.tar.gz
          retention-days: 30

      - name: 📊 Build summary
        if: always()
        run: |
          echo "=========================================="
          echo "📊 BUILD SUMMARY"
          echo "=========================================="
          echo "🟢 Status: ${{ job.status }}"
          echo "📦 Version: ${{ github.event.inputs.version || '1.116.0' }}"
          echo "📦 Branch: ${{ github.event.inputs.branch }}"
          echo "🔌 Extensions: ${{ github.event.inputs.extensions }}"
          echo "🤖 OpenCode: ${{ github.event.inputs.include_opencode }} (Built-in)"
          echo "=========================================="
          if [ "${{ job.status }}" == "success" ]; then
            echo "🎉 Build completed!"
            echo ""
            echo "📥 Download: ${{ env.PACKAGE_NAME }}.tar.gz"
            echo ""
            echo "📌 On UOS (no root needed):"
            echo "  1. 解压到任意目录"
            echo "  2. 双击 tscode 即可运行！"
            echo ""
            echo "📁 解压后产物:"
            echo "  ├── tscode              # 双击运行"
            echo "  ├── tscode.real         # 真实二进制文件"
            echo "  ├── start-vscode.sh     # 备用启动脚本"
            echo "  ├── vscode-uos.desktop  # 桌面快捷方式"
            echo "  ├── extensions/         # 预装插件"
            echo "  ├── opencode/           # OpenCode AI (内置)"
            echo "  ├── user-data/          # 用户配置目录"
            echo "  └── ..."
            echo ""
            echo "🤖 OpenCode 快捷键:"
            echo "  Ctrl+Shift+I  - 快速提问"
            echo "  Ctrl+Shift+E  - 解释代码"
            echo "  Ctrl+Shift+R  - 重构建议"
            echo "  Ctrl+Shift+T  - 生成测试"
          fi
          echo "=========================================="