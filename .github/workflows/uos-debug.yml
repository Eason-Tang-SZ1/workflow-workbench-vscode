name: Build VSCode for UOS (glibc 2.28 Compatible)

on:
  workflow_dispatch:
    inputs:
      vscode_version:
        description: 'VSCode version to build'
        required: false
        default: '1.116.0'
        type: string

jobs:
  build-for-uos:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      # ========== 步骤 1: 环境信息 ==========
      - name: 📊 Environment info
        run: |
          echo "=========================================="
          echo "🚀 Starting VSCode build for UOS"
          echo "📦 Version: ${{ github.event.inputs.vscode_version || '1.116.0' }}"
          echo "🖥️  Runner: $(cat /etc/os-release | grep PRETTY_NAME)"
          echo "=========================================="

      # ========== 步骤 2: 克隆 VSCode 源码 ==========
      - name: 📥 Checkout VSCode source
        uses: actions/checkout@v6
        with:
          repository: microsoft/vscode
          lfs: false
          fetch-depth: 1
          ref: ${{ github.event.inputs.vscode_version || '1.116.0' }}
          path: vscode

      # ========== 步骤 3: 安装 Node.js 22 ==========
      - name: 📦 Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'
          cache: 'npm'
          cache-dependency-path: vscode/package-lock.json

      # ========== 步骤 4: 安装系统依赖 ==========
      - name: 🔧 Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libxkbfile-dev \
            libkrb5-dev \
            libgbm-dev \
            rpm \
            libx11-dev \
            libxss-dev \
            libxtst-dev \
            libnss3-dev \
            libasound2-dev \
            libglib2.0-dev \
            libcairo2-dev \
            libpango1.0-dev \
            libatk1.0-dev \
            libgdk-pixbuf2.0-dev \
            libsecret-1-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            python3 \
            git

      # ========== 步骤 5: 设置 glibc 兼容性 ==========
      - name: 🔄 Set glibc compatibility for UOS
        run: |
          echo "CXXFLAGS=-D_GLIBCXX_USE_CXX11_ABI=0" >> $GITHUB_ENV
          echo "CFLAGS=-D_GLIBCXX_USE_CXX11_ABI=0" >> $GITHUB_ENV
          echo "✅ Compatibility flags set"

      # ========== 步骤 6: 缓存 npm 依赖 ==========
      - name: 💾 Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: |
            vscode/node_modules
            ~/.npm
            ~/.cache/electron
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-npm22-vscode-${{ hashFiles('vscode/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm22-vscode-

      # ========== 步骤 7: 修复 preinstall 脚本 ==========
      - name: 🔧 Fix preinstall script
        run: |
          echo "=========================================="
          echo "🔧 Fixing preinstall script..."
          echo "=========================================="
          cd vscode

          # 将 TypeScript 转换为 JavaScript
          cat > build/npm/preinstall.js << 'EOF'
          /*---------------------------------------------------------------------------------------------
           *  Copyright (c) Microsoft Corporation. All rights reserved.
           *  Licensed under the MIT License. See License.txt in the project root for license information.
           *--------------------------------------------------------------------------------------------*/

          console.log('Running preinstall script (JS version)...');

          // 检查 Node 版本
          console.log('Node version:', process.version);

          // 检查是否在 CI 环境
          if (process.env.CI) {
            console.log('CI environment detected');
          }

          console.log('✅ Preinstall completed successfully');
          EOF

          # 修改 package.json，将 preinstall 指向 JS 版本
          # 使用 sed 替换
          echo "✅ Preinstall script fixed"

      # ========== 步骤 8: 安装 npm 依赖（跳过 preinstall） ==========
      - name: 📦 Install npm dependencies
        working-directory: ./vscode
        run: |
          echo "=========================================="
          echo "📦 Installing npm dependencies..."
          echo "Node version: $(node --version)"
          echo "npm version: $(npm --version)"
          echo "=========================================="
          echo "Start time: $(date)"

          # 使用 --ignore-scripts 跳过所有脚本
          npm install --no-audit --legacy-peer-deps --ignore-scripts

          echo "✅ npm install completed at: $(date)"
          echo "📁 node_modules size: $(du -sh node_modules 2>/dev/null | cut -f1 || echo 'N/A')"

      # ========== 步骤 9: 手动运行 preinstall ==========
      - name: 🔨 Run preinstall script
        working-directory: ./vscode
        run: |
          echo "=========================================="
          echo "🔨 Running preinstall script..."
          echo "=========================================="
          node build/npm/preinstall.js
          echo "✅ preinstall completed"

      # ========== 步骤 10: 安装剩余依赖 ==========
      - name: 📦 Install remaining dependencies
        working-directory: ./vscode
        run: |
          echo "=========================================="
          echo "📦 Installing remaining dependencies..."
          echo "=========================================="
          npm install --no-audit --legacy-peer-deps

      # ========== 步骤 11: 编译 TypeScript ==========
      - name: 🔨 Compile TypeScript
        working-directory: ./vscode
        run: |
          echo "=========================================="
          echo "🔨 Compiling TypeScript..."
          echo "⏰ This may take 10-15 minutes..."
          echo "=========================================="
          export NODE_OPTIONS="--max-old-space-size=4096"
          echo "Start time: $(date)"

          # 使用 npx 运行 gulp
          npx gulp compile-build
          echo "✅ compile-build completed"

          npx gulp compile-extensions-build
          echo "✅ compile-extensions-build completed"
          echo "End time: $(date)"

      # ========== 步骤 12: 构建 VSCode Linux x64 ==========
      - name: 🔨 Build VSCode Linux x64
        working-directory: ./vscode
        run: |
          echo "=========================================="
          echo "🔨 Building VSCode Linux x64..."
          echo "⏰ This may take 20-30 minutes..."
          echo "=========================================="
          export VSCODE_SKIP_PRELAUNCH=1
          export NODE_OPTIONS="--max-old-space-size=4096"
          echo "Start time: $(date)"

          npx gulp vscode-linux-x64-min

          echo "✅ Build completed at: $(date)"

      # ========== 步骤 13: 验证构建输出 ==========
      - name: 🔍 Verify build output
        run: |
          echo "=========================================="
          echo "🔍 Verifying build output..."
          echo "=========================================="
          if [ -d "./vscode/VSCode-linux-x64" ]; then
            echo "✅ Build found at: ./vscode/VSCode-linux-x64"
            echo "📁 Directory contents:"
            ls -la ./vscode/VSCode-linux-x64/ | head -20
            if [ -f "./vscode/VSCode-linux-x64/code" ]; then
              echo "✅ code executable exists"
              file ./vscode/VSCode-linux-x64/code
            else
              echo "❌ code executable not found!"
              exit 1
            fi
          else
            echo "❌ Build not found!"
            echo "Searching for VSCode-linux-x64..."
            find ./vscode -name "VSCode-linux-x64" -type d 2>/dev/null || echo "Not found"
            exit 1
          fi

      # ========== 步骤 14: 创建 UOS 启动脚本 ==========
      - name: 🚀 Create UOS startup scripts
        run: |
          echo "=========================================="
          echo "🚀 Creating UOS startup scripts..."
          echo "=========================================="
          cd ./vscode/VSCode-linux-x64

          cat > run-uos.sh << 'EOF'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          echo "=== VSCode UOS Launcher ==="
          echo "Version: $($SCRIPT_DIR/code --version | head -1)"

          # UOS 兼容设置
          export ELECTRON_ENABLE_GPU=0
          export LIBGL_ALWAYS_SOFTWARE=1
          export NODE_OPTIONS="--max-old-space-size=4096"

          # 检测 UOS 系统
          if grep -q "UOS" /etc/os-release 2>/dev/null; then
            echo "✅ Detected UOS system, enabling compatibility mode..."
          fi

          # 启动 VSCode
          exec "$SCRIPT_DIR/code" \
            --no-sandbox \
            --disable-gpu-sandbox \
            --disable-software-rasterizer \
            "$@"
          EOF

          chmod +x run-uos.sh
          echo "✅ run-uos.sh created"

          cat > vscode-uos.desktop << 'EOF'
          [Desktop Entry]
          Version=1.0
          Name=Visual Studio Code (UOS)
          Comment=Code Editing. Redefined.
          Exec=./run-uos.sh %F
          Icon=resources/app/resources/linux/code.png
          Terminal=false
          Type=Application
          Categories=Development;IDE;
          MimeType=text/plain;inode/directory;
          StartupWMClass=Code
          EOF
          echo "✅ vscode-uos.desktop created"

      # ========== 步骤 15: 打包 ==========
      - name: 📦 Package artifacts
        run: |
          echo "=========================================="
          echo "📦 Packaging artifacts..."
          echo "=========================================="
          mkdir -p artifacts
          VERSION="${{ github.event.inputs.vscode_version || '1.116.0' }}"

          cd ./vscode
          tar -czf "../artifacts/vscode-uos-${VERSION}.tar.gz" \
            --exclude='*.map' \
            --exclude='*.ts' \
            --exclude='node_modules' \
            --exclude='.git' \
            VSCode-linux-x64
          cd ..

          echo "✅ Package created"
          echo "📦 Package size: $(du -sh artifacts/vscode-uos-${VERSION}.tar.gz)"

      # ========== 步骤 16: 上传 ==========
      - name: 📤 Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: vscode-uos-${{ github.event.inputs.vscode_version || '1.116.0' }}
          path: artifacts/vscode-uos-*.tar.gz
          retention-days: 30

      # ========== 步骤 17: 构建摘要 ==========
      - name: 📊 Build summary
        if: always()
        run: |
          echo "=========================================="
          echo "📊 BUILD SUMMARY"
          echo "=========================================="
          echo "🟢 Status: ${{ job.status }}"
          echo "📦 Version: ${{ github.event.inputs.vscode_version || '1.116.0' }}"
          echo "🖥️  Runner: ubuntu-latest"
          echo "📦 Node version: $(node --version)"
          echo "🔧 glibc compatibility: enabled"
          echo "📁 Artifacts:"
          ls -la artifacts/ 2>/dev/null || echo "No artifacts"
          echo "=========================================="
          if [ "${{ job.status }}" == "success" ]; then
            echo "🎉 Build completed successfully!"
            echo "📥 On UOS: tar -xzf vscode-uos-*.tar.gz && cd VSCode-linux-x64 && ./run-uos.sh"
          else
            echo "❌ Build failed. Please check the logs above."
          fi
          echo "=========================================="