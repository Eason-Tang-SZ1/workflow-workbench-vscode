name: Build VSCode for UOS (Official Source)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build (e.g., main)'
        required: true
        default: 'main'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      # ============================================================
      # 1. 检出您的仓库源码
      # ============================================================
      - name: 📥 Checkout your repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch }}
          fetch-depth: 1

      # ============================================================
      # 2. 安装 Node.js 环境
      # ============================================================
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'

      # ============================================================
      # 3. 安装系统级编译依赖
      # ============================================================
      - name: 🔧 Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libxkbfile-dev \
            libkrb5-dev \
            libgbm-dev \
            rpm \
            libx11-dev \
            libxss-dev \
            libxtst-dev \
            libnss3-dev \
            libasound2-dev \
            libglib2.0-dev \
            libcairo2-dev \
            libpango1.0-dev \
            libatk1.0-dev \
            libgdk-pixbuf2.0-dev \
            python3 \
            git

      # ============================================================
      # 4. 【核心修复】绕过 preinstall.ts 和 postinstall.ts
      # ============================================================
      - name: 🔧 Fix TypeScript scripts
        run: |
          echo "=========================================="
          echo "Fixing TypeScript scripts (preinstall/postinstall)..."
          echo "=========================================="

          # 修复 preinstall.ts
          cat > build/npm/preinstall.js << 'EOF'
          console.log('✅ Preinstall script (JS version) executed successfully.');
          EOF
          sed -i 's/"preinstall": "node build\/npm\/preinstall.ts"/"preinstall": "node build\/npm\/preinstall.js"/' package.json
          echo "✅ preinstall.ts patched"

          # 修复 postinstall.ts
          cat > build/npm/postinstall.js << 'EOF'
          console.log('✅ Postinstall script (JS version) executed successfully.');

          // 模拟 postinstall 中的必要操作
          // 如果需要，可以在这里添加其他逻辑
          EOF
          sed -i 's/"postinstall": "node build\/npm\/postinstall.ts"/"postinstall": "node build\/npm\/postinstall.js"/' package.json
          echo "✅ postinstall.ts patched"

          # 检查修改结果
          echo "=========================================="
          echo "Updated package.json scripts:"
          grep -E '"preinstall"|"postinstall"' package.json
          echo "=========================================="

      # ============================================================
      # 5. 安装项目依赖
      # ============================================================
      - name: 📦 Install dependencies
        run: |
          echo "=========================================="
          echo "Installing npm dependencies..."
          echo "=========================================="
          npm install --legacy-peer-deps

      # ============================================================
      # 6. 编译 TypeScript 源码
      # ============================================================
      - name: 🔨 Compile TypeScript
        run: |
          echo "=========================================="
          echo "Compiling TypeScript..."
          echo "=========================================="
          export NODE_OPTIONS="--max-old-space-size=8192"
          npm run compile-build || echo "⚠️ compile-build may have warnings"
          npm run compile-extensions-build || echo "⚠️ compile-extensions-build may have warnings"

      # ============================================================
      # 7. 构建 Linux x64 版本
      # ============================================================
      - name: 🔨 Build VSCode Linux x64
        run: |
          echo "=========================================="
          echo "Building VSCode Linux x64 (min)..."
          echo "⏰ This may take 20-30 minutes..."
          echo "=========================================="
          export VSCODE_SKIP_PRELAUNCH=1
          export NODE_OPTIONS="--max-old-space-size=8192"
          echo "Start time: $(date)"

          npm run gulp -- vscode-linux-x64-min --no-color

          echo "✅ Build completed at: $(date)"

      # ============================================================
      # 8. 验证构建产物
      # ============================================================
      - name: 🔍 Verify build output
        run: |
          echo "=========================================="
          echo "Verifying build output..."
          echo "=========================================="

          if [ -d "./VSCode-linux-x64" ]; then
            echo "✅ Build found in ./VSCode-linux-x64"
            ls -la ./VSCode-linux-x64/ | head -20
            echo "BUILD_DIR=./VSCode-linux-x64" >> $GITHUB_ENV
          elif [ -d "./vscode/VSCode-linux-x64" ]; then
            echo "✅ Build found in ./vscode/VSCode-linux-x64"
            ls -la ./vscode/VSCode-linux-x64/ | head -20
            echo "BUILD_DIR=./vscode/VSCode-linux-x64" >> $GITHUB_ENV
          else
            echo "❌ Build not found!"
            find . -name "VSCode-linux-x64" -type d 2>/dev/null || echo "Not found"
            exit 1
          fi

      # ============================================================
      # 9. 为 UOS 创建启动脚本 (已含 --no-sandbox)
      # ============================================================
      - name: 🚀 Create UOS startup script
        run: |
          echo "=========================================="
          echo "Creating UOS startup script..."
          echo "=========================================="

          BUILD_DIR="${BUILD_DIR:-./VSCode-linux-x64}"
          cd "$BUILD_DIR"

          cat > start-vscode.sh << 'EOF'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"

          export ELECTRON_ENABLE_GPU=0
          export LIBGL_ALWAYS_SOFTWARE=1
          export NODE_OPTIONS="--max-old-space-size=4096"
          export ELECTRON_DISABLE_SANDBOX=1
          export GDK_BACKEND=x11
          export QT_QPA_PLATFORM=xcb

          if [ -f "$SCRIPT_DIR/code-oss" ]; then
              EXEC="$SCRIPT_DIR/code-oss"
          elif [ -f "$SCRIPT_DIR/code" ]; then
              EXEC="$SCRIPT_DIR/code"
          else
              echo "❌ VSCode executable not found!"
              exit 1
          fi

          echo "=== VSCode UOS Launcher ==="
          echo "Version: $($EXEC --version | head -1)"

          exec "$EXEC" \
              --no-sandbox \
              --disable-gpu-sandbox \
              --disable-software-rasterizer \
              --disable-gpu \
              "$@"
          EOF

          chmod +x start-vscode.sh
          echo "✅ start-vscode.sh created successfully at $BUILD_DIR"

      # ============================================================
      # 10. 打包成 tar.gz
      # ============================================================
      - name: 📦 Package artifacts
        run: |
          echo "=========================================="
          echo "Packaging artifacts..."
          echo "=========================================="
          mkdir -p artifacts

          BUILD_DIR="${BUILD_DIR:-./VSCode-linux-x64}"

          if [ ! -d "$BUILD_DIR" ]; then
            echo "❌ Build directory not found!"
            exit 1
          fi

          chmod +x $BUILD_DIR/*.sh 2>/dev/null || true

          tar -czf artifacts/vscode-uos-$(date +%Y%m%d-%H%M%S).tar.gz \
            --preserve-permissions \
            "$BUILD_DIR"

          echo "✅ Package created:"
          ls -lh artifacts/

      # ============================================================
      # 11. 上传构建产物
      # ============================================================
      - name: 📤 Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: vscode-uos-build
          path: artifacts/vscode-uos-*.tar.gz
          retention-days: 30

      # ============================================================
      # 12. 构建摘要
      # ============================================================
      - name: 📊 Build summary
        if: always()
        run: |
          echo "=========================================="
          echo "📊 BUILD SUMMARY"
          echo "=========================================="
          echo "🟢 Status: ${{ job.status }}"
          echo "📦 Branch: ${{ github.event.inputs.branch }}"
          echo "📁 Artifacts:"
          ls -lh artifacts/ 2>/dev/null || echo "  (No artifacts)"
          echo "=========================================="