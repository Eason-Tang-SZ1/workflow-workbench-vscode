name: Build VSCode for UOS (glibc 2.28)

on:
  workflow_dispatch:
    inputs:
      vscode_version:
        description: 'VSCode version to build'
        required: false
        default: '1.116.0'
        type: string

jobs:
  build-for-uos:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      # 注意：这里改为克隆 VSCode 源码，而不是使用当前仓库
      - name: Checkout VSCode source
        uses: actions/checkout@v6
        with:
          repository: microsoft/vscode  # 关键：克隆 VSCode 官方仓库
          lfs: false
          fetch-depth: 1
          ref: ${{ github.event.inputs.vscode_version || '1.116.0' }}
          path: vscode  # 克隆到 vscode 子目录

      - name: Debug - Verify checkout
        run: |
          echo "=== CHECKOUT STATUS ==="
          echo "Current directory: $(pwd)"
          ls -la
          echo "VSCode source directory:"
          ls -la vscode/ | head -20
          if [ -f "vscode/package.json" ]; then
            echo "VSCode version: $(cat vscode/package.json | grep '"version"' | head -1)"
          fi
          if [ -f "vscode/yarn.lock" ]; then
            echo "yarn.lock found"
          else
            echo "ERROR: yarn.lock not found!"
            exit 1
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: 'yarn'
          cache-dependency-path: vscode/yarn.lock  # 指定 lock 文件位置

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libxkbfile-dev \
            libkrb5-dev \
            libgbm-dev \
            rpm \
            libx11-dev \
            libxss-dev \
            libxtst-dev \
            libnss3-dev \
            libasound2-dev \
            libglib2.0-dev \
            libcairo2-dev \
            libpango1.0-dev \
            libatk1.0-dev \
            libgdk-pixbuf2.0-dev

      - name: Cache dependencies
        uses: actions/cache@v4
        with:
          path: |
            vscode/node_modules
            ~/.cache/electron
            ~/.cache/ms-playwright
            ~/.yarn/cache
          key: ${{ runner.os }}-vscode-${{ hashFiles('vscode/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-vscode-

      - name: Install yarn and dependencies
        working-directory: ./vscode  # 在 vscode 目录中执行
        run: |
          npm install -g yarn@1.22.22
          yarn --version
          yarn install --frozen-lockfile --network-timeout 600000

      - name: Compile TypeScript
        working-directory: ./vscode
        run: |
          yarn compile-build
          yarn compile-extensions-build

      - name: Build VSCode Linux x64
        working-directory: ./vscode
        run: |
          export VSCODE_SKIP_PRELAUNCH=1
          export NODE_OPTIONS="--max-old-space-size=4096"
          yarn gulp vscode-linux-x64-min

      - name: Find and verify build output
        run: |
          echo "=== SEARCHING FOR BUILD OUTPUT ==="
          find ./vscode -name "VSCode-linux-x64" -type d 2>/dev/null
          find . -name "VSCode-linux-x64" -type d 2>/dev/null

          # 检查可能的输出位置
          for dir in "./vscode/VSCode-linux-x64" "./vscode/../VSCode-linux-x64" "./VSCode-linux-x64"; do
            if [ -d "$dir" ]; then
              echo "Found build output: $dir"
              ls -la "$dir" | head -20
            fi
          done

      - name: Create UOS startup scripts
        run: |
          # 查找构建输出
          BUILD_DIR=""
          if [ -d "./vscode/VSCode-linux-x64" ]; then
            BUILD_DIR="./vscode/VSCode-linux-x64"
          elif [ -d "./VSCode-linux-x64" ]; then
            BUILD_DIR="./VSCode-linux-x64"
          else
            echo "ERROR: Build output not found!"
            echo "Searching for any VSCode directory:"
            find . -name "*VSCode*" -type d 2>/dev/null | head -10
            exit 1
          fi

          cd "$BUILD_DIR"

          # 验证 code 可执行文件存在
          if [ ! -f "./code" ]; then
            echo "ERROR: code executable not found in $BUILD_DIR"
            echo "Files in directory:"
            ls -la
            exit 1
          fi

          # 创建 UOS 启动脚本
          cat > run-uos.sh << 'EOF'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          echo "=== VSCode UOS Launcher ==="
          echo "Script directory: $SCRIPT_DIR"

          # 检测 UOS 系统
          if grep -q "UOS" /etc/os-release 2>/dev/null; then
            echo "Detected UOS system, enabling compatibility mode..."
            export ELECTRON_ENABLE_GPU=0
            export LIBGL_ALWAYS_SOFTWARE=1
          fi

          # 启动 VSCode
          exec "$SCRIPT_DIR/code" \
            --no-sandbox \
            --disable-gpu-sandbox \
            --disable-software-rasterizer \
            --enable-features=UseOzonePlatform \
            --ozone-platform=wayland \
            "$@"
          EOF
          chmod +x run-uos.sh

          echo "Startup script created successfully"

      - name: Package artifacts
        run: |
          mkdir -p artifacts
          BUILD_DIR=""
          if [ -d "./vscode/VSCode-linux-x64" ]; then
            BUILD_DIR="./vscode/VSCode-linux-x64"
          elif [ -d "./VSCode-linux-x64" ]; then
            BUILD_DIR="./VSCode-linux-x64"
          else
            echo "ERROR: Build output not found!"
            exit 1
          fi

          # 打包
          tar -czf artifacts/vscode-uos-${{ github.event.inputs.vscode_version || '1.116.0' }}.tar.gz \
            -C "$(dirname "$BUILD_DIR")" \
            "$(basename "$BUILD_DIR")"

          echo "Package created: $(du -h artifacts/vscode-uos-*.tar.gz)"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: vscode-uos-${{ github.event.inputs.vscode_version || '1.116.0' }}
          path: artifacts/vscode-uos-*.tar.gz
          retention-days: 30