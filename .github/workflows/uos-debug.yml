name: Build VSCode for UOS (glibc 2.28 Compatible)

on:
  workflow_dispatch:
    inputs:
      vscode_version:
        description: 'VSCode version to build'
        required: false
        default: '1.116.0'
        type: string

jobs:
  build-for-uos:
    runs-on: ubuntu-latest
    timeout-minutes: 150

    steps:
      # ========== 步骤 1: 环境信息 ==========
      - name: 📊 Environment info
        run: |
          echo "=========================================="
          echo "🚀 Starting VSCode build for UOS"
          echo "📦 Version: ${{ github.event.inputs.vscode_version || '1.116.0' }}"
          echo "🖥️  Runner: $(cat /etc/os-release | grep PRETTY_NAME)"
          echo "=========================================="

      # ========== 步骤 2: 克隆 VSCode 源码 ==========
      - name: 📥 Checkout VSCode source
        uses: actions/checkout@v6
        with:
          repository: microsoft/vscode
          lfs: false
          fetch-depth: 1
          ref: ${{ github.event.inputs.vscode_version || '1.116.0' }}
          path: vscode

      # ========== 步骤 3: 安装 Node.js 22 ==========
      - name: 📦 Setup Node.js 22
        uses: actions/setup-node@v6
        with:
          node-version: '22.x'

      # ========== 步骤 4: 安装系统依赖 ==========
      - name: 🔧 Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libxkbfile-dev \
            libkrb5-dev \
            libgbm-dev \
            rpm \
            libx11-dev \
            libxss-dev \
            libxtst-dev \
            libnss3-dev \
            libasound2-dev \
            libglib2.0-dev \
            libcairo2-dev \
            libpango1.0-dev \
            libatk1.0-dev \
            libgdk-pixbuf2.0-dev \
            libsecret-1-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            libxkbcommon-x11-dev \
            python3 \
            git \
            wget \
            curl

      # ========== 步骤 5: 设置 glibc 兼容性 ==========
      - name: 🔄 Set glibc compatibility for UOS
        run: |
          echo "CXXFLAGS=-D_GLIBCXX_USE_CXX11_ABI=0" >> $GITHUB_ENV
          echo "CFLAGS=-D_GLIBCXX_USE_CXX11_ABI=0" >> $GITHUB_ENV
          echo "✅ Compatibility flags set"

      # ========== 步骤 6: 缓存 npm 依赖 ==========
      - name: 💾 Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: |
            vscode/node_modules
            ~/.npm
            ~/.cache/electron
            ~/.cache/ms-playwright
            ~/.cache/vscode-extension-downloads
          key: ${{ runner.os }}-npm22-vscode-${{ hashFiles('vscode/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm22-vscode-

      # ========== 步骤 7: 修复 preinstall 脚本 ==========
      - name: 🔧 Fix preinstall script
        run: |
          echo "=========================================="
          echo "🔧 Fixing preinstall script..."
          echo "=========================================="
          cd vscode

          cat > build/npm/preinstall.js << 'EOF'
          console.log('Running preinstall script (JS version)...');
          console.log('Node version:', process.version);
          console.log('✅ Preinstall completed successfully');
          EOF

          sed -i 's/"preinstall": "node build\/npm\/preinstall.ts"/"preinstall": "node build\/npm\/preinstall.js"/' package.json
          echo "✅ Preinstall script fixed"

      # ========== 步骤 8: 安装 npm 依赖 ==========
      - name: 📦 Install npm dependencies
        working-directory: ./vscode
        run: |
          echo "=========================================="
          echo "📦 Installing npm dependencies..."
          echo "Node version: $(node --version)"
          echo "npm version: $(npm --version)"
          echo "Start time: $(date)"
          echo "=========================================="

          npm install --legacy-peer-deps --ignore-scripts

          echo "✅ npm install completed at: $(date)"
          echo "📁 node_modules size: $(du -sh node_modules 2>/dev/null | cut -f1 || echo 'N/A')"

      # ========== 步骤 9: 安装构建工具 ==========
      - name: 📦 Install build tools
        working-directory: ./vscode
        run: |
          echo "=========================================="
          echo "📦 Installing build tools..."
          echo "=========================================="

          npm install --legacy-peer-deps \
            vscode-gulp-watch \
            esbuild \
            jsonc-parser \
            ternary-stream \
            gulp \
            gulp-cli \
            gulp-merge-json \
            gulp-tsb \
            gulp-sourcemaps \
            gulp-filter \
            gulp-rename \
            gulp-sort \
            gulp-concat \
            gulp-if \
            gulp-replace \
            gulp-size \
            gulp-tap \
            gulp-zip \
            gulp-newer \
            gulp-flatten \
            gulp-footer \
            gulp-header \
            gulp-data \
            gulp-template \
            gulp-inject \
            gulp-file \
            gulp-touch \
            @types/gulp \
            typescript \
            @types/node \
            2>/dev/null || true

          echo "✅ Build tools installed"

      # ========== 步骤 10: 手动运行 preinstall ==========
      - name: 🔨 Run preinstall script
        working-directory: ./vscode
        run: |
          echo "=========================================="
          echo "🔨 Running preinstall script..."
          echo "=========================================="
          node build/npm/preinstall.js
          echo "✅ preinstall completed"

      # ========== 步骤 11: 分步构建 VSCode ==========
      - name: 🔨 Step 1 - Compile TypeScript
        working-directory: ./vscode
        run: |
          echo "=========================================="
          echo "🔨 Step 1/3: Compiling TypeScript..."
          echo "=========================================="
          export VSCODE_SKIP_PRELAUNCH=1
          export NODE_OPTIONS="--max-old-space-size=8192"
          echo "Start time: $(date)"

          # 先编译 TypeScript
          ./node_modules/.bin/gulp compile --no-color

          echo "✅ TypeScript compilation completed at: $(date)"

      - name: 🔨 Step 2 - Build extensions
        working-directory: ./vscode
        run: |
          echo "=========================================="
          echo "🔨 Step 2/3: Building extensions..."
          echo "=========================================="
          export VSCODE_SKIP_PRELAUNCH=1
          export NODE_OPTIONS="--max-old-space-size=8192"
          echo "Start time: $(date)"

          # 构建扩展
          ./node_modules/.bin/gulp compile-extensions --no-color

          echo "✅ Extensions build completed at: $(date)"

      - name: 🔨 Step 3 - Build VSCode Linux x64
        working-directory: ./vscode
        run: |
          echo "=========================================="
          echo "🔨 Step 3/3: Building VSCode Linux x64..."
          echo "⏰ This may take 20-30 minutes..."
          echo "=========================================="
          export VSCODE_SKIP_PRELAUNCH=1
          export NODE_OPTIONS="--max-old-space-size=8192"
          echo "Start time: $(date)"

          # 使用 vscode-linux-x64 完整构建
          ./node_modules/.bin/gulp vscode-linux-x64 --no-color

          echo "✅ Build completed at: $(date)"

      # ========== 步骤 12: 验证构建输出 ==========
      - name: 🔍 Verify build output
        run: |
          echo "=========================================="
          echo "🔍 Verifying build output..."
          echo "=========================================="

          if [ -d "./VSCode-linux-x64" ]; then
            BUILD_DIR="./VSCode-linux-x64"
            echo "✅ Build found at: $BUILD_DIR"
          elif [ -d "./vscode/VSCode-linux-x64" ]; then
            BUILD_DIR="./vscode/VSCode-linux-x64"
            echo "✅ Build found at: $BUILD_DIR"
          else
            echo "❌ Build not found!"
            find . -name "VSCode-linux-x64" -type d 2>/dev/null || echo "Not found"
            exit 1
          fi

          echo "📁 Directory contents:"
          ls -la $BUILD_DIR | head -30

          if [ -f "$BUILD_DIR/code-oss" ] || [ -f "$BUILD_DIR/code" ]; then
            echo "✅ Executable found"
          else
            echo "❌ No executable found!"
            exit 1
          fi

          echo "BUILD_DIR=$BUILD_DIR" >> $GITHUB_ENV

      # ========== 步骤 13: 创建 UOS 启动脚本 ==========
      - name: 🚀 Create UOS startup scripts
        run: |
          echo "=========================================="
          echo "🚀 Creating UOS startup scripts..."
          echo "=========================================="

          BUILD_DIR="${BUILD_DIR:-./VSCode-linux-x64}"
          cd "$BUILD_DIR"

          cat > start-vscode.sh << 'EOF'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"

          export ELECTRON_ENABLE_GPU=0
          export LIBGL_ALWAYS_SOFTWARE=1
          export NODE_OPTIONS="--max-old-space-size=4096"
          export ELECTRON_DISABLE_SANDBOX=1
          export GDK_BACKEND=x11
          export QT_QPA_PLATFORM=xcb

          if [ -f "$SCRIPT_DIR/code-oss" ]; then
              EXEC="$SCRIPT_DIR/code-oss"
          elif [ -f "$SCRIPT_DIR/code" ]; then
              EXEC="$SCRIPT_DIR/code"
          else
              echo "❌ VSCode executable not found!"
              exit 1
          fi

          echo "=== VSCode UOS Launcher ==="
          echo "Version: $($EXEC --version | head -1)"

          if grep -q "UOS" /etc/os-release 2>/dev/null; then
              echo "✅ Detected UOS system"
          fi

          exec "$EXEC" \
              --no-sandbox \
              --disable-gpu-sandbox \
              --disable-software-rasterizer \
              --disable-gpu \
              "$@"
          EOF

          chmod +x start-vscode.sh

          cat > vscode-uos.desktop << 'EOF'
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=VSCode for UOS
          Comment=Visual Studio Code for UOS
          Exec=./start-vscode.sh %F
          Icon=code.png
          Terminal=false
          Categories=Development;IDE;
          StartupNotify=true
          StartupWMClass=Code
          EOF

          if [ -f "resources/app/resources/linux/code.png" ]; then
              cp resources/app/resources/linux/code.png ./
          fi

          echo "✅ Startup scripts created"

      # ========== 步骤 14: 打包 ==========
      - name: 📦 Package artifacts
        run: |
          echo "=========================================="
          echo "📦 Packaging artifacts..."
          echo "=========================================="
          mkdir -p artifacts
          VERSION="${{ github.event.inputs.vscode_version || '1.116.0' }}"

          BUILD_DIR="${BUILD_DIR:-./VSCode-linux-x64}"

          if [ ! -d "$BUILD_DIR" ]; then
            echo "❌ Build directory not found!"
            exit 1
          fi

          chmod +x $BUILD_DIR/*.sh 2>/dev/null || true

          tar -czf "artifacts/vscode-uos-${VERSION}.tar.gz" \
            --preserve-permissions \
            -C "$(dirname "$BUILD_DIR")" \
            "$(basename "$BUILD_DIR")"

          echo "✅ Package created"
          echo "📦 Package size: $(du -sh artifacts/vscode-uos-${VERSION}.tar.gz)"

      # ========== 步骤 15: 上传 ==========
      - name: 📤 Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: vscode-uos-${{ github.event.inputs.vscode_version || '1.116.0' }}
          path: artifacts/vscode-uos-*.tar.gz
          retention-days: 30

      # ========== 步骤 16: 构建摘要 ==========
      - name: 📊 Build summary
        if: always()
        run: |
          echo "=========================================="
          echo "📊 BUILD SUMMARY"
          echo "=========================================="
          echo "🟢 Status: ${{ job.status }}"
          echo "📦 Version: ${{ github.event.inputs.vscode_version || '1.116.0' }}"
          echo "=========================================="
          if [ "${{ job.status }}" == "success" ]; then
            echo "🎉 Build completed successfully!"
            ls -la artifacts/
          fi
          echo "=========================================="