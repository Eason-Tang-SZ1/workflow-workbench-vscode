name: Build Custom VSCode for UOS (Docker)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: true
        default: 'main'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 150

    steps:
      # ============================================================
      # 1. 检出源码
      # ============================================================
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch }}
          fetch-depth: 1

      # ============================================================
      # 2. 创建构建脚本
      # ============================================================
      - name: 📝 Create build script
        run: |
          cat > build.sh << 'EOF'
          #!/bin/bash
          set -e

          echo "=========================================="
          echo "Building VSCode in Docker..."
          echo "=========================================="

          # 修复 git 安全目录
          git config --global --add safe.directory /build

          # 【核心】创建一个 node 包装脚本，将所有调用转发给 tsx
          echo "Creating node wrapper..."
          mkdir -p /usr/local/bin
          cat > /usr/local/bin/node << 'NODE_WRAPPER'
          #!/bin/bash
          exec tsx "$@"
          NODE_WRAPPER
          chmod +x /usr/local/bin/node

          # 将 /usr/local/bin 添加到 PATH 最前面
          export PATH="/usr/local/bin:$PATH"

          echo "Node wrapper created. PATH: $PATH"
          echo "node version: $(which node)"

          # 修复 preinstall.ts / postinstall.ts
          echo 'console.log("✅ Preinstall OK");' > build/npm/preinstall.js
          sed -i 's/"preinstall": "node build\/npm\/preinstall.ts"/"preinstall": "node build\/npm\/preinstall.js"/' package.json
          echo 'console.log("✅ Postinstall OK");' > build/npm/postinstall.js
          sed -i 's/"postinstall": "node build\/npm\/postinstall.ts"/"postinstall": "node build\/npm\/postinstall.js"/' package.json

          # 修复 extensions.ts
          cat > build/lib/extensions.ts << 'EOT'
          import { Stream } from "stream";
          const empty: any[] = [];
          function emptyStream(): Stream {
            const s = new Stream.Readable();
            s._read = () => s.push(null);
            return s;
          }
          export function isWebExtension(): boolean { return false; }
          export function getExtensionStream(): Stream { return emptyStream(); }
          export function getExtensionDownloadStream(): Stream { return emptyStream(); }
          export function packageMarketplaceExtensionsStream(): Stream { return emptyStream(); }
          export function packageNonNativeLocalExtensionsStream(): Stream { return emptyStream(); }
          export function packageLocalExtensionsStream(): Stream { return emptyStream(); }
          export function packageExtensionsStream(): Stream { return emptyStream(); }
          export function packageCopilotExtensionStream(): Stream { return emptyStream(); }
          export function packageCopilotChatExtensionStream(): Stream { return emptyStream(); }
          export function packageCopilotAgentsExtensionStream(): Stream { return emptyStream(); }
          export function fromMarketplace(): any[] { return empty; }
          export async function fetchUrls(urls: string[], options: any): Promise<void> { return Promise.resolve(); }
          export function buildExtensionMedia(): void {}
          export function compileExtensionMedia(): void {}
          export function buildExtensionMediaTask(done: any): void { done(); }
          export const builtInExtensions = empty;
          export const shouldDownloadBuiltInExtensions = false;
          export const webBuiltInExtensions = empty;
          export const shouldDownloadWebBuiltInExtensions = false;
          EOT

          echo 'export const builtInExtensions: any[] = [];
          export const shouldDownloadBuiltInExtensions = false;
          export const webBuiltInExtensions: any[] = [];
          export const shouldDownloadWebBuiltInExtensions = false;' > build/lib/builtInExtensions.ts

          echo 'import { Stream } from "stream";
          export async function fetchUrls(urls: string[], options: any): Promise<void> {
            console.log("⚠️ fetch disabled");
            return Promise.resolve();
          }' > build/lib/fetch.ts

          # 安装依赖（跳过 native-keymap 编译）
          echo "Installing dependencies..."
          npm install --legacy-peer-deps --ignore-scripts

          # 手动编译 native-keymap
          echo "Building native-keymap..."
          cd node_modules/native-keymap || true
          export CXXFLAGS="-std=c++17"
          node-gyp rebuild || true
          cd ../..

          # 安装构建工具
          echo "Installing build tools..."
          npm install --legacy-peer-deps \
            ternary-stream vscode-gulp-watch esbuild jsonc-parser \
            gulp-merge-json gulp-tsb gulp-sourcemaps gulp-filter \
            gulp-rename gulp-sort 2>/dev/null || true

          # 构建
          echo "Building VSCode..."
          export NODE_OPTIONS="--max-old-space-size=8192"
          tsx node_modules/gulp/bin/gulp.js vscode-linux-x64-min --no-color

          echo "Build completed!"
          EOF

          chmod +x build.sh

      # ============================================================
      # 3. 创建 Dockerfile
      # ============================================================
      - name: 🐳 Create Dockerfile
        run: |
          cat > Dockerfile << 'EOF'
          FROM node:20-bullseye

          # 安装系统依赖
          RUN apt-get update && apt-get install -y \
              build-essential \
              pkg-config \
              libgtk-3-dev \
              libxkbfile-dev \
              libkrb5-dev \
              libgbm-dev \
              rpm \
              libx11-dev \
              libxss-dev \
              libxtst-dev \
              libnss3-dev \
              libasound2-dev \
              libglib2.0-dev \
              libcairo2-dev \
              libpango1.0-dev \
              libatk1.0-dev \
              libgdk-pixbuf2.0-dev \
              python3 \
              python3-pip \
              git \
              wget \
              curl \
              xvfb \
              libxkbcommon-x11-dev \
              libxcb-shape0-dev \
              libxcb-xfixes0-dev \
              libsecret-1-dev \
              libx11-xcb-dev \
              libxcb-keysyms1-dev \
              libxcb-icccm4-dev \
              libxcb-randr0-dev \
              libxcb-shm0-dev \
              libxcb-xinerama0-dev \
              libxcb-cursor-dev \
              libxcomposite-dev \
              libxcursor-dev \
              libxi-dev \
              libxrandr-dev \
              libxfixes-dev \
              && rm -rf /var/lib/apt/lists/*

          # 安装 node-gyp 和 tsx
          RUN npm install -g node-gyp tsx

          # 设置工作目录
          WORKDIR /build

          # 复制源码和构建脚本
          COPY . /build/
          COPY build.sh /build/build.sh

          # 设置环境变量
          ENV VSCODE_SKIP_BUILTIN_EXTENSION_DOWNLOAD=1
          ENV VSCODE_ELECTRON_SKIP_DOWNLOAD=1
          ENV VSCODE_SKIP_PRELAUNCH=1
          ENV VSCODE_SKIP_BUNDLED_EXTENSIONS=1
          ENV CXXFLAGS="-D_GLIBCXX_USE_CXX11_ABI=0 -std=c++17"
          ENV CFLAGS="-D_GLIBCXX_USE_CXX11_ABI=0"

          # 运行构建脚本
          CMD ["./build.sh"]
          EOF

      # ============================================================
      # 4. 构建 Docker 镜像并运行
      # ============================================================
      - name: 🐳 Build and run Docker
        run: |
          echo "Building Docker image..."
          docker build -t vscode-builder .

          echo "Running Docker container..."
          docker run --rm -v $(pwd):/build vscode-builder

          echo "Docker build completed"

      # ============================================================
      # 5. 验证
      # ============================================================
      - name: 🔍 Verify
        run: |
          if [ -d "./VSCode-linux-x64" ]; then
            echo "✅ Build found"
            echo "BUILD_DIR=./VSCode-linux-x64" >> $GITHUB_ENV
          elif [ -d "./vscode/VSCode-linux-x64" ]; then
            echo "✅ Build found in ./vscode/"
            echo "BUILD_DIR=./vscode/VSCode-linux-x64" >> $GITHUB_ENV
          else
            echo "❌ Build not found!"
            find . -name "VSCode-linux-x64" -type d 2>/dev/null || echo "Not found"
            exit 1
          fi

      # ============================================================
      # 6. 创建 UOS 启动脚本
      # ============================================================
      - name: 🚀 Create startup script
        run: |
          BUILD_DIR="${BUILD_DIR:-./VSCode-linux-x64}"
          cd "$BUILD_DIR"
          cat > start-vscode.sh << 'EOF'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          export ELECTRON_ENABLE_GPU=0
          export LIBGL_ALWAYS_SOFTWARE=1
          export NODE_OPTIONS="--max-old-space-size=4096"
          export ELECTRON_DISABLE_SANDBOX=1
          export GDK_BACKEND=x11
          export QT_QPA_PLATFORM=xcb
          export DISPLAY=:0
          if [ -f "$SCRIPT_DIR/code-oss" ]; then
              EXEC="$SCRIPT_DIR/code-oss"
          elif [ -f "$SCRIPT_DIR/code" ]; then
              EXEC="$SCRIPT_DIR/code"
          else
              echo "❌ Executable not found!"
              exit 1
          fi
          echo "=== Custom VSCode UOS ==="
          echo "Version: $($EXEC --version | head -1)"
          exec "$EXEC" --no-sandbox --disable-gpu-sandbox --disable-software-rasterizer --disable-gpu "$@"
          EOF
          chmod +x start-vscode.sh
          echo "✅ start-vscode.sh created"

      # ============================================================
      # 7. 打包
      # ============================================================
      - name: 📦 Package
        run: |
          mkdir -p artifacts
          BUILD_DIR="${BUILD_DIR:-./VSCode-linux-x64}"
          chmod +x $BUILD_DIR/*.sh 2>/dev/null || true
          tar -czf artifacts/custom-vscode-uos-$(date +%Y%m%d-%H%M%S).tar.gz \
            --preserve-permissions "$BUILD_DIR"
          ls -lh artifacts/

      # ============================================================
      # 8. 上传
      # ============================================================
      - name: 📤 Upload
        uses: actions/upload-artifact@v7
        with:
          name: custom-vscode-uos
          path: artifacts/custom-vscode-uos-*.tar.gz
          retention-days: 30