name: Build VSCode for UOS (glibc 2.28 Compatible)

on:
  workflow_dispatch:
    inputs:
      vscode_version:
        description: 'VSCode version to build'
        required: false
        default: '1.116.0'
        type: string

jobs:
  build-for-uos:
    # 关键修复：使用 ubuntu-latest 确保 runner 可用
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      # ========== 步骤 1: 环境信息 ==========
      - name: 📊 Environment info
        run: |
          echo "=========================================="
          echo "🚀 Starting VSCode build for UOS"
          echo "📦 Version: ${{ github.event.inputs.vscode_version || '1.116.0' }}"
          echo "🖥️  Runner OS: $(cat /etc/os-release | grep PRETTY_NAME)"
          echo "🐧 Kernel: $(uname -r)"
          echo "💾 Memory: $(free -h | grep Mem)"
          echo "💿 Disk: $(df -h / | tail -1)"
          echo "=========================================="

      # ========== 步骤 2: 克隆 VSCode 源码 ==========
      - name: 📥 Checkout VSCode source
        uses: actions/checkout@v6
        with:
          repository: microsoft/vscode
          lfs: false
          fetch-depth: 1
          ref: ${{ github.event.inputs.vscode_version || '1.116.0' }}
          path: vscode

      # ========== 步骤 3: 验证克隆 ==========
      - name: 🔍 Verify checkout
        run: |
          echo "=========================================="
          echo "🔍 Verifying checkout..."
          echo "=========================================="
          cd vscode
          echo "📄 package.json exists: $(test -f package.json && echo '✅' || echo '❌')"
          echo "📄 package-lock.json exists: $(test -f package-lock.json && echo '✅' || echo '❌')"
          echo "📌 Version: $(grep '"version"' package.json | head -1)"
          echo "📁 Files count: $(find . -type f | wc -l)"

      # ========== 步骤 4: 安装 Node.js ==========
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          cache: 'npm'
          cache-dependency-path: vscode/package-lock.json

      # ========== 步骤 5: 安装系统依赖 ==========
      - name: 🔧 Install system dependencies
        run: |
          echo "=========================================="
          echo "📦 Installing system dependencies..."
          echo "=========================================="
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libxkbfile-dev \
            libkrb5-dev \
            libgbm-dev \
            rpm \
            libx11-dev \
            libxss-dev \
            libxtst-dev \
            libnss3-dev \
            libasound2-dev \
            libglib2.0-dev \
            libcairo2-dev \
            libpango1.0-dev \
            libatk1.0-dev \
            libgdk-pixbuf2.0-dev \
            libsecret-1-dev \
            libxcb-shape0-dev \
            libxcb-xfixes0-dev \
            python3 \
            git
          echo "✅ System dependencies installed"

      # ========== 步骤 6: 设置 glibc 兼容性（关键！确保在 UOS 上运行） ==========
      - name: 🔄 Set glibc compatibility for UOS
        run: |
          echo "=========================================="
          echo "🔄 Setting glibc compatibility for UOS (glibc 2.28)..."
          echo "=========================================="
          # 这些环境变量确保编译出的二进制兼容旧版 glibc
          echo "CXXFLAGS=-D_GLIBCXX_USE_CXX11_ABI=0" >> $GITHUB_ENV
          echo "CFLAGS=-D_GLIBCXX_USE_CXX11_ABI=0" >> $GITHUB_ENV
          echo "LDFLAGS=-Wl,--allow-shlib-undefined" >> $GITHUB_ENV
          echo "✅ Compatibility flags set"
          echo "CXXFLAGS=-D_GLIBCXX_USE_CXX11_ABI=0"
          echo "CFLAGS=-D_GLIBCXX_USE_CXX11_ABI=0"

      # ========== 步骤 7: 缓存 npm 依赖 ==========
      - name: 💾 Cache npm dependencies
        uses: actions/cache@v4
        with:
          path: |
            vscode/node_modules
            ~/.npm
            ~/.cache/electron
            ~/.cache/ms-playwright
          key: ${{ runner.os }}-npm-vscode-${{ hashFiles('vscode/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-npm-vscode-

      # ========== 步骤 8: 安装 npm 依赖 ==========
      - name: 📦 Install npm dependencies
        working-directory: ./vscode
        run: |
          echo "=========================================="
          echo "📦 Installing npm dependencies..."
          echo "⏰ This may take 10-15 minutes..."
          echo "=========================================="
          npm --version
          node --version
          echo "Start time: $(date)"
          npm install --no-audit --legacy-peer-deps
          echo "✅ npm install completed at: $(date)"
          echo "📁 node_modules size: $(du -sh node_modules 2>/dev/null | cut -f1 || echo 'N/A')"

      # ========== 步骤 9: 编译 TypeScript ==========
      - name: 🔨 Compile TypeScript
        working-directory: ./vscode
        run: |
          echo "=========================================="
          echo "🔨 Compiling TypeScript..."
          echo "⏰ This may take 10-15 minutes..."
          echo "=========================================="
          export NODE_OPTIONS="--max-old-space-size=4096"
          echo "Start time: $(date)"
          ./node_modules/.bin/gulp compile-build
          echo "✅ compile-build completed at: $(date)"
          ./node_modules/.bin/gulp compile-extensions-build
          echo "✅ compile-extensions-build completed at: $(date)"

      # ========== 步骤 10: 构建 VSCode Linux x64 ==========
      - name: 🔨 Build VSCode Linux x64
        working-directory: ./vscode
        run: |
          echo "=========================================="
          echo "🔨 Building VSCode Linux x64..."
          echo "⏰ This may take 20-30 minutes..."
          echo "=========================================="
          export VSCODE_SKIP_PRELAUNCH=1
          export NODE_OPTIONS="--max-old-space-size=4096"
          echo "Start time: $(date)"
          ./node_modules/.bin/gulp vscode-linux-x64-min
          echo "✅ Build completed at: $(date)"

      # ========== 步骤 11: 验证构建输出 ==========
      - name: 🔍 Verify build output
        run: |
          echo "=========================================="
          echo "🔍 Verifying build output..."
          echo "=========================================="
          if [ -d "./vscode/VSCode-linux-x64" ]; then
            echo "✅ Build found at: ./vscode/VSCode-linux-x64"
            echo "📁 Directory contents:"
            ls -la ./vscode/VSCode-linux-x64/
            echo "📁 Size: $(du -sh ./vscode/VSCode-linux-x64)"
            if [ -f "./vscode/VSCode-linux-x64/code" ]; then
              echo "✅ code executable exists"
              file ./vscode/VSCode-linux-x64/code
            else
              echo "❌ code executable not found!"
              exit 1
            fi
          else
            echo "❌ Build not found!"
            echo "Searching for VSCode-linux-x64..."
            find ./vscode -name "VSCode-linux-x64" -type d 2>/dev/null || echo "Not found"
            exit 1
          fi

      # ========== 步骤 12: 创建 UOS 启动脚本 ==========
      - name: 🚀 Create UOS startup scripts
        run: |
          echo "=========================================="
          echo "🚀 Creating UOS startup scripts..."
          echo "=========================================="
          cd ./vscode/VSCode-linux-x64

          # 创建启动脚本
          cat > run-uos.sh << 'EOF'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          echo "=== VSCode UOS Launcher ==="
          echo "Version: $($SCRIPT_DIR/code --version | head -1)"
          echo "Script directory: $SCRIPT_DIR"

          # UOS 兼容设置
          export ELECTRON_ENABLE_GPU=0
          export LIBGL_ALWAYS_SOFTWARE=1
          export NODE_OPTIONS="--max-old-space-size=4096"

          # 检测 UOS 系统
          if grep -q "UOS" /etc/os-release 2>/dev/null; then
            echo "✅ Detected UOS system, enabling compatibility mode..."
          fi

          # 启动 VSCode
          exec "$SCRIPT_DIR/code" \
            --no-sandbox \
            --disable-gpu-sandbox \
            --disable-software-rasterizer \
            "$@"
          EOF

          chmod +x run-uos.sh
          echo "✅ run-uos.sh created"

          # 创建桌面入口文件
          cat > vscode-uos.desktop << 'EOF'
          [Desktop Entry]
          Version=1.0
          Name=Visual Studio Code (UOS)
          Comment=Code Editing. Redefined.
          Exec=./run-uos.sh %F
          Icon=resources/app/resources/linux/code.png
          Terminal=false
          Type=Application
          Categories=Development;IDE;
          MimeType=text/plain;inode/directory;
          StartupWMClass=Code
          EOF
          echo "✅ vscode-uos.desktop created"

      # ========== 步骤 13: 打包 ==========
      - name: 📦 Package artifacts
        run: |
          echo "=========================================="
          echo "📦 Packaging artifacts..."
          echo "=========================================="
          mkdir -p artifacts
          VERSION="${{ github.event.inputs.vscode_version || '1.116.0' }}"

          cd ./vscode
          tar -czf "../artifacts/vscode-uos-${VERSION}.tar.gz" \
            --exclude='*.map' \
            --exclude='*.ts' \
            --exclude='node_modules' \
            --exclude='.git' \
            VSCode-linux-x64
          cd ..

          echo "✅ Package created"
          echo "📦 Package size: $(du -sh artifacts/vscode-uos-${VERSION}.tar.gz)"
          echo "📁 Artifact saved to: artifacts/vscode-uos-${VERSION}.tar.gz"

      # ========== 步骤 14: 上传 ==========
      - name: 📤 Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: vscode-uos-${{ github.event.inputs.vscode_version || '1.116.0' }}
          path: artifacts/vscode-uos-*.tar.gz
          retention-days: 30

      # ========== 步骤 15: 构建摘要 ==========
      - name: 📊 Build summary
        if: always()
        run: |
          echo "=========================================="
          echo "📊 BUILD SUMMARY"
          echo "=========================================="
          echo "🟢 Status: ${{ job.status }}"
          echo "📦 Version: ${{ github.event.inputs.vscode_version || '1.116.0' }}"
          echo "🖥️  Runner: ubuntu-latest"
          echo "🐧 glibc compatibility: enabled (CXXFLAGS=-D_GLIBCXX_USE_CXX11_ABI=0)"
          echo "📁 Artifacts:"
          ls -la artifacts/ 2>/dev/null || echo "No artifacts"
          echo "=========================================="
          echo "🎉 Build completed! Download the artifact from the Actions page."
          echo "📥 On UOS: tar -xzf vscode-uos-*.tar.gz && cd VSCode-linux-x64 && ./run-uos.sh"
          echo "=========================================="