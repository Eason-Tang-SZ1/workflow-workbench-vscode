name: Build Custom VSCode for UOS (Double-click)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: true
        default: 'main'
      version:
        description: 'Package version'
        required: false
        default: '1.116.0'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch }}
          fetch-depth: 1

      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'

      - name: 🔧 Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential pkg-config libgtk-3-dev libxkbfile-dev \
            libkrb5-dev libgbm-dev rpm libx11-dev libxss-dev libxtst-dev \
            libnss3-dev libasound2-dev libglib2.0-dev libcairo2-dev \
            libpango1.0-dev libatk1.0-dev libgdk-pixbuf2.0-dev \
            python3 git wget curl

      - name: 🔧 Fix TypeScript scripts
        run: |
          echo 'console.log("✅ Preinstall OK");' > build/npm/preinstall.js
          sed -i 's/"preinstall": "node build\/npm\/preinstall.ts"/"preinstall": "node build\/npm\/preinstall.js"/' package.json
          echo 'console.log("✅ Postinstall OK");' > build/npm/postinstall.js
          sed -i 's/"postinstall": "node build\/npm\/postinstall.ts"/"postinstall": "node build\/npm\/postinstall.js"/' package.json

      - name: 📦 Install dependencies
        run: npm install --legacy-peer-deps

      - name: 📦 Install build tools
        run: |
          npm install -g tsx
          npm install --legacy-peer-deps \
            ternary-stream vscode-gulp-watch esbuild jsonc-parser \
            gulp-merge-json gulp-tsb gulp-sourcemaps gulp-filter \
            gulp-rename gulp-sort 2>/dev/null || true

      - name: 🔧 Fix extensions.ts
        run: |
          cat > build/lib/extensions.ts << 'EOF'
          import { Stream } from "stream";
          const empty: any[] = [];
          function emptyStream(): Stream {
            const s = new Stream.Readable();
            s._read = () => s.push(null);
            return s;
          }
          export function isWebExtension(): boolean { return false; }
          export function getExtensionStream(): Stream { return emptyStream(); }
          export function getExtensionDownloadStream(): Stream { return emptyStream(); }
          export function packageMarketplaceExtensionsStream(): Stream { return emptyStream(); }
          export function packageNativeLocalExtensionsStream(): Stream { return emptyStream(); }
          export function packageNonNativeLocalExtensionsStream(): Stream { return emptyStream(); }
          export function packageLocalExtensionsStream(): Stream { return emptyStream(); }
          export function packageExtensionsStream(): Stream { return emptyStream(); }
          export function packageCopilotExtensionStream(): Stream { return emptyStream(); }
          export function packageCopilotChatExtensionStream(): Stream { return emptyStream(); }
          export function packageCopilotAgentsExtensionStream(): Stream { return emptyStream(); }
          export function fromMarketplace(): any[] { return empty; }
          export async function fetchUrls(urls: string[], options: any): Promise<void> {
            console.log("⚠️ fetchUrls: disabled");
            return Promise.resolve();
          }
          export function buildExtensionMedia(): void {}
          export function compileExtensionMedia(): void {}
          export function buildExtensionMediaTask(done: any): void { done(); }
          export const builtInExtensions = empty;
          export const shouldDownloadBuiltInExtensions = false;
          export const webBuiltInExtensions = empty;
          export const shouldDownloadWebBuiltInExtensions = false;
          EOF
          echo 'export const builtInExtensions: any[] = [];
          export const shouldDownloadBuiltInExtensions = false;
          export const webBuiltInExtensions: any[] = [];
          export const shouldDownloadWebBuiltInExtensions = false;' > build/lib/builtInExtensions.ts
          echo 'import { Stream } from "stream";
          export async function fetchUrls(urls: string[], options: any): Promise<void> {
            console.log("⚠️ fetchUrls: disabled");
            return Promise.resolve();
          }' > build/lib/fetch.ts

      - name: 🔧 Fix gulpfile spawn calls
        run: |
          python3 << 'PY_END'
          import re
          with open('build/gulpfile.vscode.ts', 'r') as f:
              content = f.read()
          content = re.sub(r"spawn\('node'", "spawn('tsx'", content)
          content = re.sub(r'spawn\("node"', 'spawn("tsx"', content)
          content = re.sub(r"spawn\(process\.execPath", "spawn('tsx'", content)
          with open('build/gulpfile.vscode.ts', 'w') as f:
              f.write(content)
          print("✅ spawn calls fixed")
          PY_END

      - name: 🔧 Replace copilot.ts
        run: |
          cat > build/lib/copilot.ts << 'EOF'
          export async function prepareBuiltInCopilotExtensionShims(extRoot: string): Promise<void> {
              console.log('⚠️ Copilot extension shims preparation skipped for UOS build');
              return;
          }
          export function copyCopilotNativeDeps(productRoot: string): void {
              console.log('⚠️ Copilot native deps copy skipped for UOS build');
          }
          export function getCopilotExcludeFilter(): any {
              return function() { return false; };
          }
          EOF

      # ============================================================
      # 10. 禁用 Crashpad
      # ============================================================
      - name: 🔧 Disable Crashpad
        run: |
          echo "=========================================="
          echo "🔧 禁用 Crashpad"
          echo "=========================================="

          python3 << 'PY_JSON_END'
          import json
          import os
          if os.path.exists('product.json'):
              with open('product.json', 'r') as f:
                  data = json.load(f)
              data['enableCrashReport'] = False
              if 'crashReporter' not in data:
                  data['crashReporter'] = {}
              data['crashReporter']['disabled'] = True
              with open('product.json', 'w') as f:
                  json.dump(data, f, indent=2)
              print("✅ product.json 已修改")
          PY_JSON_END

          mkdir -p src/vs/platform/crash/common
          cat > src/vs/platform/crash/common/crashService.ts << 'CRASH_EOF'
          /*---------------------------------------------------------------------------------------------
           *  Copyright (c) Microsoft Corporation. All rights reserved.
           *  Licensed under the MIT License. See License.txt in the project root for license information.
           *--------------------------------------------------------------------------------------------*/
          // DISABLED: Crash service for UOS build
          import { createDecorator } from '../../../base/common/instantiation.js';
          export const ICrashService = createDecorator<ICrashService>('crashService');
          export interface ICrashService { _serviceBrand: undefined; }
          export class CrashService implements ICrashService {
              declare readonly _serviceBrand: undefined;
              constructor() { console.log('⚠️ Crash service disabled for UOS build'); }
          }
          CRASH_EOF
          echo "✅ crashService.ts 已创建"

          echo "✅ Crashpad 已禁用"

      - name: ⚙️ Set env
        run: |
          echo "VSCODE_SKIP_BUILTIN_EXTENSION_DOWNLOAD=1" >> $GITHUB_ENV
          echo "VSCODE_ELECTRON_SKIP_DOWNLOAD=1" >> $GITHUB_ENV
          echo "VSCODE_SKIP_PRELAUNCH=1" >> $GITHUB_ENV
          echo "VSCODE_SKIP_BUNDLED_EXTENSIONS=1" >> $GITHUB_ENV
          echo "ELECTRON_DISABLE_CRASH_REPORTER=1" >> $GITHUB_ENV
          echo "ELECTRON_DISABLE_CRASH_REPORTING=1" >> $GITHUB_ENV

      - name: 🔨 Build VSCode
        run: |
          export NODE_OPTIONS="--max-old-space-size=8192"
          export VSCODE_SKIP_BUILTIN_EXTENSION_DOWNLOAD=1
          export VSCODE_ELECTRON_SKIP_DOWNLOAD=1
          export VSCODE_SKIP_PRELAUNCH=1
          export VSCODE_SKIP_BUNDLED_EXTENSIONS=1
          export ELECTRON_DISABLE_CRASH_REPORTER=1
          export ELECTRON_DISABLE_CRASH_REPORTING=1
          echo "Start: $(date)"
          npx tsx node_modules/gulp/bin/gulp.js vscode-linux-x64 --no-color
          echo "Done: $(date)"

      # ============================================================
      # 11. 验证构建产物
      # ============================================================
      - name: 🔍 Verify build contents
        run: |
          echo "=========================================="
          echo "🔍 验证构建产物"
          echo "=========================================="

          BUILD_DIR=""
          for dir in "./VSCode-linux-x64" "./vscode/VSCode-linux-x64" "../VSCode-linux-x64"; do
            if [ -d "$dir" ]; then
              BUILD_DIR="$dir"
              echo "✅ 找到构建目录: $BUILD_DIR"
              break
            fi
          done

          if [ -z "$BUILD_DIR" ]; then
            echo "❌ 找不到构建目录!"
            exit 1
          fi

          echo "BUILD_DIR=$BUILD_DIR" >> $GITHUB_ENV

          if [ -d "$BUILD_DIR/extensions" ]; then
            echo "✅ extensions 存在"
          else
            echo "⚠️ extensions 不存在"
          fi

          if [ -d "$BUILD_DIR/node_modules" ]; then
            echo "✅ node_modules 存在"
          else
            echo "⚠️ node_modules 不存在"
          fi

      # ============================================================
      # 12. 从官方 tar.gz 复制内容，保留自定义二进制
      # ============================================================
      - name: 📥 Extract official tar.gz and merge
        run: |
          echo "=========================================="
          echo "📥 从官方 tar.gz 提取并合并"
          echo "=========================================="

          BUILD_DIR="${BUILD_DIR:-./VSCode-linux-x64}"

          # 下载官方 tar.gz
          echo "📌 下载官方 tar.gz..."
          wget -q --show-progress https://update.code.visualstudio.com/latest/linux-x64/stable -O /tmp/code.tar.gz

          if [ ! -f "/tmp/code.tar.gz" ]; then
            echo "❌ 下载失败!"
            exit 1
          fi

          mkdir -p /tmp/code-tar
          echo "📌 解压官方 tar.gz..."
          tar -xzf /tmp/code.tar.gz -C /tmp/code-tar 2>/dev/null

          # 找到官方 VSCode-linux-x64 目录
          OFFICIAL_DIR=$(find /tmp/code-tar -type d -name "VSCode-linux-x64" 2>/dev/null | head -1)

          if [ -z "$OFFICIAL_DIR" ] || [ ! -d "$OFFICIAL_DIR" ]; then
            echo "❌ 找不到官方 VSCode 目录！"
            echo "📌 搜索所有目录:"
            find /tmp/code-tar -type d 2>/dev/null | head -20
            exit 1
          fi

          echo "📌 找到官方目录: $OFFICIAL_DIR"
          echo "📌 官方目录内容:"
          ls -la "$OFFICIAL_DIR"

          # 保存用户构建的二进制文件和关键文件
          echo ""
          echo "📌 保存用户构建的文件..."
          mkdir -p /tmp/backup

          # 保存二进制文件
          if [ -f "$BUILD_DIR/tscode" ]; then
            cp "$BUILD_DIR/tscode" /tmp/backup/
            echo "   ✅ 备份 tscode"
          fi
          if [ -f "$BUILD_DIR/tscode.real" ]; then
            cp "$BUILD_DIR/tscode.real" /tmp/backup/
            echo "   ✅ 备份 tscode.real"
          fi

          # 保存 package.json 和 product.json（如果有修改）
          if [ -f "$BUILD_DIR/package.json" ]; then
            cp "$BUILD_DIR/package.json" /tmp/backup/
            echo "   ✅ 备份 package.json"
          fi
          if [ -f "$BUILD_DIR/product.json" ]; then
            cp "$BUILD_DIR/product.json" /tmp/backup/
            echo "   ✅ 备份 product.json"
          fi

          # 清空当前构建目录（保留目录本身）
          echo ""
          echo "📌 清空当前构建目录..."
          find "$BUILD_DIR" -mindepth 1 -delete 2>/dev/null || rm -rf "$BUILD_DIR"/*

          # 复制官方所有内容
          echo ""
          echo "📌 复制官方所有内容..."
          cp -r "$OFFICIAL_DIR"/* "$BUILD_DIR/"

          # ============================================================
          # 【关键】恢复用户构建的二进制文件，但使用官方的 snapshot
          # ============================================================
          echo ""
          echo "📌 恢复用户构建的文件..."

          # 恢复二进制文件
          if [ -f "/tmp/backup/tscode.real" ]; then
            cp /tmp/backup/tscode.real "$BUILD_DIR/"
            echo "   ✅ 恢复 tscode.real (自定义构建)"
          fi
          if [ -f "/tmp/backup/tscode" ]; then
            cp /tmp/backup/tscode "$BUILD_DIR/"
            echo "   ✅ 恢复 tscode (包装脚本)"
          fi

          # 恢复 product.json（如果有自定义）
          if [ -f "/tmp/backup/product.json" ]; then
            cp /tmp/backup/product.json "$BUILD_DIR/"
            echo "   ✅ 恢复 product.json (自定义)"
          fi

          # 恢复 package.json（如果有自定义）
          if [ -f "/tmp/backup/package.json" ]; then
            cp /tmp/backup/package.json "$BUILD_DIR/"
            echo "   ✅ 恢复 package.json (自定义)"
          fi

          # ============================================================
          # 【关键修复】使用官方的 snapshot 文件
          # ============================================================
          echo ""
          echo "📌 使用官方的 snapshot 文件（修复 V8 版本不匹配）..."

          # 从官方目录复制 snapshot 文件
          if [ -f "$OFFICIAL_DIR/snapshot_blob.bin" ]; then
            cp "$OFFICIAL_DIR/snapshot_blob.bin" "$BUILD_DIR/"
            echo "   ✅ 使用官方 snapshot_blob.bin"
          else
            echo "   ⚠️ 官方 snapshot_blob.bin 不存在"
          fi

          if [ -f "$OFFICIAL_DIR/v8_context_snapshot.bin" ]; then
            cp "$OFFICIAL_DIR/v8_context_snapshot.bin" "$BUILD_DIR/"
            echo "   ✅ 使用官方 v8_context_snapshot.bin"
          else
            echo "   ⚠️ 官方 v8_context_snapshot.bin 不存在"
          fi

          # 从官方目录复制其他必要的二进制文件（如果用户构建的缺失）
          if [ ! -f "/tmp/backup/tscode.real" ]; then
            if [ -f "$OFFICIAL_DIR/code" ]; then
              cp "$OFFICIAL_DIR/code" "$BUILD_DIR/tscode.real"
              echo "   ⚠️ 使用官方 code 作为 tscode.real (用户构建不存在)"
            fi
          fi

          # 确保 node_modules 在正确位置
          echo ""
          echo "📌 处理 node_modules..."
          if [ -d "$BUILD_DIR/node_modules" ]; then
            echo "📌 移动 node_modules 到 resources/app/..."
            mkdir -p "$BUILD_DIR/resources/app"
            mv "$BUILD_DIR/node_modules" "$BUILD_DIR/resources/app/"
            echo "   ✅ node_modules 已移动到 resources/app/"
          fi

          if [ -d "$BUILD_DIR/resources/app/node_modules" ]; then
            echo "   ✅ resources/app/node_modules 存在"
          else
            echo "   ⚠️ resources/app/node_modules 不存在，尝试从官方复制..."
            if [ -d "$OFFICIAL_DIR/resources/app/node_modules" ]; then
              cp -r "$OFFICIAL_DIR/resources/app/node_modules" "$BUILD_DIR/resources/app/"
              echo "   ✅ 从官方复制 node_modules"
            elif [ -d "$OFFICIAL_DIR/node_modules" ]; then
              mkdir -p "$BUILD_DIR/resources/app"
              cp -r "$OFFICIAL_DIR/node_modules" "$BUILD_DIR/resources/app/"
              echo "   ✅ 从官方复制 node_modules"
            fi
          fi

          # 清理
          rm -rf /tmp/code-tar /tmp/code.tar.gz /tmp/backup

          # ============================================================
          # 验证
          # ============================================================
          echo ""
          echo "📌 验证目录结构:"
          ls -la "$BUILD_DIR" | head -20

          echo ""
          echo "📌 验证关键文件:"
          if [ -f "$BUILD_DIR/package.json" ]; then
            echo "   ✅ package.json 存在"
          else
            echo "   ❌ package.json 不存在"
          fi

          if [ -f "$BUILD_DIR/product.json" ]; then
            echo "   ✅ product.json 存在"
          else
            echo "   ❌ product.json 不存在"
          fi

          if [ -d "$BUILD_DIR/resources/app/extensions" ]; then
            echo "   ✅ extensions 存在"
          else
            echo "   ❌ extensions 不存在"
          fi

          if [ -d "$BUILD_DIR/resources/app/node_modules" ]; then
            echo "   ✅ node_modules 存在"
          else
            echo "   ❌ node_modules 不存在"
          fi

          if [ -f "$BUILD_DIR/tscode" ]; then
            echo "   ✅ tscode 存在"
          fi

          if [ -f "$BUILD_DIR/tscode.real" ]; then
            echo "   ✅ tscode.real 存在"
          fi

          if [ -f "$BUILD_DIR/snapshot_blob.bin" ]; then
            echo "   ✅ snapshot_blob.bin 存在"
          fi

          if [ -f "$BUILD_DIR/v8_context_snapshot.bin" ]; then
            echo "   ✅ v8_context_snapshot.bin 存在"
          fi

          # 验证版本匹配
          echo ""
          echo "📌 验证 V8 版本匹配:"
          if [ -f "$BUILD_DIR/tscode.real" ] && [ -f "$BUILD_DIR/snapshot_blob.bin" ]; then
            echo "   检查版本信息..."
            strings "$BUILD_DIR/tscode.real" | grep -E "Chrome|V8" | head -3 || echo "   ⚠️ 无法读取版本信息"
            strings "$BUILD_DIR/snapshot_blob.bin" | grep -E "Chrome|V8" | head -3 || echo "   ⚠️ 无法读取 snapshot 版本"
          fi

      # ============================================================
      # 13. 查找并复制预构建扩展（修复版本）
      # ============================================================
      - name: 📂 Find and copy prebuilt extensions
        run: |
          echo "=========================================="
          echo "🔍 查找并复制预构建扩展"
          echo "=========================================="

          BUILD_DIR="${BUILD_DIR:-./VSCode-linux-x64}"
          TARGET_DIR="$BUILD_DIR/resources/app/extensions"
          mkdir -p "$TARGET_DIR"

          # 1. 搜索所有可能的预构建扩展位置
          echo ""
          echo "📌 步骤 1: 搜索所有可能的预构建扩展位置..."
          find . -type d -name "*prebuilt*" 2>/dev/null | while read -r dir; do
            echo "   找到: $dir"
            ls -la "$dir" 2>/dev/null | head -5
          done

          # 2. 查找所有 testagent 相关文件/目录
          echo ""
          echo "📌 步骤 2: 搜索所有 testagent 相关文件/目录..."
          find . -type f -o -type d | grep -i "testagent" 2>/dev/null | while read -r item; do
            echo "   $item"
          done

          # 3. 查找所有 .vsix 文件
          echo ""
          echo "📌 步骤 3: 搜索所有 .vsix 文件..."
          find . -name "*.vsix" -type f 2>/dev/null | while read -r vsix; do
            echo "   $vsix"
            ls -lh "$vsix" 2>/dev/null | awk '{print "      " $5 " " $9}'
          done

          # 4. 检查 prebuilt-extensions 目录内容
          echo ""
          echo "📌 步骤 4: prebuilt-extensions 目录内容:"
          if [ -d "./prebuilt-extensions" ]; then
            echo "   📁 ./prebuilt-extensions 内容:"
            ls -la ./prebuilt-extensions/
            if [ -d "./prebuilt-extensions/linux" ]; then
              echo ""
              echo "   📁 ./prebuilt-extensions/linux 内容:"
              ls -la ./prebuilt-extensions/linux/
            fi
            if [ -d "./prebuilt-extensions/linux/x64" ]; then
              echo ""
              echo "   📁 ./prebuilt-extensions/linux/x64 内容:"
              ls -la ./prebuilt-extensions/linux/x64/
            fi
          else
            echo "   ❌ ./prebuilt-extensions 不存在"
          fi

          # 5. 在 prebuilt-extensions 中查找 testagent
          echo ""
          echo "📌 步骤 5: 在 prebuilt-extensions 中查找 testagent..."

          PREBUILT_PATHS=(
            "./prebuilt-extensions"
            "./prebuilt-extensions-linux-x64"
            "./prebuilt-extensions/linux"
            "./prebuilt-extensions/linux-x64"
            "./out/prebuilt-extensions"
          )

          TESTAGENT_SRC=""
          for path in "${PREBUILT_PATHS[@]}"; do
            if [ -d "$path" ]; then
              echo "   检查: $path"
              FOUND=$(find "$path" -maxdepth 2 -type d -name "*test*agent*" 2>/dev/null | head -1)
              if [ -n "$FOUND" ]; then
                echo "   ✅ 找到: $FOUND"
                TESTAGENT_SRC="$FOUND"
                break
              fi
            fi
          done

          # 6. 如果找到目录，复制到目标位置
          if [ -n "$TESTAGENT_SRC" ] && [ -d "$TESTAGENT_SRC" ]; then
            echo ""
            echo "📌 步骤 6: 复制 testagent 到 $TARGET_DIR/test-tech.TestAgent"
            mkdir -p "$TARGET_DIR/test-tech.TestAgent"
            cp -r "$TESTAGENT_SRC"/* "$TARGET_DIR/test-tech.TestAgent/"
            echo "   ✅ 复制完成"

            echo "   📁 复制的内容:"
            ls -la "$TARGET_DIR/test-tech.TestAgent/" | head -10
          else
            echo ""
            echo "⚠️ 未找到 testagent 目录，尝试解压 .vsix 文件..."

            # 查找 testagent 的 .vsix 文件（优先 linux/x64）
            VSIX_FILE=""
            for pattern in "./prebuilt-extensions/linux/x64/testagent*.vsix" "./prebuilt-extensions/linux/*/testagent*.vsix" "./prebuilt-extensions/*testagent*.vsix" "./prebuilt-extensions/*test-agent*.vsix"; do
              FOUND=$(ls -1 $pattern 2>/dev/null | head -1)
              if [ -n "$FOUND" ] && [ -f "$FOUND" ]; then
                VSIX_FILE="$FOUND"
                break
              fi
            done

            if [ -n "$VSIX_FILE" ] && [ -f "$VSIX_FILE" ]; then
              echo "   ✅ 找到 .vsix 文件: $VSIX_FILE"
              rm -rf "$TARGET_DIR/test-tech.TestAgent" 2>/dev/null
              mkdir -p "$TARGET_DIR/test-tech.TestAgent"
              unzip -q "$VSIX_FILE" -d "$TARGET_DIR/test-tech.TestAgent"
              echo "   ✅ 解压完成"

              # 检查解压后的目录结构
              echo "   📁 解压后的内容:"
              ls -la "$TARGET_DIR/test-tech.TestAgent/" | head -10

              # 如果解压后是 extension 子目录，移动内容到上层
              if [ -d "$TARGET_DIR/test-tech.TestAgent/extension" ]; then
                echo "   📌 移动 extension 子目录内容到上层..."
                mv "$TARGET_DIR/test-tech.TestAgent/extension"/* "$TARGET_DIR/test-tech.TestAgent/"
                rm -rf "$TARGET_DIR/test-tech.TestAgent/extension"
                echo "   ✅ 移动完成"
                ls -la "$TARGET_DIR/test-tech.TestAgent/" | head -10
              fi
            else
              echo "   ❌ 未找到 testagent 的 .vsix 文件"
            fi
          fi

          # 7. 解压其他预构建扩展
          echo ""
          echo "📌 步骤 7: 解压其他预构建扩展..."

          # 解压 cweijan.vscode-office
          if [ -f "./prebuilt-extensions/cweijan.vscode-office-4.1.5.vsix" ]; then
            echo "   📦 解压 cweijan.vscode-office-4.1.5.vsix..."
            rm -rf "$TARGET_DIR/cweijan.vscode-office" 2>/dev/null
            mkdir -p "$TARGET_DIR/cweijan.vscode-office"
            unzip -q "./prebuilt-extensions/cweijan.vscode-office-4.1.5.vsix" -d "$TARGET_DIR/cweijan.vscode-office"
            echo "   ✅ cweijan.vscode-office 已解压"
            if [ -d "$TARGET_DIR/cweijan.vscode-office/extension" ]; then
              mv "$TARGET_DIR/cweijan.vscode-office/extension"/* "$TARGET_DIR/cweijan.vscode-office/"
              rm -rf "$TARGET_DIR/cweijan.vscode-office/extension"
            fi
          else
            echo "   ⚠️ 未找到 cweijan.vscode-office.vsix"
          fi

          # 解压 test-tech.beeeyes
          if [ -f "./prebuilt-extensions/test-tech.beeeyes-0.0.1.vsix" ]; then
            echo "   📦 解压 test-tech.beeeyes-0.0.1.vsix..."
            rm -rf "$TARGET_DIR/test-tech.beeeyes" 2>/dev/null
            mkdir -p "$TARGET_DIR/test-tech.beeeyes"
            unzip -q "./prebuilt-extensions/test-tech.beeeyes-0.0.1.vsix" -d "$TARGET_DIR/test-tech.beeeyes"
            echo "   ✅ test-tech.beeeyes 已解压"
            if [ -d "$TARGET_DIR/test-tech.beeeyes/extension" ]; then
              mv "$TARGET_DIR/test-tech.beeeyes/extension"/* "$TARGET_DIR/test-tech.beeeyes/"
              rm -rf "$TARGET_DIR/test-tech.beeeyes/extension"
            fi
          else
            echo "   ⚠️ 未找到 test-tech.beeeyes.vsix"
          fi

          # 解压 test-tech.skillhub
          if [ -f "./prebuilt-extensions/test-tech.skillhub-1.0.3-uat.vsix" ]; then
            echo "   📦 解压 test-tech.skillhub-1.0.3-uat.vsix..."
            rm -rf "$TARGET_DIR/test-tech.skillhub" 2>/dev/null
            mkdir -p "$TARGET_DIR/test-tech.skillhub"
            unzip -q "./prebuilt-extensions/test-tech.skillhub-1.0.3-uat.vsix" -d "$TARGET_DIR/test-tech.skillhub"
            echo "   ✅ test-tech.skillhub 已解压"
            if [ -d "$TARGET_DIR/test-tech.skillhub/extension" ]; then
              mv "$TARGET_DIR/test-tech.skillhub/extension"/* "$TARGET_DIR/test-tech.skillhub/"
              rm -rf "$TARGET_DIR/test-tech.skillhub/extension"
            fi
          else
            echo "   ⚠️ 未找到 test-tech.skillhub.vsix"
          fi

          # 解压 vscode-language-pack-zh-hans
          if [ -f "./prebuilt-extensions/vscode-language-pack-zh-hans-v1.108.0.vsix" ]; then
            echo "   📦 解压 vscode-language-pack-zh-hans-v1.108.0.vsix..."
            rm -rf "$TARGET_DIR/MS-CEINTL.vscode-language-pack-zh-hans" 2>/dev/null
            mkdir -p "$TARGET_DIR/MS-CEINTL.vscode-language-pack-zh-hans"
            unzip -q "./prebuilt-extensions/vscode-language-pack-zh-hans-v1.108.0.vsix" -d "$TARGET_DIR/MS-CEINTL.vscode-language-pack-zh-hans"
            echo "   ✅ MS-CEINTL.vscode-language-pack-zh-hans 已解压"
            if [ -d "$TARGET_DIR/MS-CEINTL.vscode-language-pack-zh-hans/extension" ]; then
              mv "$TARGET_DIR/MS-CEINTL.vscode-language-pack-zh-hans/extension"/* "$TARGET_DIR/MS-CEINTL.vscode-language-pack-zh-hans/"
              rm -rf "$TARGET_DIR/MS-CEINTL.vscode-language-pack-zh-hans/extension"
            fi
          else
            echo "   ⚠️ 未找到 vscode-language-pack-zh-hans.vsix"
          fi

          # 8. 验证所有预构建扩展
          echo ""
          echo "📌 步骤 8: 验证预构建扩展:"

          PREBUILT_EXTS="cweijan.vscode-office test-tech.beeeyes test-tech.skillhub MS-CEINTL.vscode-language-pack-zh-hans test-tech.TestAgent"

          ALL_OK=true
          for ext in $PREBUILT_EXTS; do
            EXT_PATH="$TARGET_DIR/$ext"
            if [ -d "$EXT_PATH" ] && [ -f "$EXT_PATH/package.json" ]; then
              EXT_NAME=$(cat "$EXT_PATH/package.json" | grep '"name"' | head -1 | sed 's/.*"name": "\(.*\)".*/\1/' || echo "unknown")
              echo "   ✅ $ext (name: $EXT_NAME)"
            else
              echo "   ❌ $ext (未找到或缺少 package.json)"
              if [ -d "$EXT_PATH" ]; then
                echo "      📁 目录内容:"
                ls -la "$EXT_PATH" | head -5
              fi
              ALL_OK=false
            fi
          done

          # 9. 特殊处理 test-tech.TestAgent
          echo ""
          echo "📌 步骤 9: 确保 test-tech.TestAgent 正确:"

          if [ -d "$TARGET_DIR/test-tech.TestAgent" ]; then
            if [ ! -f "$TARGET_DIR/test-tech.TestAgent/package.json" ]; then
              echo "   ⚠️ test-tech.TestAgent 缺少 package.json，尝试修复..."
              PKG_FILE=$(find "$TARGET_DIR/test-tech.TestAgent" -name "package.json" -type f | head -1)
              if [ -n "$PKG_FILE" ] && [ "$PKG_FILE" != "$TARGET_DIR/test-tech.TestAgent/package.json" ]; then
                PKG_DIR=$(dirname "$PKG_FILE")
                echo "   找到 package.json 在: $PKG_DIR"
                find "$PKG_DIR" -maxdepth 1 -mindepth 1 -exec mv {} "$TARGET_DIR/test-tech.TestAgent/" \;
                echo "   ✅ 修复完成"
              fi
            fi

            if [ -f "$TARGET_DIR/test-tech.TestAgent/package.json" ]; then
              echo "   ✅ test-tech.TestAgent 已就绪"
              echo "   📄 $(cat $TARGET_DIR/test-tech.TestAgent/package.json | grep '"name"' | head -1)"
            else
              echo "   ❌ test-tech.TestAgent 仍然缺少 package.json"
            fi
          else
            echo "   ❌ test-tech.TestAgent 目录不存在"
          fi

          echo ""
          echo "=========================================="
          echo "📊 预构建扩展处理完成"
          echo "=========================================="

          if [ "$ALL_OK" = "true" ]; then
            echo "✅ 所有预构建扩展已就绪"
          else
            echo "⚠️ 部分预构建扩展缺失"
          fi

          echo "📁 最终扩展目录:"
          ls -la "$TARGET_DIR" | head -20

      # ============================================================
      # 14. 复制原生模块
      # ============================================================
      - name: 📦 Copy native modules
        run: |
          echo "=========================================="
          echo "📦 复制原生模块"
          echo "=========================================="

          BUILD_DIR="${BUILD_DIR:-./VSCode-linux-x64}"
          TARGET_NODE_MODULES="$BUILD_DIR/resources/app/node_modules"
          mkdir -p "$TARGET_NODE_MODULES"

          # 需要复制的原生模块
          NATIVE_MODULES=(
            "@vscode/spdlog"
            "@vscode/sqlite3"
            "native-keymap"
            "node-pty"
          )

          # 从多个源复制
          SOURCES=(
            "./node_modules"
            "../node_modules"
            "$BUILD_DIR/../node_modules"
          )

          echo ""
          echo "📌 查找并复制原生模块..."

          for module in "${NATIVE_MODULES[@]}"; do
            FOUND=false
            for src in "${SOURCES[@]}"; do
              if [ -d "$src/$module" ]; then
                echo "   ✅ 找到 $module 在 $src"
                mkdir -p "$TARGET_NODE_MODULES/$(dirname $module)"
                cp -r "$src/$module" "$TARGET_NODE_MODULES/$(dirname $module)/"
                FOUND=true
                break
              fi
            done

            if [ "$FOUND" = false ]; then
              echo "   ⚠️ 未找到 $module，尝试从官方目录复制..."
              find /tmp -type d -path "*/$module" 2>/dev/null | head -1 | while read -r found_dir; do
                if [ -n "$found_dir" ]; then
                  echo "   找到: $found_dir"
                  mkdir -p "$TARGET_NODE_MODULES/$(dirname $module)"
                  cp -r "$found_dir" "$TARGET_NODE_MODULES/$(dirname $module)/"
                  FOUND=true
                fi
              done
            fi

            if [ "$FOUND" = false ]; then
              echo "   ❌ 未找到 $module"
            fi
          done

          # 验证
          echo ""
          echo "📌 验证原生模块:"
          for module in "${NATIVE_MODULES[@]}"; do
            if [ -d "$TARGET_NODE_MODULES/$module" ]; then
              NODE_FILES=$(find "$TARGET_NODE_MODULES/$module" -name "*.node" -type f 2>/dev/null | wc -l)
              if [ "$NODE_FILES" -gt 0 ]; then
                echo "   ✅ $module ($NODE_FILES 个 .node 文件)"
              else
                echo "   ⚠️ $module (存在但无 .node 文件)"
              fi
            else
              echo "   ❌ $module (缺失)"
            fi
          done

      # ============================================================
      # 15. 创建可直接双击运行的 VSCode
      # ============================================================
      - name: 🚀 Create double-click executable
        run: |
          echo "=========================================="
          echo "🚀 创建双击运行版本"
          echo "=========================================="

          BUILD_DIR="${BUILD_DIR:-./VSCode-linux-x64}"
          cd "$BUILD_DIR"

          # 检查 tscode.real 是否存在
          if [ ! -f "./tscode.real" ]; then
            echo "⚠️ tscode.real 不存在，查找可执行文件..."
            for name in code code-oss; do
              if [ -f "./$name" ]; then
                echo "   ✅ 找到 $name，重命名为 tscode.real"
                mv "$name" tscode.real
                break
              fi
            done
          fi

          # 确保 tscode 包装脚本存在
          cat > tscode << 'WRAPPER_EOF'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"

          export ELECTRON_ENABLE_GPU=0
          export LIBGL_ALWAYS_SOFTWARE=1
          export NODE_OPTIONS="--max-old-space-size=4096"
          export ELECTRON_DISABLE_SANDBOX=1
          export GDK_BACKEND=x11
          export QT_QPA_PLATFORM=xcb
          export DISPLAY=:0
          export ELECTRON_DISABLE_CRASH_REPORTER=1
          export ELECTRON_DISABLE_CRASH_REPORTING=1
          export CRASHPAD_DISABLE=1

          if [ -f "$SCRIPT_DIR/tscode.real" ]; then
              EXEC="$SCRIPT_DIR/tscode.real"
          elif [ -f "$SCRIPT_DIR/bin/tscode.real" ]; then
              EXEC="$SCRIPT_DIR/bin/tscode.real"
          else
              echo "❌ 找不到 VSCode 可执行文件！"
              exit 1
          fi

          USER_DATA_DIR="$SCRIPT_DIR/user-data"
          mkdir -p "$USER_DATA_DIR"

          exec "$EXEC" \
              --no-sandbox \
              --disable-gpu-sandbox \
              --disable-software-rasterizer \
              --disable-gpu \
              --user-data-dir="$USER_DATA_DIR" \
              "$@"
          WRAPPER_EOF

          chmod +x tscode
          chmod +x tscode.real 2>/dev/null || true

          # 创建 start-vscode.sh
          cat > start-vscode.sh << 'START_EOF'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"

          export ELECTRON_ENABLE_GPU=0
          export LIBGL_ALWAYS_SOFTWARE=1
          export NODE_OPTIONS="--max-old-space-size=4096"
          export ELECTRON_DISABLE_SANDBOX=1
          export GDK_BACKEND=x11
          export QT_QPA_PLATFORM=xcb
          export DISPLAY=:0
          export ELECTRON_DISABLE_CRASH_REPORTER=1
          export ELECTRON_DISABLE_CRASH_REPORTING=1
          export CRASHPAD_DISABLE=1

          if [ -f "$SCRIPT_DIR/tscode.real" ]; then
              EXEC="$SCRIPT_DIR/tscode.real"
          else
              echo "❌ 找不到 VSCode 可执行文件！"
              exit 1
          fi

          echo "=== VSCode for UOS ==="
          USER_DATA_DIR="$SCRIPT_DIR/user-data"
          mkdir -p "$USER_DATA_DIR"

          exec "$EXEC" \
              --no-sandbox \
              --disable-gpu-sandbox \
              --disable-software-rasterizer \
              --disable-gpu \
              --user-data-dir="$USER_DATA_DIR" \
              "$@"
          START_EOF

          chmod +x start-vscode.sh

          # 创建桌面快捷方式
          cat > vscode-uos.desktop << 'EOF'
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=VSCode for UOS
          Comment=Visual Studio Code for UOS
          Exec=./tscode %F
          Icon=./resources/app/resources/linux/code.png
          Terminal=false
          Categories=Development;IDE;
          MimeType=text/plain;inode/directory;
          StartupNotify=true
          StartupWMClass=Code
          EOF

          # 创建使用说明
          cat > 使用说明.txt << 'EOF'
          ==========================================
          VSCode for UOS - 使用说明
          ==========================================

          🖱️ 双击运行：直接双击 tscode
          📌 终端运行：./start-vscode.sh
          📌 桌面快捷方式：双击 vscode-uos.desktop
          📌 配置文件：./user-data 目录

          📦 包含的扩展:
          - 所有官方内置扩展（已编译）
          - Git 扩展 (已编译)
          - GitHub 扩展 (已编译)
          - 5 个预构建扩展

          ⚠️ 离线环境支持：
          所有原生模块已包含在包中
          ==========================================
          EOF

          echo "✅ 双击运行版本创建完成"
          echo ""
          echo "📁 目录内容:"
          ls -la

      # ============================================================
      # 16. 打包
      # ============================================================
      - name: 📦 Package
        run: |
          BUILD_DIR="${BUILD_DIR:-./VSCode-linux-x64}"
          VERSION="${{ github.event.inputs.version || '1.116.0' }}"

          chmod +x $BUILD_DIR/tscode 2>/dev/null || true
          chmod +x $BUILD_DIR/start-vscode.sh 2>/dev/null || true
          chmod +x $BUILD_DIR/*.desktop 2>/dev/null || true

          echo ""
          echo "📌 打包前验证:"
          echo "   resources/app/extensions 数量: $(ls -la $BUILD_DIR/resources/app/extensions/ 2>/dev/null | wc -l)"
          echo "   resources/app/node_modules 存在: $(if [ -d $BUILD_DIR/resources/app/node_modules ]; then echo '✅'; else echo '❌'; fi)"
          echo "   resources/app/out 存在: $(if [ -d $BUILD_DIR/resources/app/out ]; then echo '✅'; else echo '❌'; fi)"

          echo ""
          echo "📌 验证 Git 扩展:"
          if [ -d "$BUILD_DIR/resources/app/extensions/git" ]; then
            echo "   ✅ Git 扩展存在"
            if [ -d "$BUILD_DIR/resources/app/extensions/git/out" ] || [ -d "$BUILD_DIR/resources/app/extensions/git/dist" ]; then
              echo "   ✅ 已编译"
            else
              echo "   ❌ Git 扩展未编译!"
              exit 1
            fi
          else
            echo "   ❌ Git 扩展不存在!"
            exit 1
          fi

          echo ""
          echo "📌 验证原生模块:"
          for module in @vscode/spdlog @vscode/sqlite3 native-keymap node-pty; do
            if [ -d "$BUILD_DIR/resources/app/node_modules/$module" ]; then
              NODE_FILES=$(find "$BUILD_DIR/resources/app/node_modules/$module" -name "*.node" -type f 2>/dev/null | wc -l)
              if [ "$NODE_FILES" -gt 0 ]; then
                echo "   ✅ $module ($NODE_FILES 个 .node 文件)"
              else
                echo "   ⚠️ $module (存在但无 .node 文件)"
              fi
            else
              echo "   ❌ $module (缺失)"
            fi
          done

          echo ""
          echo "📌 验证预构建扩展:"
          for ext in cweijan.vscode-office test-tech.beeeyes test-tech.skillhub MS-CEINTL.vscode-language-pack-zh-hans test-tech.TestAgent; do
            if [ -d "$BUILD_DIR/resources/app/extensions/$ext" ]; then
              echo "   ✅ $ext"
            else
              echo "   ❌ $ext"
            fi
          done

          tar -czf "vscode-uos-${VERSION}-双击运行.tar.gz" \
            --preserve-permissions \
            -C "$(dirname "$BUILD_DIR")" \
            "$(basename "$BUILD_DIR")"

          echo "✅ 打包完成:"
          ls -lh vscode-uos-*.tar.gz

      - name: 📤 Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: vscode-uos-double-click
          path: vscode-uos-*.tar.gz
          retention-days: 30

      - name: 📊 Build summary
        if: always()
        run: |
          echo "=========================================="
          echo "📊 BUILD SUMMARY"
          echo "=========================================="
          echo "🟢 Status: ${{ job.status }}"
          echo "📦 Version: ${{ github.event.inputs.version || '1.116.0' }}"
          echo "=========================================="
          if [ "${{ job.status }}" == "success" ]; then
            echo "🎉 Build completed!"
            echo ""
            echo "📥 Download: vscode-uos-*-双击运行.tar.gz"
            echo ""
            echo "📌 On UOS:"
            echo "   1. tar -xzf vscode-uos-*.tar.gz"
            echo "   2. cd VSCode-linux-x64"
            echo "   3. ./tscode"
          fi