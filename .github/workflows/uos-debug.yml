name: Build Custom VSCode for UOS

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: true
        default: 'main'

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 150

    steps:
      # ============================================================
      # 1. 检出您的仓库源码
      # ============================================================
      - name: 📥 Checkout your repository
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch }}
          fetch-depth: 1

      # ============================================================
      # 2. 安装 Node.js 环境
      # ============================================================
      - name: 📦 Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'

      # ============================================================
      # 3. 安装系统级编译依赖
      # ============================================================
      - name: 🔧 Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libxkbfile-dev \
            libkrb5-dev \
            libgbm-dev \
            rpm \
            libx11-dev \
            libxss-dev \
            libxtst-dev \
            libnss3-dev \
            libasound2-dev \
            libglib2.0-dev \
            libcairo2-dev \
            libpango1.0-dev \
            libatk1.0-dev \
            libgdk-pixbuf2.0-dev \
            python3 \
            git \
            wget \
            curl

      # ============================================================
      # 4. 修复 preinstall.ts 和 postinstall.ts
      # ============================================================
      - name: 🔧 Fix TypeScript scripts
        run: |
          echo "Fixing TypeScript scripts..."
          cat > build/npm/preinstall.js << 'EOF'
          console.log('✅ Preinstall script (JS version) executed successfully.');
          EOF
          sed -i 's/"preinstall": "node build\/npm\/preinstall.ts"/"preinstall": "node build\/npm\/preinstall.js"/' package.json

          cat > build/npm/postinstall.js << 'EOF'
          console.log('✅ Postinstall script (JS version) executed successfully.');
          EOF
          sed -i 's/"postinstall": "node build\/npm\/postinstall.ts"/"postinstall": "node build\/npm\/postinstall.js"/' package.json
          echo "✅ TypeScript scripts fixed"

      # ============================================================
      # 5. 安装项目依赖
      # ============================================================
      - name: 📦 Install dependencies
        run: |
          echo "Installing npm dependencies..."
          npm install --legacy-peer-deps

      # ============================================================
      # 6. 安装缺失的构建依赖
      # ============================================================
      - name: 📦 Install missing build dependencies
        run: |
          echo "Installing missing build dependencies..."
          npm install --legacy-peer-deps \
            ternary-stream \
            vscode-gulp-watch \
            esbuild \
            jsonc-parser \
            gulp-merge-json \
            gulp-tsb \
            gulp-sourcemaps \
            gulp-filter \
            gulp-rename \
            gulp-sort 2>/dev/null || true
          echo "✅ Missing dependencies installed"

      # ============================================================
      # 7. 安装 tsx
      # ============================================================
      - name: 📦 Install tsx
        run: |
          npm install -g tsx
          echo "✅ tsx installed"

      # ============================================================
      # 8. 直接注释掉 gulpfile.extensions.ts 中所有扩展任务
      # ============================================================
      - name: 🔧 Disable all extension tasks
        run: |
          echo "=========================================="
          echo "Disabling all extension tasks in gulpfile..."
          echo "=========================================="

          # 直接删除整个 gulpfile.extensions.ts 并替换为空实现
          cat > build/gulpfile.extensions.ts << 'EOF'
          import { Stream } from 'stream';
          import * as gulp from 'gulp';

          // ============================================
          // 所有扩展任务已被禁用（UOS 构建）
          // ============================================

          // 创建一个空的完成信号流
          function emptyStream(): Stream {
            const s = new Stream.Readable();
            s._read = function() { this.push(null); };
            return s;
          }

          // 定义空的扩展任务
          export function compileExtensionsBuild(done: any) {
            console.log('⚠️ Extension compilation skipped for UOS build');
            done();
          }

          export function bundleMarketplaceExtensionsBuild(done: any) {
            console.log('⚠️ Marketplace extensions skipped for UOS build');
            done();
          }

          export function bundleNonNativeLocalExtensionsBuild(done: any) {
            console.log('⚠️ Non-native local extensions skipped for UOS build');
            done();
          }

          export function bundleLocalExtensionsBuild(done: any) {
            console.log('⚠️ Local extensions skipped for UOS build');
            done();
          }

          export function bundleCopilotExtensionBuild(done: any) {
            console.log('⚠️ Copilot extension skipped for UOS build');
            done();
          }

          export function bundleCopilotChatExtensionBuild(done: any) {
            console.log('⚠️ Copilot Chat extension skipped for UOS build');
            done();
          }

          // 注册 gulp 任务（空实现）
          gulp.task('compile-extensions-build', compileExtensionsBuild);
          gulp.task('bundle-marketplace-extensions-build', bundleMarketplaceExtensionsBuild);
          gulp.task('bundle-non-native-local-extensions-build', bundleNonNativeLocalExtensionsBuild);
          gulp.task('bundle-local-extensions-build', bundleLocalExtensionsBuild);
          gulp.task('bundle-copilot-extension-build', bundleCopilotExtensionBuild);
          gulp.task('bundle-copilot-chat-extension-build', bundleCopilotChatExtensionBuild);
          EOF

          echo "✅ build/gulpfile.extensions.ts replaced"

      # ============================================================
      # 9. 修改 gulpfile.vscode.ts 移除扩展依赖
      # ============================================================
      - name: 🔧 Patch gulpfile.vscode.ts
        run: |
          echo "Patching build/gulpfile.vscode.ts..."

          if [ -f "build/gulpfile.vscode.ts" ]; then
            cp build/gulpfile.vscode.ts build/gulpfile.vscode.ts.bak

            # 删除所有对扩展任务的依赖
            sed -i '/"bundle-marketplace-extensions-build",/d' build/gulpfile.vscode.ts
            sed -i '/"bundle-non-native-local-extensions-build",/d' build/gulpfile.vscode.ts
            sed -i '/"bundle-local-extensions-build",/d' build/gulpfile.vscode.ts
            sed -i '/"bundle-copilot-extension-build",/d' build/gulpfile.vscode.ts
            sed -i '/"bundle-copilot-chat-extension-build",/d' build/gulpfile.vscode.ts

            echo "✅ gulpfile.vscode.ts patched"
          fi

      # ============================================================
      # 10. 设置环境变量
      # ============================================================
      - name: ⚙️ Set environment variables
        run: |
          echo "VSCODE_SKIP_BUILTIN_EXTENSION_DOWNLOAD=1" >> $GITHUB_ENV
          echo "VSCODE_ELECTRON_SKIP_DOWNLOAD=1" >> $GITHUB_ENV
          echo "VSCODE_SKIP_PRELAUNCH=1" >> $GITHUB_ENV
          echo "VSCODE_SKIP_BUNDLED_EXTENSIONS=1" >> $GITHUB_ENV

      # ============================================================
      # 11. 构建 VSCode Linux x64
      # ============================================================
      - name: 🔨 Build VSCode Linux x64
        run: |
          echo "=========================================="
          echo "Building VSCode Linux x64..."
          echo "⏰ This may take 20-30 minutes..."
          echo "=========================================="
          export NODE_OPTIONS="--max-old-space-size=8192"
          export VSCODE_SKIP_BUILTIN_EXTENSION_DOWNLOAD=1
          export VSCODE_ELECTRON_SKIP_DOWNLOAD=1
          export VSCODE_SKIP_PRELAUNCH=1
          export VSCODE_SKIP_BUNDLED_EXTENSIONS=1

          echo "Start time: $(date)"

          npx tsx node_modules/gulp/bin/gulp.js vscode-linux-x64-min --no-color

          echo "✅ Build completed at: $(date)"

      # ============================================================
      # 12. 验证构建产物
      # ============================================================
      - name: 🔍 Verify build output
        run: |
          echo "Verifying build output..."
          if [ -d "./VSCode-linux-x64" ]; then
            echo "✅ Build found in ./VSCode-linux-x64"
            ls -la ./VSCode-linux-x64/ | head -20
            echo "BUILD_DIR=./VSCode-linux-x64" >> $GITHUB_ENV
          elif [ -d "./vscode/VSCode-linux-x64" ]; then
            echo "✅ Build found in ./vscode/VSCode-linux-x64"
            ls -la ./vscode/VSCode-linux-x64/ | head -20
            echo "BUILD_DIR=./vscode/VSCode-linux-x64" >> $GITHUB_ENV
          else
            echo "❌ Build not found!"
            find . -name "VSCode-linux-x64" -type d 2>/dev/null || echo "Not found"
            exit 1
          fi

      # ============================================================
      # 13. 创建 UOS 启动脚本
      # ============================================================
      - name: 🚀 Create UOS startup script
        run: |
          echo "Creating UOS startup script..."
          BUILD_DIR="${BUILD_DIR:-./VSCode-linux-x64}"
          cd "$BUILD_DIR"

          cat > start-vscode.sh << 'EOF'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"

          export ELECTRON_ENABLE_GPU=0
          export LIBGL_ALWAYS_SOFTWARE=1
          export NODE_OPTIONS="--max-old-space-size=4096"
          export ELECTRON_DISABLE_SANDBOX=1
          export GDK_BACKEND=x11
          export QT_QPA_PLATFORM=xcb
          export DISPLAY=:0

          if [ -f "$SCRIPT_DIR/code-oss" ]; then
              EXEC="$SCRIPT_DIR/code-oss"
          elif [ -f "$SCRIPT_DIR/code" ]; then
              EXEC="$SCRIPT_DIR/code"
          else
              echo "❌ VSCode executable not found!"
              exit 1
          fi

          echo "=== Custom VSCode UOS Launcher ==="
          echo "Version: $($EXEC --version | head -1)"

          if grep -q "UOS" /etc/os-release 2>/dev/null; then
              echo "✅ Detected UOS system"
          fi

          exec "$EXEC" \
              --no-sandbox \
              --disable-gpu-sandbox \
              --disable-software-rasterizer \
              --disable-gpu \
              "$@"
          EOF

          chmod +x start-vscode.sh
          echo "✅ start-vscode.sh created"

      # ============================================================
      # 14. 打包
      # ============================================================
      - name: 📦 Package artifacts
        run: |
          echo "Packaging artifacts..."
          mkdir -p artifacts
          BUILD_DIR="${BUILD_DIR:-./VSCode-linux-x64}"

          if [ ! -d "$BUILD_DIR" ]; then
            echo "❌ Build directory not found!"
            exit 1
          fi

          chmod +x $BUILD_DIR/*.sh 2>/dev/null || true
          tar -czf artifacts/custom-vscode-uos-$(date +%Y%m%d-%H%M%S).tar.gz \
            --preserve-permissions \
            "$BUILD_DIR"

          echo "✅ Package created:"
          ls -lh artifacts/

      # ============================================================
      # 15. 上传
      # ============================================================
      - name: 📤 Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: custom-vscode-uos
          path: artifacts/custom-vscode-uos-*.tar.gz
          retention-days: 30

      # ============================================================
      # 16. 构建摘要
      # ============================================================
      - name: 📊 Build summary
        if: always()
        run: |
          echo "=========================================="
          echo "📊 BUILD SUMMARY"
          echo "=========================================="
          echo "🟢 Status: ${{ job.status }}"
          echo "📦 Branch: ${{ github.event.inputs.branch }}"
          echo "📁 Artifacts:"
          ls -lh artifacts/ 2>/dev/null || echo "  (No artifacts)"
          echo "=========================================="