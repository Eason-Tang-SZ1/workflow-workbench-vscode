name: Build VSCode for UOS (Debian 10 - glibc 2.28 with GCC 11)

on:
  workflow_dispatch:

jobs:
  build-in-debian10:
    runs-on: ubuntu-22.04
    steps:
      # ============================================
      # 1. 检出代码（跳过 LFS，拉取完整历史）
      # ============================================
      - name: Checkout VSCode source (skip LFS)
        uses: actions/checkout@v6
        with:
          lfs: false
          fetch-depth: 0

      # ============================================
      # 2. 删除 LFS 指针文件
      # ============================================
      - name: Remove LFS pointer files
        run: |
          echo "=== Removing LFS pointer files ==="
          find . -type f -exec grep -l '^version https://git-lfs.github.com/spec/v1' {} \; 2>/dev/null | while read file; do
            echo "Removing: $file"
            rm -f "$file"
          done
          rm -rf .git/lfs 2>/dev/null || true
          echo "✅ LFS pointer files removed"

      # ============================================
      # 3. 配置 Git 跳过 LFS
      # ============================================
      - name: Configure git to skip LFS
        run: |
          git config --global filter.lfs.smudge "git-lfs smudge --skip"
          git config --global filter.lfs.process "git-lfs filter-process --skip"
          git config --global filter.lfs.required false
          echo "✅ Git LFS disabled globally"

      # ============================================
      # 4. 在 Debian 10 容器内构建（升级 GCC 到 11）
      # ============================================
      - name: Build in Debian 10 container (glibc 2.28 with GCC 11)
        run: |
          docker run --rm \
            -v $PWD:/build \
            -w /build \
            debian:10 \
            bash -c "
              set -e

              echo '=== 🐳 Starting Debian 10 build container ==='
              echo '=== Original glibc and GCC versions ==='
              ldd --version | head -1
              gcc --version 2>/dev/null || echo 'GCC not installed yet'

              echo '=== Updating package list ==='
              sed -i 's/deb.debian.org/archive.debian.org/g' /etc/apt/sources.list
              sed -i 's/security.debian.org/archive.debian.org/g' /etc/apt/sources.list
              sed -i '/stretch-updates/d' /etc/apt/sources.list
              echo 'deb http://archive.debian.org/debian buster-backports main' >> /etc/apt/sources.list
              apt-get update -o Acquire::Check-Valid-Until=false

              echo '=== Installing base build dependencies ==='
              apt-get install -y \
                curl \
                wget \
                git \
                build-essential \
                pkg-config \
                libgtk-3-dev \
                libxkbfile-dev \
                libkrb5-dev \
                libgbm-dev \
                libsecret-1-dev \
                libx11-dev \
                libxext-dev \
                libxtst-dev \
                libxss-dev \
                libfreetype6-dev \
                libfontconfig1-dev \
                libcairo2-dev \
                libpango1.0-dev \
                libicu-dev \
                libnss3-dev \
                libnspr4-dev \
                libxkbcommon-dev \
                libxrandr-dev \
                libxcomposite-dev \
                libxdamage-dev \
                libxi-dev \
                libdrm-dev \
                libglvnd-dev \
                rpm \
                python3 \
                python3-pip

              # ============================================
              # 关键步骤：安装 GCC 11（从 Backports）
              # ============================================
              echo '=== Installing GCC 11 from Debian Backports ==='
              apt-get install -y -t buster-backports \
                gcc-11-backports \
                g++-11-backports

              # 将 GCC 11 设为默认编译器
              update-alternatives --install /usr/bin/gcc gcc /usr/bin/gcc-11 110
              update-alternatives --install /usr/bin/g++ g++ /usr/bin/g++-11 110
              update-alternatives --set gcc /usr/bin/gcc-11
              update-alternatives --set g++ /usr/bin/g++-11

              echo '=== Verifying GCC version ==='
              gcc --version
              g++ --version

              echo '=== Installing Node.js 20.x ==='
              curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
              apt-get install -y nodejs

              echo '=== Verifying versions ==='
              echo 'glibc version:'
              ldd --version | head -1
              echo 'Node.js version:'
              node --version
              echo 'npm version:'
              npm --version
              echo 'GCC version:'
              gcc --version | head -1

              echo '=== Checking for package-lock.json ==='
              if [ -f '/build/package-lock.json' ]; then
                echo '✅ package-lock.json found'
              else
                echo '❌ package-lock.json NOT found!'
                echo 'Listing /build directory:'
                ls -la /build/
                exit 1
              fi

              echo '=== Installing dependencies with npm ci ==='
              # 设置环境变量确保使用正确的 GCC
              export CC=/usr/bin/gcc-11
              export CXX=/usr/bin/g++-11
              npm ci

              echo '=== Building VSCode ==='
              export CC=/usr/bin/gcc-11
              export CXX=/usr/bin/g++-11
              npm run gulp vscode-linux-x64

              echo '=== Packaging artifacts ==='
              mkdir -p /build/artifacts

              # 查找构建产物
              if [ -d '.build/linux/x64' ]; then
                echo '✅ Found .build/linux/x64'
                tar -czf /build/artifacts/vscode-debian10-glibc228.tar.gz -C .build/linux/x64 .
              elif [ -d '../VSCode-linux-x64' ]; then
                echo '✅ Found ../VSCode-linux-x64'
                tar -czf /build/artifacts/vscode-debian10-glibc228.tar.gz -C ../VSCode-linux-x64 .
              elif [ -d 'VSCode-linux-x64' ]; then
                echo '✅ Found VSCode-linux-x64'
                tar -czf /build/artifacts/vscode-debian10-glibc228.tar.gz -C VSCode-linux-x64 .
              else
                echo '⚠️ Build output not found, searching...'
                echo ''
                echo '=== Searching for VSCode directories ==='
                find . -name 'VSCode*' -type d 2>/dev/null | head -20
                echo ''
                echo '=== Checking .build directory ==='
                ls -la .build/ 2>/dev/null || echo '.build directory not found'
                echo ''
                echo '=== Checking root directory ==='
                ls -la
                exit 1
              fi

              echo '✅ Build completed successfully'
              echo ''
              echo '=== Artifacts ==='
              ls -lh /build/artifacts/
            "

      # ============================================
      # 5. 上传构建产物
      # ============================================
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: vscode-linux-x64-uos-glibc228
          path: artifacts/
          if-no-files-found: error
          retention-days: 7