name: Build VSCode for UOS (Debian 10 - glibc 2.28)

on:
  workflow_dispatch:

jobs:
  build-in-debian10:
    runs-on: ubuntu-22.04
    steps:
      # ============================================
      # 1. 检出代码（跳过 LFS，拉取完整历史）
      # ============================================
      - name: Checkout VSCode source (skip LFS)
        uses: actions/checkout@v6
        with:
          lfs: false
          fetch-depth: 0  # 拉取完整历史，确保 yarn.lock 被正确下载

      # ============================================
      # 2. 删除 LFS 指针文件（构建不需要）
      # ============================================
      - name: Remove LFS pointer files
        run: |
          echo "=== Removing LFS pointer files ==="
          find . -type f -exec grep -l '^version https://git-lfs.github.com/spec/v1' {} \; 2>/dev/null | while read file; do
            echo "Removing: $file"
            rm -f "$file"
          done
          rm -rf .git/lfs 2>/dev/null || true
          echo "✅ LFS pointer files removed"

      # ============================================
      # 3. 配置 Git 跳过 LFS
      # ============================================
      - name: Configure git to skip LFS
        run: |
          git config --global filter.lfs.smudge "git-lfs smudge --skip"
          git config --global filter.lfs.process "git-lfs filter-process --skip"
          git config --global filter.lfs.required false
          echo "✅ Git LFS disabled globally"

      # ============================================
      # 4. 🔍 调试步骤 - 查看当前目录结构
      # ============================================
      - name: 🔍 Debug - list files before build
        run: |
          echo '=== Current directory ==='
          pwd
          echo ''
          echo '=== Directory structure (top level) ==='
          ls -la
          echo ''
          echo '=== Check for yarn.lock ==='
          if [ -f "yarn.lock" ]; then
            echo '✅ yarn.lock found'
            head -5 yarn.lock
          else
            echo '❌ yarn.lock NOT found!'
            echo 'Listing all .lock files:'
            find . -name "*.lock" -type f
          fi
          echo ''
          echo '=== Check for package-lock.json ==='
          if [ -f "package-lock.json" ]; then
            echo '⚠️ package-lock.json found (should be removed)'
          else
            echo '✅ package-lock.json not found'
          fi
          echo ''
          echo '=== Git status ==='
          git status
          echo ''
          echo '=== Check disk space ==='
          df -h
          echo ''
          echo '=== Check memory ==='
          free -h
        continue-on-error: true

      # ============================================
      # 5. 删除可能干扰的 package-lock.json
      # ============================================
      - name: Remove package-lock.json (if exists)
        run: |
          if [ -f "package-lock.json" ]; then
            echo '⚠️ Removing package-lock.json'
            rm -f package-lock.json
            echo '✅ package-lock.json removed'
          else
            echo '✅ package-lock.json not found'
          fi

      # ============================================
      # 6. 在 Debian 10 容器内构建
      # ============================================
      - name: Build in Debian 10 container (glibc 2.28)
        run: |
          docker run --rm \
            -v $PWD:/build \
            -w /build \
            debian:10 \
            bash -c "
              set -e

              echo '=== 🐳 Starting Debian 10 build container ==='
              echo '=== glibc version (host) ==='
              ldd --version | head -1

              echo '=== Updating package list ==='
              # Debian 10 使用旧源，切换到 archive
              sed -i 's/deb.debian.org/archive.debian.org/g' /etc/apt/sources.list
              sed -i 's/security.debian.org/archive.debian.org/g' /etc/apt/sources.list
              sed -i '/stretch-updates/d' /etc/apt/sources.list
              apt-get update -o Acquire::Check-Valid-Until=false

              echo '=== Installing build dependencies ==='
              apt-get install -y \
                curl \
                wget \
                git \
                build-essential \
                pkg-config \
                libgtk-3-dev \
                libxkbfile-dev \
                libkrb5-dev \
                libgbm-dev \
                libsecret-1-dev \
                libx11-dev \
                libxext-dev \
                libxtst-dev \
                libxss-dev \
                libfreetype6-dev \
                libfontconfig1-dev \
                libcairo2-dev \
                libpango1.0-dev \
                libicu-dev \
                libnss3-dev \
                libnspr4-dev \
                libxkbcommon-dev \
                libxrandr-dev \
                libxcomposite-dev \
                libxdamage-dev \
                libxi-dev \
                libdrm-dev \
                libglvnd-dev \
                rpm \
                python3 \
                python3-pip

              echo '=== Installing Node.js 20.x ==='
              curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
              apt-get install -y nodejs

              echo '=== Installing Yarn ==='
              npm install -g yarn

              echo '=== Verifying versions ==='
              echo 'glibc version:'
              ldd --version | head -1
              echo 'Node.js version:'
              node --version
              echo 'Yarn version:'
              yarn --version

              echo '=== Checking for yarn.lock ==='
              if [ -f '/build/yarn.lock' ]; then
                echo '✅ yarn.lock found in /build'
                head -5 /build/yarn.lock
              else
                echo '❌ yarn.lock NOT found in /build!'
                echo 'Listing /build directory:'
                ls -la /build/
                echo 'Listing all .lock files in /build:'
                find /build -name '*.lock' -type f
                exit 1
              fi

              echo '=== Installing project dependencies ==='
              # 使用 --frozen-lockfile 确保严格遵循锁定文件
              yarn install --frozen-lockfile

              echo '=== Building VSCode ==='
              yarn gulp vscode-linux-x64

              echo '=== Packaging artifacts ==='
              mkdir -p /build/artifacts

              # 查找构建产物
              if [ -d '.build/linux/x64' ]; then
                echo '✅ Found .build/linux/x64'
                tar -czf /build/artifacts/vscode-debian10-glibc228.tar.gz -C .build/linux/x64 .
              elif [ -d '../VSCode-linux-x64' ]; then
                echo '✅ Found ../VSCode-linux-x64'
                tar -czf /build/artifacts/vscode-debian10-glibc228.tar.gz -C ../VSCode-linux-x64 .
              elif [ -d 'VSCode-linux-x64' ]; then
                echo '✅ Found VSCode-linux-x64'
                tar -czf /build/artifacts/vscode-debian10-glibc228.tar.gz -C VSCode-linux-x64 .
              else
                echo '⚠️ Build output not found, searching...'
                echo ''
                echo '=== Searching for VSCode directories ==='
                find . -name 'VSCode*' -type d 2>/dev/null | head -20
                echo ''
                echo '=== Checking .build directory ==='
                ls -la .build/ 2>/dev/null || echo '.build directory not found'
                echo ''
                echo '=== Checking root directory ==='
                ls -la
                exit 1
              fi

              echo '✅ Build completed successfully'
              echo ''
              echo '=== Artifacts ==='
              ls -lh /build/artifacts/
            "

      # ============================================
      # 7. 🔍 调试步骤 - 查看构建产物
      # ============================================
      - name: 🔍 Debug - list artifacts after build
        if: always()
        run: |
          echo '=== Artifacts directory ==='
          ls -la artifacts/ || echo 'No artifacts directory found'
          echo ''
          echo '=== Disk space after build ==='
          df -h
          echo ''
          echo '=== Memory after build ==='
          free -h
        continue-on-error: true

      # ============================================
      # 8. 上传构建产物
      # ============================================
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: vscode-linux-x64-uos-glibc228
          path: artifacts/
          if-no-files-found: error
          retention-days: 7

      # ============================================
      # 9. 🔍 调试步骤 - 列出上传的产物
      # ============================================
      - name: 🔍 Debug - list uploaded artifacts
        if: always()
        run: |
          echo '=== Uploaded artifacts ==='
          ls -la artifacts/ || echo 'No artifacts found'
          echo ''
          echo '=== Artifact size ==='
          du -sh artifacts/ 2>/dev/null || echo 'Artifacts directory not found'