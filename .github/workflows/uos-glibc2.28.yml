name: Build VSCode for UOS (Rocky Linux 8 - glibc 2.28)

on:
  workflow_dispatch:

jobs:
  build-in-rocky8:
    runs-on: ubuntu-22.04
    steps:
      # ============================================
      # 检出代码，跳过 LFS 文件
      # ============================================
      - name: Checkout VSCode source (skip LFS)
        uses: actions/checkout@v6
        with:
          lfs: false                    # 关键：跳过 LFS
          fetch-depth: 1                # 只拉取最近一次提交，加速
          # 如果仓库是公开的，可以尝试浅克隆
          # sparse-checkout: .          # 可选：只拉取必要文件

      # ============================================
      # 清理 LFS 指针文件（可选）
      # ============================================
      - name: Remove LFS pointer files (optional)
        run: |
          # 查找并删除所有 LFS 指针文件（以 "version https://git-lfs.github.com/spec/v1" 开头的文件）
          # 这些文件如果保留，可能干扰构建，直接删除
          find . -type f -exec grep -l '^version https://git-lfs.github.com/spec/v1' {} \; 2>/dev/null | xargs rm -f
          echo "✅ Removed LFS pointer files"
        continue-on-error: true

      # ============================================
      # 在 Rocky Linux 8 容器内构建
      # ============================================
      - name: Build in Rocky Linux 8 container
        run: |
          docker run --rm \
            -v $PWD:/build \
            -w /build \
            rockylinux:8 \
            bash -c "
              set -e

              echo '=== Installing build dependencies ==='
              dnf install -y epel-release
              dnf groupinstall -y 'Development Tools'
              dnf install -y \
                git python3 curl wget which rpm-build \
                alsa-lib-devel gtk3-devel libxkbfile-devel \
                krb5-devel libsecret-devel libgbm-devel \
                mesa-libEGL-devel mesa-libGL-devel \
                libX11-devel libXext-devel libXtst-devel \
                libXScrnSaver-devel freetype-devel fontconfig-devel \
                cairo-devel pango-devel libicu-devel \
                nss-devel nspr-devel libxkbcommon-devel

              echo '=== Installing Node.js 20.x ==='
              curl -fsSL https://rpm.nodesource.com/setup_20.x | bash -
              dnf install -y nodejs

              echo '=== Installing Yarn ==='
              npm install -g yarn

              echo '=== glibc version ==='
              ldd --version | head -1

              echo '=== Installing dependencies ==='
              yarn install --frozen-lockfile

              echo '=== Building VSCode ==='
              yarn gulp vscode-linux-x64

              echo '=== Packaging artifacts ==='
              mkdir -p /build/artifacts
              if [ -d '.build/linux/x64' ]; then
                tar -czf /build/artifacts/vscode-rocky8-glibc228.tar.gz -C .build/linux/x64 .
              elif [ -d '../VSCode-linux-x64' ]; then
                tar -czf /build/artifacts/vscode-rocky8-glibc228.tar.gz -C ../VSCode-linux-x64 .
              else
                echo '⚠️ Build output not found'
                find . -name 'VSCode*' -type d 2>/dev/null || echo 'No VSCode directories found'
                exit 1
              fi

              echo '✅ Build completed successfully'
            "

      # ============================================
      # 上传构建产物
      # ============================================
      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: vscode-linux-x64-uos-glibc228
          path: artifacts/
          if-no-files-found: error