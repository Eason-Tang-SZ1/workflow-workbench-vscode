name: Build VSCode for UOS (Rocky Linux 8 - glibc 2.28)

on:
  workflow_dispatch:  # 手动触发
  # push:
  #   branches: [main]  # 可按需开启

jobs:
  build-in-rocky8:
    runs-on: ubuntu-22.04  # 宿主机使用 Ubuntu，仅作为容器运行环境
    steps:
      - name: Checkout VSCode source
        uses: actions/checkout@v6
        with:
          lfs: true
          # 如需构建特定分支/标签，取消下方注释
          # ref: 'refs/tags/1.85.0'

      - name: Build in Rocky Linux 8 container (glibc 2.28)
        run: |
          # 在 Rocky Linux 8 容器内完成全部构建
          docker run --rm \
            -v $PWD:/build \
            -w /build \
            rockylinux:8 \
            bash -c "
              set -e

              # 1. 安装基础开发工具和依赖
              dnf install -y epel-release
              dnf groupinstall -y 'Development Tools'
              dnf install -y \
                git \
                python3 \
                python3-pip \
                curl \
                wget \
                which \
                rpm-build \
                alsa-lib-devel \
                gtk3-devel \
                libxkbfile-devel \
                krb5-devel \
                libsecret-devel \
                libgbm-devel \
                mesa-libEGL-devel \
                mesa-libGL-devel \
                libX11-devel \
                libXext-devel \
                libXtst-devel \
                libXScrnSaver-devel \
                freetype-devel \
                fontconfig-devel \
                cairo-devel \
                pango-devel \
                libicu-devel \
                nss-devel \
                nspr-devel \
                libxkbcommon-devel

              # 2. 安装 Node.js 20.x (需要较高版本)
              curl -fsSL https://rpm.nodesource.com/setup_20.x | bash -
              dnf install -y nodejs

              # 3. 安装 Yarn
              npm install -g yarn

              # 4. 验证 glibc 版本
              echo '=== glibc version ==='
              ldd --version | head -1

              # 5. 安装项目依赖
              yarn install --frozen-lockfile

              # 6. 构建 VSCode (根据实际构建目标调整)
              # 常用目标: vscode-linux-x64, vscode-linux-x64-min, vscode-linux-x64-build-deb
              yarn gulp vscode-linux-x64

              # 7. 打包产物
              mkdir -p /build/artifacts
              # VSCode 构建产物通常在 .build/linux/x64 或 ../VSCode-linux-x64
              # 根据实际目录调整打包命令
              if [ -d '.build/linux/x64' ]; then
                tar -czf /build/artifacts/vscode-rocky8-glibc228.tar.gz -C .build/linux/x64 .
              elif [ -d '../VSCode-linux-x64' ]; then
                tar -czf /build/artifacts/vscode-rocky8-glibc228.tar.gz -C ../VSCode-linux-x64 .
              else
                echo 'Build output not found, check build target'
                exit 1
              fi

              echo '=== Build completed ==='
            "

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: vscode-linux-x64-uos-glibc228
          path: artifacts/
          if-no-files-found: error

      - name: List artifacts (debug)
        if: always()
        run: |
          echo '=== Artifacts ==='
          ls -la artifacts/ || true
          echo '=== Container build logs ==='
          # 如果有额外日志可打印