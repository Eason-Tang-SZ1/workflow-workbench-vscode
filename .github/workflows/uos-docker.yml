name: 为 UOS 构建 VSCode Remote（最终修复版）

on:
  workflow_dispatch:

jobs:
  build-in-rocky8:
    runs-on: ubuntu-22.04
    steps:
      - name: 在 Rocky Linux 8 容器中构建 Remote 版
        run: |
          docker run --rm \
            -v $PWD:/build \
            -w /build \
            --memory=14g \
            --memory-swap=14g \
            --cpus=2 \
            rockylinux:8 \
            bash -c "
              set -e

              echo '=== 🐳 构建 VSCode Remote 版本 ==='
              echo '=== 系统信息 ==='
              echo 'CPU 核心数: \$(nproc)'
              echo '内存总量: \$(free -h | grep Mem | awk '\''{print \$2}'\'')'
              echo 'glibc 版本: \$(ldd --version | head -1)'

              echo '=== 步骤 1: 启用 EPEL 和 PowerTools ==='
              dnf install -y epel-release
              dnf config-manager --set-enabled powertools 2>/dev/null || \
                dnf config-manager --set-enabled crb 2>/dev/null || true

              echo '=== 步骤 2: 安装基础工具 ==='
              dnf install -y git curl wget which rsync jq

              echo '=== 步骤 3: 克隆代码仓库 ==='
              git clone --depth 1 \
                --filter=blob:none \
                https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git /source

              echo '=== 步骤 4: 复制源代码到构建目录 ==='
              rsync -a /source/ /build/ 2>/dev/null || cp -r /source/. /build/
              rm -rf /source

              echo '=== 步骤 5: 修复 .git 目录 ==='
              cd /build
              if [ -d '.git' ]; then
                git config --global --add safe.directory /build
                git config --global user.email 'ci@github.com'
                git config --global user.name 'CI Build'
              else
                git init
                git remote add origin https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
                git fetch --depth 1 origin HEAD
                git reset --hard FETCH_HEAD
                git config --global --add safe.directory /build
              fi

              echo '=== 步骤 6: 移除 LFS 指针 ==='
              find . -type f -exec grep -l '^version https://git-lfs.github.com/spec/v1' {} \; 2>/dev/null | while read file; do
                echo \"移除 LFS 指针: \$file\"
                rm -f \"\$file\"
              done
              rm -rf .git/lfs 2>/dev/null || true
              if [ -f '.gitattributes' ]; then
                sed -i '/filter=lfs/d' .gitattributes
              fi

              echo '=== 步骤 7: 修复 product.json ==='
              if [ -f 'product.json' ]; then
                jq '.extensionsGallery = {
                  \"serviceUrl\": \"https://marketplace.visualstudio.com/_apis/public/gallery\",
                  \"cacheUrl\": \"https://vscode.blob.core.windows.net/gallery/index\",
                  \"itemUrl\": \"https://marketplace.visualstudio.com/items\"
                } | del(.extensions?)' product.json > product.json.tmp && mv product.json.tmp product.json
              fi

              echo '=== 步骤 8: 安装 GCC 11 ==='
              dnf install -y gcc-toolset-11-gcc gcc-toolset-11-gcc-c++
              source /opt/rh/gcc-toolset-11/enable
              echo 'GCC 版本: \$(gcc --version | head -1)'

              echo '=== 步骤 9: 安装构建依赖 ==='
              dnf install -y \
                python39 python39-devel \
                rpm-build \
                alsa-lib-devel gtk3-devel \
                krb5-devel libsecret-devel \
                mesa-libEGL-devel mesa-libGL-devel mesa-libgbm-devel \
                libX11-devel libXext-devel libXtst-devel \
                libXScrnSaver-devel freetype-devel fontconfig-devel \
                cairo-devel pango-devel libicu-devel \
                nss-devel nspr-devel libxkbcommon-devel \
                libxkbcommon-x11-devel \
                libXrandr-devel libXcomposite-devel \
                libXdamage-devel libXi-devel libdrm-devel \
                libglvnd-devel

              dnf install -y libxkbfile-devel 2>/dev/null || true
              alternatives --set python3 /usr/bin/python3.9

              echo '=== 步骤 10: 安装 Node.js 22.x ==='
              curl -fsSL https://rpm.nodesource.com/setup_22.x | bash -
              dnf install -y nodejs

              echo '=== 步骤 11: 安装 tsx ==='
              npm install -g tsx typescript

              echo '=== 步骤 12: 验证版本 ==='
              echo \"Node.js: \$(node --version)\"
              echo \"npm: \$(npm --version)\"
              echo \"GCC: \$(gcc --version | head -1)\"
              echo \"Python3: \$(python3 --version)\"

              echo '=== 步骤 13: 安装 npm 依赖 ==='
              source /opt/rh/gcc-toolset-11/enable
              export CC=/opt/rh/gcc-toolset-11/root/usr/bin/gcc
              export CXX=/opt/rh/gcc-toolset-11/root/usr/bin/g++
              export PYTHON=/usr/bin/python3.9
              cd /build

              npm cache clean --force
              npm ci --legacy-peer-deps --no-audit --no-fund --maxsockets=2

              echo '=== 步骤 14: 先编译 TypeScript ==='
              source /opt/rh/gcc-toolset-11/enable
              export CC=/opt/rh/gcc-toolset-11/root/usr/bin/gcc
              export CXX=/opt/rh/gcc-toolset-11/root/usr/bin/g++
              export PYTHON=/usr/bin/python3.9
              export VSCODE_SKIP_BUILTIN_EXTENSIONS_DOWNLOAD=1

              cd /build
              export NODE_OPTIONS=\"--max-old-space-size=10240 --max-semi-space-size=256\"

              echo '=== 步骤 14a: 编译 TypeScript ==='
              npx tsx ./node_modules/gulp/bin/gulp.js compile

              echo '=== 步骤 15: 编译完成后修复 mangler ==='
              # TypeScript 编译完成后，修改生成的 JavaScript 文件
              if [ -f 'out/build/lib/mangle/index.js' ]; then
                echo '修复编译后的 mangler JavaScript...'
                # 备份原文件
                cp out/build/lib/mangle/index.js out/build/lib/mangle/index.js.bak
                # 替换错误检查为警告
                sed -i 's/throw new Error(\"Protected fields have been made PUBLIC\\. This hurts minification and is therefore not allowed\\. Review the WARN messages further above\")/console.warn(\"Protected fields made PUBLIC. Continuing...\")/g' out/build/lib/mangle/index.js
                # 也检查是否有其他格式的错误信息
                sed -i 's/throw new Error(.Protected fields have been made PUBLIC.*)/console.warn(\"Protected fields made PUBLIC. Continuing...\")/g' out/build/lib/mangle/index.js
                echo '✅ mangler 修复完成'
              else
                echo '⚠️ 未找到 out/build/lib/mangle/index.js，尝试其他位置...'
                find . -path '*/mangle/index.js' -type f 2>/dev/null | head -5
              fi

              # 也检查并修复 TypeScript 源文件（以防需要重新编译）
              if [ -f 'build/lib/mangle/index.ts' ]; then
                echo '也修复 TypeScript 源文件...'
                sed -i 's/throw new Error(\"Protected fields have been made PUBLIC\\. This hurts minification and is therefore not allowed\\. Review the WARN messages further above\")/console.warn(\"Protected fields made PUBLIC. Continuing...\")/g' build/lib/mangle/index.ts
                sed -i 's/throw new Error(.Protected fields have been made PUBLIC.*)/console.warn(\"Protected fields made PUBLIC. Continuing...\")/g' build/lib/mangle/index.ts
              fi

              echo '=== 步骤 16: 构建 Remote Extension Host ==='
              # 设置跳过混淆的环境变量
              export VSCODE_SKIP_MANGLE=1
              export VSCODE_MANGLE_SKIP=1

              # 直接执行 gulp 任务
              npx tsx ./node_modules/gulp/bin/gulp.js vscode-reh-linux-x64

              echo '=== 步骤 17: 查找构建产物 ==='
              cd /build
              echo '正在搜索构建产物...'

              echo '=== 检查 vscode-reh-linux-x64 目录 ==='
              if [ -d 'vscode-reh-linux-x64' ]; then
                echo '✅ vscode-reh-linux-x64 存在'
                ls -la vscode-reh-linux-x64/ | head -20
                echo \"总大小: \$(du -sh vscode-reh-linux-x64/ 2>/dev/null | cut -f1)\"
              else
                echo '❌ vscode-reh-linux-x64 未找到'
                echo '查找所有可能的构建产物...'
                find . -maxdepth 2 -name '*reh*' -type d 2>/dev/null | head -10
                find . -maxdepth 2 -name 'VSCode*' -type d 2>/dev/null | head -10
                echo '完整目录列表:'
                ls -la /build/ | head -30
              fi

              echo '=== 步骤 18: 打包产物 ==='
              mkdir -p /build/artifacts
              cd /build

              if [ -d 'vscode-reh-linux-x64' ] && [ \"\$(ls -A vscode-reh-linux-x64 2>/dev/null)\" ]; then
                echo '✅ 找到 vscode-reh-linux-x64，正在打包...'
                tar -czf /build/artifacts/vscode-reh-rocky8-glibc228.tar.gz vscode-reh-linux-x64/
                echo \"打包大小: \$(du -sh /build/artifacts/vscode-reh-rocky8-glibc228.tar.gz | cut -f1)\"
              elif [ -d 'VSCode-linux-x64' ] && [ \"\$(ls -A VSCode-linux-x64 2>/dev/null)\" ]; then
                echo '✅ 找到 VSCode-linux-x64，正在打包...'
                tar -czf /build/artifacts/vscode-rocky8-glibc228.tar.gz VSCode-linux-x64/
              else
                echo '⚠️ 未找到构建产物！'
                echo '=== 完整目录列表 ==='
                ls -la /build/
                echo ''
                echo '=== 搜索所有 code 相关目录 ==='
                find /build -maxdepth 3 -type d -name '*code*' -o -name '*VSCode*' 2>/dev/null | head -20
                echo 'BUILD_FAILED_NO_OUTPUT' > /build/artifacts/ERROR.txt
              fi

              echo '=== 步骤 19: 构建总结 ==='
              echo '构建产物目录内容:'
              ls -lh /build/artifacts/ || echo 'artifacts 目录为空'
            "

      - name: 上传构建产物
        uses: actions/upload-artifact@v7
        with:
          name: vscode-reh-linux-x64-uos-glibc228
          path: artifacts/
          if-no-files-found: warn
          retention-days: 7