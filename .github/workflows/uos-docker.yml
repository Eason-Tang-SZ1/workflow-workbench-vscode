name: Build VSCode for UOS (Docker Rocky Linux 8 - glibc 2.28)

on:
  workflow_dispatch:

jobs:
  build-in-rocky8:
    runs-on: ubuntu-22.04
    steps:
      - name: Build in Rocky Linux 8 container (glibc 2.28)
        run: |
          docker run --rm \
            -v $PWD:/build \
            -w /build \
            rockylinux:8 \
            bash -c "
              set -e

              echo '=== 🐳 Starting Rocky Linux 8 build container ==='
              echo '=== glibc version ==='
              ldd --version | head -1

              echo '=== Step 1: Enable EPEL and PowerTools ==='
              dnf install -y epel-release
              dnf config-manager --set-enabled powertools 2>/dev/null || \
                dnf config-manager --set-enabled crb 2>/dev/null || \
                echo 'PowerTools/CRB already enabled'

              echo '=== Step 2: Install Git and basic tools ==='
              dnf install -y git curl wget which

              echo '=== Step 3: Clone repository inside container (with token) ==='
              git clone --depth 1 \
                --filter=blob:none \
                https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git /source

              echo '=== Step 4: Copy source code to build directory ==='
              cp -r /source/. /build/ 2>/dev/null || cp -r /source/* /build/
              cp -r /source/.[!.]* /build/ 2>/dev/null || true
              rm -rf /source

              echo '=== Step 5: Remove LFS pointer files ==='
              cd /build
              find . -type f -exec grep -l '^version https://git-lfs.github.com/spec/v1' {} \; 2>/dev/null | while read file; do
                echo \"Removing LFS pointer: \$file\"
                rm -f \"\$file\"
              done
              rm -rf .git/lfs 2>/dev/null || true
              if [ -f '.gitattributes' ]; then
                sed -i '/filter=lfs/d' .gitattributes
              fi

              echo '=== Step 6: Install GCC 11 via gcc-toolset-11 ==='
              dnf install -y gcc-toolset-11-gcc gcc-toolset-11-gcc-c++
              source /opt/rh/gcc-toolset-11/enable
              echo 'GCC version:'
              gcc --version | head -1

              echo '=== Step 7: Install build dependencies ==='
              dnf install -y \
                python3 rpm-build \
                alsa-lib-devel gtk3-devel \
                krb5-devel libsecret-devel \
                mesa-libEGL-devel mesa-libGL-devel mesa-libgbm-devel \
                libX11-devel libXext-devel libXtst-devel \
                libXScrnSaver-devel freetype-devel fontconfig-devel \
                cairo-devel pango-devel libicu-devel \
                nss-devel nspr-devel libxkbcommon-devel \
                libxkbcommon-x11-devel \
                libXrandr-devel libXcomposite-devel \
                libXdamage-devel libXi-devel libdrm-devel \
                libglvnd-devel

              dnf install -y libxkbfile-devel 2>/dev/null || echo 'libxkbfile-devel not found, continuing...'

              echo '=== Step 8: Install Node.js 20.x ==='
              curl -fsSL https://rpm.nodesource.com/setup_20.x | bash -
              dnf install -y nodejs

              echo '=== Step 9: Install TypeScript and ts-node ==='
              npm install -g typescript ts-node

              echo '=== Step 10: Verify all versions ==='
              echo \"glibc: \$(ldd --version | head -1)\"
              echo \"Node.js: \$(node --version)\"
              echo \"npm: \$(npm --version)\"
              echo \"GCC: \$(gcc --version | head -1)\"
              echo \"TypeScript: \$(tsc --version)\"

              echo '=== Step 11: Check for package-lock.json ==='
              if [ ! -f '/build/package-lock.json' ]; then
                echo '❌ package-lock.json NOT found!'
                echo 'Listing /build directory:'
                ls -la /build/
                exit 1
              fi
              echo '✅ package-lock.json found'

              echo '=== Step 12: Install dependencies with npm ci (skip scripts) ==='
              source /opt/rh/gcc-toolset-11/enable
              export CC=/opt/rh/gcc-toolset-11/root/usr/bin/gcc
              export CXX=/opt/rh/gcc-toolset-11/root/usr/bin/g++
              cd /build
              npm ci --ignore-scripts

              echo '=== Step 13: Compile TypeScript build files ==='
              cd /build
              # 编译 build 目录下的 TypeScript 文件
              if [ -f 'build/tsconfig.json' ]; then
                echo 'Compiling build TypeScript files...'
                npx tsc -p build/tsconfig.json --skipLibCheck
              else
                echo 'No build tsconfig found, compiling individual files...'
                # 手动编译 gulpfile.ts 和 preinstall.ts
                find build -name '*.ts' -not -name '*.d.ts' | while read file; do
                  echo \"Compiling \$file...\"
                  npx tsc \"\$file\" --outDir build/ --skipLibCheck --target es2020 --module commonjs 2>/dev/null || true
                done
              fi

              # 编译根目录的 gulpfile.ts（如果存在）
              if [ -f 'gulpfile.ts' ]; then
                echo 'Compiling gulpfile.ts...'
                npx tsc gulpfile.ts --outDir . --skipLibCheck --target es2020 --module commonjs 2>/dev/null || \
                echo 'gulpfile.ts compilation skipped'
              fi

              echo '=== Step 14: Build VSCode using ts-node ==='
              source /opt/rh/gcc-toolset-11/enable
              export CC=/opt/rh/gcc-toolset-11/root/usr/bin/gcc
              export CXX=/opt/rh/gcc-toolset-11/root/usr/bin/g++

              # 使用 ts-node 直接执行 gulpfile.ts
              cd /build
              npx ts-node --transpile-only -P build/tsconfig.json ./node_modules/gulp/bin/gulp.js vscode-linux-x64

              echo '=== Step 15: Package artifacts ==='
              mkdir -p /build/artifacts
              cd /build

              if [ -d '.build/linux/x64' ]; then
                echo '✅ Found .build/linux/x64'
                tar -czf /build/artifacts/vscode-rocky8-glibc228.tar.gz -C .build/linux/x64 .
              elif [ -d '../VSCode-linux-x64' ]; then
                echo '✅ Found ../VSCode-linux-x64'
                tar -czf /build/artifacts/vscode-rocky8-glibc228.tar.gz -C ../VSCode-linux-x64 .
              elif [ -d 'VSCode-linux-x64' ]; then
                echo '✅ Found VSCode-linux-x64'
                tar -czf /build/artifacts/vscode-rocky8-glibc228.tar.gz -C VSCode-linux-x64 .
              else
                echo '⚠️ Build output not found!'
                echo 'Searching for VSCode directories...'
                find . -name 'VSCode*' -type d 2>/dev/null | head -20
                echo 'Checking .build directory...'
                ls -la .build/ 2>/dev/null || echo '.build directory not found'
                exit 1
              fi

              echo '✅ Build completed successfully'
              echo '=== Artifacts ==='
              ls -lh /build/artifacts/
            "

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: vscode-linux-x64-uos-glibc228
          path: artifacts/
          if-no-files-found: error
          retention-days: 7