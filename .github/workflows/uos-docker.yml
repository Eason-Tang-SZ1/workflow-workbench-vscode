name: 为 UOS 构建 VSCode Remote

on:
  workflow_dispatch:

jobs:
  build-in-rocky8:
    runs-on: ubuntu-22.04
    steps:
      - name: 在 Rocky Linux 8 容器中构建
        run: |
          docker run --rm \
            -v $PWD:/build \
            -w /build \
            --memory=14g \
            --memory-swap=14g \
            --cpus=2 \
            rockylinux:8 \
            bash -c "
              set -e

              echo '=== 🐳 构建 VSCode Remote ==='
              echo 'glibc 版本: \$(ldd --version | head -1)'

              # 1. 安装基础依赖
              dnf install -y epel-release
              dnf config-manager --set-enabled powertools 2>/dev/null || true
              dnf install -y git curl wget which rsync jq patch

              # 2. 克隆代码
              git clone --depth 1 \
                --filter=blob:none \
                https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git /source
              rsync -a /source/ /build/
              rm -rf /source
              cd /build

              # 3. 修复 .git
              git config --global --add safe.directory /build
              git config --global user.email 'ci@github.com'
              git config --global user.name 'CI Build'

              # 4. 移除 LFS
              find . -type f -exec grep -l '^version https://git-lfs.github.com/spec/v1' {} \; 2>/dev/null | while read file; do
                rm -f \"\$file\"
              done
              rm -rf .git/lfs 2>/dev/null || true

              # 5. 修复 product.json
              if [ -f 'product.json' ]; then
                jq '.extensionsGallery = {
                  \"serviceUrl\": \"https://marketplace.visualstudio.com/_apis/public/gallery\",
                  \"cacheUrl\": \"https://vscode.blob.core.windows.net/gallery/index\",
                  \"itemUrl\": \"https://marketplace.visualstudio.com/items\"
                } | del(.extensions?)' product.json > product.json.tmp && mv product.json.tmp product.json
              fi

              # 6. 【关键】在编译前修复 mangler - 使用简单可靠的 sed
              echo '=== 修复 mangler 源码 ==='
              cat build/lib/mangle/index.ts | \
                sed 's/throw new Error(\"Protected fields have been made PUBLIC\.[^\"]*\");/console.warn(\"Protected fields made PUBLIC. Continuing...\");/g' \
                > build/lib/mangle/index.ts.fixed
              mv build/lib/mangle/index.ts.fixed build/lib/mangle/index.ts
              echo '✅ mangler 已修复'

              # 7. 安装 GCC 11
              dnf install -y gcc-toolset-11-gcc gcc-toolset-11-gcc-c++
              source /opt/rh/gcc-toolset-11/enable

              # 8. 安装构建依赖
              dnf install -y \
                python39 python39-devel rpm-build \
                alsa-lib-devel gtk3-devel krb5-devel libsecret-devel \
                mesa-libEGL-devel mesa-libGL-devel mesa-libgbm-devel \
                libX11-devel libXext-devel libXtst-devel \
                libXScrnSaver-devel freetype-devel fontconfig-devel \
                cairo-devel pango-devel libicu-devel \
                nss-devel nspr-devel libxkbcommon-devel \
                libxkbcommon-x11-devel libXrandr-devel \
                libXcomposite-devel libXdamage-devel libXi-devel \
                libdrm-devel libglvnd-devel
              dnf install -y libxkbfile-devel 2>/dev/null || true
              alternatives --set python3 /usr/bin/python3.9

              # 9. 安装 Node.js
              curl -fsSL https://rpm.nodesource.com/setup_22.x | bash -
              dnf install -y nodejs
              npm install -g tsx typescript

              # 10. 安装 npm 依赖
              source /opt/rh/gcc-toolset-11/enable
              export CC=/opt/rh/gcc-toolset-11/root/usr/bin/gcc
              export CXX=/opt/rh/gcc-toolset-11/root/usr/bin/g++
              export PYTHON=/usr/bin/python3.9
              npm cache clean --force
              npm ci --legacy-peer-deps --no-audit --no-fund --maxsockets=2

              # 11. 构建
              source /opt/rh/gcc-toolset-11/enable
              export CC=/opt/rh/gcc-toolset-11/root/usr/bin/gcc
              export CXX=/opt/rh/gcc-toolset-11/root/usr/bin/g++
              export PYTHON=/usr/bin/python3.9
              export VSCODE_SKIP_BUILTIN_EXTENSIONS_DOWNLOAD=1
              export VSCODE_SKIP_MANGLE=1
              export NODE_OPTIONS=\"--max-old-space-size=10240 --max-semi-space-size=256\"

              echo '=== 编译 TypeScript ==='
              npx tsx ./node_modules/gulp/bin/gulp.js compile

              echo '=== 构建 Remote 版本 ==='
              npx tsx ./node_modules/gulp/bin/gulp.js vscode-reh-linux-x64

              # 12. 打包产物
              mkdir -p /build/artifacts
              cd /build

              if [ -d 'vscode-reh-linux-x64' ]; then
                tar -czf /build/artifacts/vscode-reh-rocky8-glibc228.tar.gz vscode-reh-linux-x64/
                echo '✅ 构建成功！'
                ls -lh /build/artifacts/
              else
                echo '❌ 构建失败'
                find . -maxdepth 2 -name '*reh*' -o -name '*VSCode*' 2>/dev/null
                exit 1
              fi
            "

      - name: 上传构建产物
        uses: actions/upload-artifact@v7
        with:
          name: vscode-reh-linux-x64-uos-glibc228
          path: artifacts/
          if-no-files-found: warn
          retention-days: 7