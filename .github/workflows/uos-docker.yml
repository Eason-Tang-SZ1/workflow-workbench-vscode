name: Build VSCode for UOS (Docker Rocky Linux 8 - glibc 2.28)

on:
  workflow_dispatch:

jobs:
  build-in-rocky8:
    runs-on: ubuntu-22.04
    steps:
      - name: Build in Rocky Linux 8 container (glibc 2.28)
        run: |
          docker run --rm \
            -v $PWD:/build \
            -w /build \
            rockylinux:8 \
            bash -c "
              set -e

              echo '=== 🐳 Starting Rocky Linux 8 build container ==='
              echo '=== glibc version ==='
              ldd --version | head -1

              echo '=== Step 1: Enable EPEL and PowerTools ==='
              dnf install -y epel-release
              dnf config-manager --set-enabled powertools 2>/dev/null || \
                dnf config-manager --set-enabled crb 2>/dev/null || \
                echo 'PowerTools/CRB already enabled'

              echo '=== Step 2: Install Git, basic tools and jq ==='
              dnf install -y git curl wget which rsync jq

              echo '=== Step 3: Clone repository inside container (with token) ==='
              git clone --depth 1 \
                --filter=blob:none \
                https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git /source

              echo '=== Step 4: Copy source code to build directory ==='
              rsync -a /source/ /build/ 2>/dev/null || cp -r /source/. /build/
              rm -rf /source

              echo '=== Step 5: Ensure .git directory is complete ==='
              cd /build
              if [ -d '.git' ]; then
                echo '✅ .git directory exists'
                git config --global --add safe.directory /build
                git config --global user.email \"ci@github.com\"
                git config --global user.name \"CI Build\"
              else
                echo '⚠️ .git directory not found, initializing...'
                git init
                git remote add origin https://${{ github.actor }}:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
                git fetch --depth 1 origin HEAD
                git reset --hard FETCH_HEAD
                git config --global --add safe.directory /build
              fi

              echo '=== Step 6: Remove LFS pointer files ==='
              cd /build
              find . -type f -exec grep -l '^version https://git-lfs.github.com/spec/v1' {} \; 2>/dev/null | while read file; do
                echo \"Removing LFS pointer: \$file\"
                rm -f \"\$file\"
              done
              rm -rf .git/lfs 2>/dev/null || true
              if [ -f '.gitattributes' ]; then
                sed -i '/filter=lfs/d' .gitattributes
              fi

              echo '=== Step 7: Fix product.json extensionsGallery ==='
              cd /build
              if [ -f 'product.json' ]; then
                echo 'Original product.json:'
                grep -E '(extensionsGallery|extensions)' product.json | head -20

                # 使用 jq 修改 product.json，同时清除可能存在的 extensions 字段
                echo 'Fixing product.json...'
                jq '.extensionsGallery = {
                  \"serviceUrl\": \"https://marketplace.visualstudio.com/_apis/public/gallery\",
                  \"cacheUrl\": \"https://vscode.blob.core.windows.net/gallery/index\",
                  \"itemUrl\": \"https://marketplace.visualstudio.com/items\"
                } | del(.extensions?)' product.json > product.json.tmp && mv product.json.tmp product.json

                echo 'Validating product.json...'
                jq empty product.json && echo '✅ product.json is valid JSON'

                echo 'Fixed product.json:'
                grep -E '(extensionsGallery|extensions)' product.json | head -20
              fi

              echo '=== Step 8: Install GCC 11 via gcc-toolset-11 ==='
              dnf install -y gcc-toolset-11-gcc gcc-toolset-11-gcc-c++
              source /opt/rh/gcc-toolset-11/enable
              echo 'GCC version:'
              gcc --version | head -1

              echo '=== Step 9: Install build dependencies ==='
              dnf install -y \
                python39 python39-devel \
                rpm-build \
                alsa-lib-devel gtk3-devel \
                krb5-devel libsecret-devel \
                mesa-libEGL-devel mesa-libGL-devel mesa-libgbm-devel \
                libX11-devel libXext-devel libXtst-devel \
                libXScrnSaver-devel freetype-devel fontconfig-devel \
                cairo-devel pango-devel libicu-devel \
                nss-devel nspr-devel libxkbcommon-devel \
                libxkbcommon-x11-devel \
                libXrandr-devel libXcomposite-devel \
                libXdamage-devel libXi-devel libdrm-devel \
                libglvnd-devel

              dnf install -y libxkbfile-devel 2>/dev/null || echo 'libxkbfile-devel not found, continuing...'
              alternatives --set python3 /usr/bin/python3.9
              python3 --version

              echo '=== Step 10: Install Node.js 22.x ==='
              curl -fsSL https://rpm.nodesource.com/setup_22.x | bash -
              dnf install -y nodejs

              echo '=== Step 11: Install tsx (TypeScript Execute) ==='
              npm install -g tsx typescript

              echo '=== Step 12: Verify all versions ==='
              echo \"glibc: \$(ldd --version | head -1)\"
              echo \"Node.js: \$(node --version)\"
              echo \"npm: \$(npm --version)\"
              echo \"GCC: \$(gcc --version | head -1)\"
              echo \"Python3: \$(python3 --version)\"
              echo \"jq: \$(jq --version)\"

              echo '=== Step 13: Check for package-lock.json ==='
              if [ ! -f '/build/package-lock.json' ]; then
                echo '❌ package-lock.json NOT found!'
                echo 'Listing /build directory:'
                ls -la /build/
                exit 1
              fi
              echo '✅ package-lock.json found'

              echo '=== Step 14: Clear npm cache and install dependencies ==='
              source /opt/rh/gcc-toolset-11/enable
              export CC=/opt/rh/gcc-toolset-11/root/usr/bin/gcc
              export CXX=/opt/rh/gcc-toolset-11/root/usr/bin/g++
              export PYTHON=/usr/bin/python3.9
              cd /build

              npm cache clean --force

              echo 'Installing dependencies with npm ci (full install)...'
              npm ci --legacy-peer-deps

              echo '=== Step 15: Verify key dependencies ==='
              if [ -d 'node_modules/ternary-stream' ]; then
                echo '✅ ternary-stream installed'
              else
                echo '❌ ternary-stream missing, attempting to install manually...'
                npm install ternary-stream --save-dev
              fi

              echo '=== Step 16: Build VSCode using tsx (skip extension download) ==='
              source /opt/rh/gcc-toolset-11/enable
              export CC=/opt/rh/gcc-toolset-11/root/usr/bin/gcc
              export CXX=/opt/rh/gcc-toolset-11/root/usr/bin/g++
              export PYTHON=/usr/bin/python3.9

              # 关键：跳过内置扩展下载
              export VSCODE_SKIP_BUILTIN_EXTENSIONS_DOWNLOAD=1
              export VSCODE_MARKETPLACE_SERVICE_URL='https://marketplace.visualstudio.com/_apis/public/gallery'
              export VSCODE_MARKETPLACE_ITEM_URL='https://marketplace.visualstudio.com/items'

              cd /build

              echo 'Checking gulpfile:'
              ls -la gulpfile.* 2>/dev/null || echo 'No gulpfile found'

              echo 'Running gulp build using tsx (skipping extension download)...'
              NODE_OPTIONS=\"--max-old-space-size=8192\" \
                npx tsx ./node_modules/gulp/bin/gulp.js vscode-linux-x64

              echo '=== Step 17: Find and list build outputs ==='
              cd /build
              echo 'Searching for VSCode build outputs...'
              echo ''
              echo '=== Checking .build directory ==='
              ls -la .build/ 2>/dev/null || echo '.build directory not found'
              echo ''
              echo '=== Checking for VSCode* directories ==='
              find . -maxdepth 2 -name 'VSCode*' -type d 2>/dev/null
              echo ''
              echo '=== Checking for out* directories ==='
              find . -maxdepth 2 -name 'out*' -type d 2>/dev/null | head -10
              echo ''
              echo '=== Checking for .deb or .rpm packages ==='
              find . -name '*.deb' -o -name '*.rpm' 2>/dev/null

              echo '=== Step 18: Package artifacts ==='
              mkdir -p /build/artifacts
              cd /build

              if [ -d '.build/linux/x64' ]; then
                echo '✅ Found .build/linux/x64'
                tar -czf /build/artifacts/vscode-rocky8-glibc228.tar.gz -C .build/linux/x64 .
              elif [ -d 'VSCode-linux-x64' ]; then
                echo '✅ Found VSCode-linux-x64'
                tar -czf /build/artifacts/vscode-rocky8-glibc228.tar.gz -C VSCode-linux-x64 .
              elif [ -d 'out' ]; then
                echo '✅ Found out/ directory (partial build)'
                tar -czf /build/artifacts/vscode-rocky8-glibc228-out.tar.gz out/
              elif [ -f 'VSCode-linux-x64.deb' ]; then
                echo '✅ Found .deb package'
                cp VSCode-linux-x64.deb /build/artifacts/
              elif [ -f 'VSCode-linux-x64.rpm' ]; then
                echo '✅ Found .rpm package'
                cp VSCode-linux-x64.rpm /build/artifacts/
              else
                echo '⚠️ No build outputs found!'
                echo '=== Full directory listing for debugging ==='
                ls -la /build/
                echo ''
                echo '=== .build directory contents ==='
                ls -la .build/ 2>/dev/null || echo '.build not found'
                echo ''
                echo '=== All VSCode* files ==='
                find . -name 'VSCode*' 2>/dev/null | head -20
                echo ''
                echo '=== All .deb and .rpm files ==='
                find . -name '*.deb' -o -name '*.rpm' 2>/dev/null
                echo 'BUILD_FAILED_NO_OUTPUT' > /build/artifacts/ERROR.txt
                echo 'Check the build logs above for errors.' >> /build/artifacts/ERROR.txt
              fi

              echo '=== Step 19: Build summary ==='
              echo 'Artifacts directory contents:'
              ls -lh /build/artifacts/
            "

      - name: Upload build artifacts
        uses: actions/upload-artifact@v7
        with:
          name: vscode-linux-x64-uos-glibc228
          path: artifacts/
          if-no-files-found: warn
          retention-days: 7