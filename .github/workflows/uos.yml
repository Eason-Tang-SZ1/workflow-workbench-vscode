name: Build VSCode for UOS (glibc 2.28)

on:
  workflow_dispatch:  # 手动触发

jobs:
  build-for-uos:
    runs-on: ubuntu-20.04
    steps:
      - name: Checkout VSCode source
        uses: actions/checkout@v6
        with:
          lfs: false
          # 建议固定版本以确保兼容性
          ref: 'refs/tags/1.95.0'  # 或选择其他稳定版本

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'  # 明确指定Node版本，而非从.nvmrc读取
          cache: 'yarn'

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libxkbfile-dev \
            libkrb5-dev \
            libgbm-dev \
            rpm \
            libx11-dev \
            libxss-dev \
            libxtst-dev \
            libnss3-dev \
            libasound2-dev \
            libglib2.0-dev \
            libcairo2-dev

      - name: Set environment for older glibc compatibility
        run: |
          # 使用Ubuntu 20.04的glibc 2.31，但UOS是2.28
          # 需要确保二进制文件在2.28上运行
          echo "Building with compatibility flags..."
          echo "CXXFLAGS=-D_GLIBCXX_USE_CXX11_ABI=0" >> $GITHUB_ENV
          echo "LDFLAGS=-Wl,--allow-shlib-undefined" >> $GITHUB_ENV

      - name: Install Yarn and dependencies
        run: |
          npm install -g yarn@1.22.22  # 固定yarn版本
          yarn install --frozen-lockfile

      - name: Compile TypeScript
        run: |
          yarn compile-build
          yarn compile-extensions-build

      - name: Configure build for UOS compatibility
        run: |
          # 设置构建参数以确保在UOS上运行
          echo "Configuring build for UOS..."

      - name: Build VSCode Linux x64 with compatibility
        run: |
          export VSCODE_SKIP_PRELAUNCH=1
          # 使用min版本并添加兼容性标志
          yarn gulp vscode-linux-x64-min

      - name: Create UOS startup script
        run: |
          if [ -d "../VSCode-linux-x64" ]; then
            cd ../VSCode-linux-x64
          elif [ -d "./vscode-linux-x64" ]; then
            cd ./vscode-linux-x64
          else
            echo "Build output not found!"
            exit 1
          fi

          # 创建启动脚本，自动添加 --no-sandbox
          cat > run-vscode-uos.sh << 'EOF'
          #!/bin/bash
          # UOS专用启动脚本
          DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          "$DIR/code" --no-sandbox "$@"
          EOF

          chmod +x run-vscode-uos.sh

          # 创建桌面入口文件
          cat > vscode-uos.desktop << 'EOF'
          [Desktop Entry]
          Name=Visual Studio Code (UOS)
          Comment=Code Editing. Redefined.
          Exec=$DIR/run-vscode-uos.sh %F
          Icon=$DIR/resources/app/resources/linux/code.png
          Type=Application
          StartupNotify=true
          Categories=Development;IDE;
          MimeType=text/plain;inode/directory;
          Actions=new-window;

          [Desktop Action new-window]
          Name=New Window
          Exec=$DIR/run-vscode-uos.sh -n
          EOF

      - name: Package build artifacts
        run: |
          mkdir -p artifacts
          if [ -d "../VSCode-linux-x64" ]; then
            # 打包时包含启动脚本
            cd ..
            tar -czf vscode-for-uos.tar.gz VSCode-linux-x64/
            mv vscode-for-uos.tar.gz artifacts/
          elif [ -d "./vscode-linux-x64" ]; then
            tar -czf artifacts/vscode-for-uos.tar.gz vscode-linux-x64/
          else
            echo "ERROR: Build output not found!"
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: vscode-linux-x64-uos
          path: artifacts/vscode-for-uos.tar.gz
          retention-days: 30  # 设置保留天数