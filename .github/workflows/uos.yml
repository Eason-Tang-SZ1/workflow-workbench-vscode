name: Build VSCode for UOS (glibc 2.28)

on:
  workflow_dispatch:

jobs:
  build-for-uos:
    runs-on: ubuntu-20.04
    timeout-minutes: 90  # 设置合理超时

    steps:
      - name: Checkout VSCode source
        uses: actions/checkout@v6
        with:
          lfs: false
          fetch-depth: 1
          ref: 'refs/tags/1.95.0'

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '18.x'  # 使用LTS版本更稳定

      - name: Setup yarn cache
        id: yarn-cache
        run: echo "::set-output name=dir::$(yarn cache dir)"

      - name: Cache yarn packages
        uses: actions/cache@v4
        with:
          path: ${{ steps.yarn-cache.outputs.dir }}
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Cache node_modules
        uses: actions/cache@v4
        with:
          path: node_modules
          key: ${{ runner.os }}-node-modules-${{ hashFiles('yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-node-modules-

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            pkg-config \
            libgtk-3-dev \
            libxkbfile-dev \
            libkrb5-dev \
            libgbm-dev \
            rpm \
            libx11-dev \
            libxss-dev \
            libxtst-dev \
            libnss3-dev \
            libasound2-dev

      - name: Install yarn and dependencies
        run: |
          npm install -g yarn@1.22.19
          # 使用更激进的网络超时设置
          yarn config set network-timeout 600000
          yarn install --frozen-lockfile --network-timeout 600000

      - name: Compile TypeScript
        run: |
          # 使用并行编译加速
          yarn compile-build
          yarn compile-extensions-build

      - name: Build VSCode (optimized)
        run: |
          export VSCODE_SKIP_PRELAUNCH=1
          # 使用更多的内存
          export NODE_OPTIONS="--max-old-space-size=4096"
          # 只构建Linux版本
          yarn gulp vscode-linux-x64-min

      - name: Create UOS startup script
        run: |
          # 查找构建输出
          BUILD_PATHS=("../VSCode-linux-x64" "./vscode-linux-x64")
          BUILD_FOUND=""

          for path in "${BUILD_PATHS[@]}"; do
            if [ -d "$path" ]; then
              BUILD_FOUND="$path"
              break
            fi
          done

          if [ -z "$BUILD_FOUND" ]; then
            echo "Build output not found!"
            find . -name "VSCode-linux-x64" -type d 2>/dev/null || echo "No VSCode directory found"
            exit 1
          fi

          cd "$BUILD_FOUND"

          # 创建UOS启动脚本
          cat > run-uos.sh << 'EOF'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          # 尝试多种启动参数组合
          "$SCRIPT_DIR/code" --no-sandbox --disable-gpu-sandbox --disable-software-rasterizer "$@"
          EOF
          chmod +x run-uos.sh

          echo "UOS startup script created in $BUILD_FOUND"

      - name: Package artifacts
        run: |
          mkdir -p artifacts

          # 查找构建目录
          BUILD_DIR=""
          if [ -d "../VSCode-linux-x64" ]; then
            BUILD_DIR="../VSCode-linux-x64"
            cd ..
          elif [ -d "./vscode-linux-x64" ]; then
            BUILD_DIR="./vscode-linux-x64"
          else
            echo "ERROR: Build output not found!"
            exit 1
          fi

          # 打包，排除不必要的文件以减小体积
          tar -czf artifacts/vscode-uos.tar.gz \
            --exclude='*.map' \
            --exclude='*.ts' \
            --exclude='node_modules/*' \
            "$BUILD_DIR" 2>/dev/null || tar -czf artifacts/vscode-uos.tar.gz "$BUILD_DIR"

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: vscode-uos
          path: artifacts/vscode-uos.tar.gz
          retention-days: 14