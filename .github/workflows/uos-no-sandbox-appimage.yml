  echo ""
    echo "=========================================="
    echo "[STEP] 创建 AppImage"
    echo "=========================================="

    VERSION="${VERSION:-1.116.0}"
    APPDIR="AppDir"
    rm -rf "$APPDIR"
    mkdir -p "$APPDIR"

    if [ ! -d "$BUILD_DIR" ]; then
  echo "❌ 构建目录不存在: $BUILD_DIR"
    exit 1
    fi

    echo "复制 $BUILD_DIR 到 $APPDIR..."
    cp -r "$BUILD_DIR"/* "$APPDIR/"

    # ========= 新增：彻底清理所有 .desktop 文件 =========
    echo "🔧 清理所有 .desktop 文件..."
    # 删除 AppDir 根目录下的 .desktop 文件
    rm -f "$APPDIR"/*.desktop 2>/dev/null || true
    # 删除 AppDir/bin 目录下的 .desktop 文件（如果存在）
    rm -f "$APPDIR"/bin/*.desktop 2>/dev/null || true
    # 递归查找并删除所有 .desktop 文件（安全措施）
    find "$APPDIR" -type f -name "*.desktop" -delete 2>/dev/null || true
    echo "✅ 已删除所有 .desktop 文件"
    # =================================================

    # 创建新的正确的 .desktop 文件
    cat > "$APPDIR/custom-vscode.desktop" << 'CUSTOM_DESKTOP_EOF'
    [Desktop Entry]
    Version=1.0
    Type=Application
    Name=VSCode for UOS
    Comment=Custom Visual Studio Code for UOS
    Exec=AppRun %F
    Icon=code
    Terminal=false
    Categories=Development;IDE
    StartupNotify=true
    StartupWMClass=Code
    CUSTOM_DESKTOP_EOF
    echo "✅ 已创建正确的 custom-vscode.desktop 文件"

  # ... (后续图标复制和 appimagetool 命令保持不变) ...