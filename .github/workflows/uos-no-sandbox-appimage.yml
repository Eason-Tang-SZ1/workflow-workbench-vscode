name: Build Custom VSCode for UOS (AppImage + Double-click)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: true
        default: 'main'
      version:
        description: 'Package version'
        required: false
        default: '1.116.0'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 150

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch }}
          fetch-depth: 1

      - name: 📄 Create build script
        run: |
          mkdir -p .github/scripts
          cat > .github/scripts/build-in-docker.sh << 'EOF'
          #!/bin/bash
          set -e

          echo ""
          echo "=========================================="
          echo "[STEP] 安装系统依赖"
          echo "=========================================="
          dnf install -y wget curl epel-release git gcc-c++ make pkg-config \
            libX11-devel libXScrnSaver-devel libXtst-devel krb5-devel \
            gtk3-devel nss-devel alsa-lib-devel python3 rpm-build fuse fuse-libs which upx findutils \
            || echo "[WARN] 部分包安装失败"

          export PATH="/usr/bin:$PATH"
          git --version || echo "git 未找到"

          echo ""
          echo "=========================================="
          echo "[STEP] 安装 Node.js 22"
          echo "=========================================="
          curl -fsSL https://rpm.nodesource.com/setup_22.x | bash -
          dnf install -y nodejs
          node --version
          npm --version

          echo ""
          echo "=========================================="
          echo "[STEP] 安装 yarn 和 tsx"
          echo "=========================================="
          npm install -g yarn tsx

          echo ""
          echo "=========================================="
          echo "[STEP] 安装 AppImage 工具"
          echo "=========================================="
          curl -L -o /usr/local/bin/appimagetool "https://github.com/AppImage/AppImageKit/releases/download/continuous/appimagetool-x86_64.AppImage"
          chmod +x /usr/local/bin/appimagetool

          echo ""
          echo "=========================================="
          echo "[STEP] 创建占位 prebuilt-extensions 目录"
          echo "=========================================="
          if [ ! -d "prebuilt-extensions" ]; then
            mkdir -p prebuilt-extensions
            echo "✅ 创建了空的 prebuilt-extensions 目录"
          else
            echo "✅ prebuilt-extensions 已存在"
          fi

          echo ""
          echo "=========================================="
          echo "[STEP] 修复 package.json"
          echo "=========================================="
          echo 'console.log("OK");' > build/npm/preinstall.js
          sed -i 's/"preinstall": "node build\/npm\/preinstall.ts"/"preinstall": "node build\/npm\/preinstall.js"/' package.json
          echo 'console.log("OK");' > build/npm/postinstall.js
          sed -i 's/"postinstall": "node build\/npm\/postinstall.ts"/"postinstall": "node build\/npm\/postinstall.js"/' package.json

          python3 -c '
          import json
          with open("package.json", "r") as f:
              data = json.load(f)
          if data.get("type") == "module":
              del data["type"]
              with open("package.json", "w") as f:
                  json.dump(data, f, indent=2)
              print("✅ 已移除 type: module")
          '

          echo ""
          echo "=========================================="
          echo "[STEP] 安装依赖 (yarn)"
          echo "=========================================="
          export npm_config_parcel_watcher_skip_build=true
          export PARCEL_WATCHER_SKIP_BUILD=true
          export SKIP_NATIVE_MODULES=true

          rm -f package-lock.json
          yarn install --ignore-scripts --network-timeout 600000 --ignore-engines

          echo ""
          echo "=========================================="
          echo "[STEP] 安装 gulp 相关依赖"
          echo "=========================================="
          yarn add -D --ignore-engines \
            gulp gulp-typescript gulp-sourcemaps gulp-merge-json \
            gulp-tsb gulp-filter gulp-rename gulp-sort gulp-uglify \
            gulp-concat gulp-clean gulp-if gulp-replace gulp-json-editor \
            ternary-stream vscode-gulp-watch del esbuild jsonc-parser

          echo ""
          echo "=========================================="
          echo "[STEP] 创建构建目录"
          echo "=========================================="
          mkdir -p .build/telemetry .build/extensions out out-vscode

          echo ""
          echo "=========================================="
          echo "[STEP] 修复 product.json"
          echo "=========================================="
          if [ -f "product.json" ]; then
            python3 -c '
          import json
          with open("product.json", "r") as f:
              data = json.load(f)
          data["enableCrashReport"] = False
          data["crashReporter"] = {"disabled": True}
          data["extensionsGallery"] = {
              "serviceUrl": "",
              "itemUrl": "",
              "controlUrl": "",
              "recommendationUrl": ""
          }
          with open("product.json", "w") as f:
              json.dump(data, f, indent=2)
          print("✅ product.json 已修改")
          '
          fi

          echo ""
          echo "=========================================="
          echo "[STEP] 替换 fetch.ts"
          echo "=========================================="
          mkdir -p build/lib
          cat > build/lib/fetch.ts << 'FETCH_TS_EOF'
          import { Stream } from "stream";
          export async function fetchUrl(url: string): Promise<Buffer> {
            console.log(`⚠️ fetchUrl: 跳过下载 ${url}`);
            return Buffer.from("");
          }
          export async function fetchUrls(urls: string[], options: any): Promise<void> {
            console.log("⚠️ fetchUrls: 跳过所有扩展下载");
            return Promise.resolve();
          }
          export async function fetchText(url: string): Promise<string> {
            console.log(`⚠️ fetchText: 跳过下载 ${url}`);
            return "";
          }
          export async function fetchJson(url: string): Promise<any> {
            console.log(`⚠️ fetchJson: 跳过下载 ${url}`);
            return {};
          }
          export function createStream(stream: any): Stream {
            return stream;
          }
          FETCH_TS_EOF

          echo ""
          echo "=========================================="
          echo "[STEP] 替换 extensions.ts"
          echo "=========================================="
          cat > build/lib/extensions.ts << 'EXTENSIONS_TS_EOF'
          import { Stream } from "stream";
          const empty: any[] = [];
          function emptyStream(): Stream {
            const s = new Stream.Readable();
            s._read = () => s.push(null);
            return s;
          }
          export function isWebExtension(): boolean { return false; }
          export function getExtensionStream(): Stream { return emptyStream(); }
          export function getExtensionDownloadStream(): Stream { return emptyStream(); }
          export function packageMarketplaceExtensionsStream(): Stream { return emptyStream(); }
          export function packageNativeLocalExtensionsStream(): Stream { return emptyStream(); }
          export function packageNonNativeLocalExtensionsStream(): Stream { return emptyStream(); }
          export function packageLocalExtensionsStream(): Stream { return emptyStream(); }
          export function packageExtensionsStream(): Stream { return emptyStream(); }
          export function packageCopilotExtensionStream(): Stream { return emptyStream(); }
          export function packageCopilotChatExtensionStream(): Stream { return emptyStream(); }
          export function packageCopilotAgentsExtensionStream(): Stream { return emptyStream(); }
          export function fromMarketplace(): any[] { return empty; }
          export async function fetchUrls(urls: string[], options: any): Promise<void> {
            console.log("⚠️ fetchUrls: disabled");
            return Promise.resolve();
          }
          export function buildExtensionMedia(): void {}
          export function compileExtensionMedia(): void {}
          export function buildExtensionMediaTask(done: any): void { done(); }
          export const builtInExtensions = empty;
          export const shouldDownloadBuiltInExtensions = false;
          export const webBuiltInExtensions = empty;
          export const shouldDownloadWebBuiltInExtensions = false;
          EXTENSIONS_TS_EOF

          echo ""
          echo "=========================================="
          echo "[STEP] 替换 builtInExtensions.ts"
          echo "=========================================="
          cat > build/lib/builtInExtensions.ts << 'BIE_EOF'
          export const builtInExtensions: any[] = [];
          export const shouldDownloadBuiltInExtensions = false;
          export const webBuiltInExtensions: any[] = [];
          export const shouldDownloadWebBuiltInExtensions = false;
          BIE_EOF

          echo ""
          echo "=========================================="
          echo "[STEP] 替换 copilot.ts"
          echo "=========================================="
          cat > build/lib/copilot.ts << 'COPILOT_EOF'
          export async function prepareBuiltInCopilotExtensionShims(extRoot: string): Promise<void> {
              console.log("⚠️ Copilot extension shims preparation skipped for UOS build");
              return;
          }
          export function copyCopilotNativeDeps(productRoot: string): void {
              console.log("⚠️ Copilot native deps copy skipped for UOS build");
          }
          export function getCopilotExcludeFilter(): any {
              return function() { return false; };
          }
          COPILOT_EOF

          echo ""
          echo "=========================================="
          echo "[STEP] 禁用 Crashpad"
          echo "=========================================="
          mkdir -p src/vs/platform/crash/common
          cat > src/vs/platform/crash/common/crashService.ts << 'CRASH_EOF'
          /*---------------------------------------------------------------------------------------------
           *  Copyright (c) Microsoft Corporation. All rights reserved.
           *  Licensed under the MIT License. See License.txt in the project root for license information.
           *--------------------------------------------------------------------------------------------*/
          // DISABLED: Crash service for UOS build
          import { createDecorator } from "../../../base/common/instantiation.js";
          export const ICrashService = createDecorator<ICrashService>("crashService");
          export interface ICrashService { _serviceBrand: undefined; }
          export class CrashService implements ICrashService {
              declare readonly _serviceBrand: undefined;
              constructor() { console.log("⚠️ Crash service disabled for UOS build"); }
          }
          CRASH_EOF

          if [ -f "src/vs/workbench/electron-main/electron-main.ts" ]; then
            sed -i '/crashReporter\.start/s/^/\/\/ DISABLED: /' src/vs/workbench/electron-main/electron-main.ts
          fi

          echo ""
          echo "=========================================="
          echo "[STEP] 构建 VSCode (使用完整构建命令)"
          echo "=========================================="
          export NODE_OPTIONS="--max-old-space-size=8192"
          export VSCODE_SKIP_BUILTIN_EXTENSION_DOWNLOAD=1
          export VSCODE_ELECTRON_SKIP_DOWNLOAD=1
          export VSCODE_SKIP_PRELAUNCH=1
          export VSCODE_SKIP_BUNDLED_EXTENSIONS=1
          export PATH="/usr/bin:$PATH"

          if [ ! -f "node_modules/gulp/bin/gulp.js" ]; then
            echo "❌ gulp 未安装！"
            exit 1
          fi
          echo "✅ gulp 存在"

          echo "开始构建，时间: $(date)"
          set +e
          npx tsx node_modules/gulp/bin/gulp.js vscode-linux-x64 --no-color 2>&1
          GULP_EXIT_CODE=$?
          set -e

          echo "gulp 退出码: $GULP_EXIT_CODE"

          if [ $GULP_EXIT_CODE -ne 0 ] && [ $GULP_EXIT_CODE -ne 1 ]; then
            echo "❌ gulp 异常退出: $GULP_EXIT_CODE"
            exit 1
          fi

          echo "✅ gulp 执行完成，时间: $(date)"

          echo ""
          echo "=========================================="
          echo "[STEP] 📂 查找构建产物"
          echo "=========================================="

          BUILD_DIR=""
          for dir in ./VSCode-linux-x64 ./vscode/VSCode-linux-x64 ../VSCode-linux-x64; do
            if [ -d "$dir" ]; then
              if [ -f "$dir/code" ] || [ -f "$dir/bin/code" ] || [ -f "$dir/tscode" ]; then
                BUILD_DIR="$dir"
                echo "✅ 找到可执行构建目录: $BUILD_DIR"
                break
              else
                echo "⚠️ 目录存在但没有可执行文件: $dir"
              fi
            fi
          done

          if [ -z "$BUILD_DIR" ] && [ -d "out-vscode" ]; then
            echo "从 out-vscode 创建 VSCode-linux-x64..."
            mkdir -p VSCode-linux-x64
            cp -r out-vscode/* VSCode-linux-x64/
            cp -r resources VSCode-linux-x64/ 2>/dev/null || true
            cp -r extensions VSCode-linux-x64/ 2>/dev/null || true
            cp -r node_modules VSCode-linux-x64/ 2>/dev/null || true
            cat > VSCode-linux-x64/code << 'CODE_EOF'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          exec "$SCRIPT_DIR/node_modules/electron/dist/electron" "$SCRIPT_DIR" "$@"
          CODE_EOF
            chmod +x VSCode-linux-x64/code
            BUILD_DIR="VSCode-linux-x64"
            echo "✅ 从 out-vscode 创建了构建目录"
          fi

          if [ -z "$BUILD_DIR" ]; then
            echo "❌ 找不到构建产物!"
            echo "当前目录内容:"
            ls -la
            exit 1
          fi

          echo ""
          echo "=========================================="
          echo "[STEP] 📦 精简 node_modules"
          echo "=========================================="
          if [ -d "$BUILD_DIR/node_modules" ]; then
            echo "精简前大小: $(du -sh $BUILD_DIR/node_modules | cut -f1)"
            /usr/bin/find "$BUILD_DIR/node_modules" -name "*.test.js" -o -name "*.spec.js" -type f -delete 2>/dev/null || true
            /usr/bin/find "$BUILD_DIR/node_modules" -name "test" -o -name "tests" -o -name "example" -o -name "examples" -type d -exec rm -rf {} + 2>/dev/null || true
            /usr/bin/find "$BUILD_DIR/node_modules" -name "*.ts" -not -name "*.d.ts" -type f -delete 2>/dev/null || true
            /usr/bin/find "$BUILD_DIR/node_modules" -name "README.md" -o -name "CHANGELOG.md" -o -name "LICENSE" -type f -delete 2>/dev/null || true
            /usr/bin/find "$BUILD_DIR/node_modules" -name "*.map" -type f -delete 2>/dev/null || true
            echo "精简后大小: $(du -sh $BUILD_DIR/node_modules | cut -f1)"
            echo "✅ node_modules 已精简"
          fi

          echo ""
          echo "=========================================="
          echo "[STEP] 创建启动脚本"
          echo "=========================================="
          cd "$BUILD_DIR"

          REAL_EXEC=""
          for name in code code-oss tscode; do
            if [ -f "./$name" ]; then
              REAL_EXEC="$name"
              echo "找到可执行文件: ./$name"
              break
            elif [ -f "./bin/$name" ]; then
              REAL_EXEC="./bin/$name"
              echo "找到可执行文件: ./bin/$name"
              break
            fi
          done

          if [ -z "$REAL_EXEC" ] && [ -f "node_modules/electron/dist/electron" ]; then
            REAL_EXEC="node_modules/electron/dist/electron"
            echo "使用 electron: $REAL_EXEC"
          fi

          if [ -z "$REAL_EXEC" ]; then
            echo "❌ 找不到可执行文件!"
            echo "当前目录内容:"
            ls -la
            exit 1
          fi

          if [ -f "$REAL_EXEC" ]; then
            mv "$REAL_EXEC" "${REAL_EXEC}.real" 2>/dev/null || true
            echo "已备份真实可执行文件: ${REAL_EXEC}.real"
          fi

          WRAPPER_NAME="$(basename "$REAL_EXEC")"
          cat > "$WRAPPER_NAME" << 'WRAPPER_EOF'
          #!/bin/bash
          SCRIPT_DIR="$(cd "$(dirname "${BASH_SOURCE[0]}")" && pwd)"
          export ELECTRON_ENABLE_GPU=0
          export LIBGL_ALWAYS_SOFTWARE=1
          export NODE_OPTIONS="--max-old-space-size=4096"
          export ELECTRON_DISABLE_SANDBOX=1
          export GDK_BACKEND=x11
          export QT_QPA_PLATFORM=xcb
          export DISPLAY=:0
          export ELECTRON_DISABLE_CRASH_REPORTER=1
          export ELECTRON_DISABLE_CRASH_REPORTING=1
          export CRASHPAD_DISABLE=1

          if [ -f "$SCRIPT_DIR/tscode.real" ]; then
            EXEC="$SCRIPT_DIR/tscode.real"
          elif [ -f "$SCRIPT_DIR/bin/tscode.real" ]; then
            EXEC="$SCRIPT_DIR/bin/tscode.real"
          elif [ -f "$SCRIPT_DIR/code.real" ]; then
            EXEC="$SCRIPT_DIR/code.real"
          elif [ -f "$SCRIPT_DIR/bin/code.real" ]; then
            EXEC="$SCRIPT_DIR/bin/code.real"
          elif [ -f "$SCRIPT_DIR/code-oss.real" ]; then
            EXEC="$SCRIPT_DIR/code-oss.real"
          elif [ -f "$SCRIPT_DIR/bin/code-oss.real" ]; then
            EXEC="$SCRIPT_DIR/bin/code-oss.real"
          elif [ -f "$SCRIPT_DIR/node_modules/electron/dist/electron.real" ]; then
            exec "$SCRIPT_DIR/node_modules/electron/dist/electron.real" "$SCRIPT_DIR" --no-sandbox --disable-gpu-sandbox --disable-software-rasterizer --disable-gpu --user-data-dir="$SCRIPT_DIR/user-data" "$@"
          else
            echo "❌ 找不到可执行文件！"
            exit 1
          fi

          exec "$EXEC" --no-sandbox --disable-gpu-sandbox --disable-software-rasterizer --disable-gpu --user-data-dir="$SCRIPT_DIR/user-data" "$@"
          WRAPPER_EOF
          chmod +x "$WRAPPER_NAME"
          echo "✅ 包装器已创建: $WRAPPER_NAME"

          echo "✅ 启动脚本创建完成"
          cd "$OLDPWD"

          echo ""
          echo "=========================================="
          echo "[STEP] 创建 AppImage"
          echo "=========================================="

          VERSION="${VERSION:-1.116.0}"
          APPDIR="AppDir"
          rm -rf "$APPDIR"
          mkdir -p "$APPDIR"

          if [ ! -d "$BUILD_DIR" ]; then
            echo "❌ 构建目录不存在: $BUILD_DIR"
            exit 1
          fi

          echo "复制 $BUILD_DIR 到 $APPDIR..."
          cp -r "$BUILD_DIR"/* "$APPDIR/"

          echo "🔧 清理 .desktop 文件..."
          rm -f "$APPDIR"/*.desktop 2>/dev/null || true
          rm -f "$APPDIR"/bin/*.desktop 2>/dev/null || true
          echo "✅ 已删除 .desktop 文件"

          cat > "$APPDIR/AppRun" << 'APP_RUN_EOF'
          #!/bin/bash
          SELF=$(readlink -f "$0")
          HERE=${SELF%/*}
          export ELECTRON_ENABLE_GPU=0
          export LIBGL_ALWAYS_SOFTWARE=1
          export NODE_OPTIONS="--max-old-space-size=4096"
          export ELECTRON_DISABLE_SANDBOX=1
          export GDK_BACKEND=x11
          export QT_QPA_PLATFORM=xcb
          export DISPLAY=:0
          export ELECTRON_DISABLE_CRASH_REPORTER=1
          export ELECTRON_DISABLE_CRASH_REPORTING=1
          export CRASHPAD_DISABLE=1

          EXEC=""
          if [ -f "$HERE/tscode.real" ]; then
            EXEC="$HERE/tscode.real"
          elif [ -f "$HERE/code.real" ]; then
            EXEC="$HERE/code.real"
          elif [ -f "$HERE/code-oss.real" ]; then
            EXEC="$HERE/code-oss.real"
          elif [ -f "$HERE/bin/tscode.real" ]; then
            EXEC="$HERE/bin/tscode.real"
          elif [ -f "$HERE/bin/code.real" ]; then
            EXEC="$HERE/bin/code.real"
          elif [ -f "$HERE/node_modules/electron/dist/electron.real" ]; then
            exec "$HERE/node_modules/electron/dist/electron.real" "$HERE" --no-sandbox --disable-gpu-sandbox --disable-software-rasterizer --disable-gpu --user-data-dir="$HERE/user-data" "$@"
          fi

          if [ -z "$EXEC" ]; then
            for name in tscode code code-oss; do
              [ -f "$HERE/$name" ] && { EXEC="$HERE/$name"; break; }
              [ -f "$HERE/bin/$name" ] && { EXEC="$HERE/bin/$name"; break; }
            done
          fi

          if [ -z "$EXEC" ] || [ ! -f "$EXEC" ]; then
            echo "❌ 找不到 VSCode 可执行文件！"
            exit 1
          fi

          echo "🚀 启动: $EXEC"
          exec "$EXEC" --no-sandbox --disable-gpu-sandbox --disable-software-rasterizer --disable-gpu --user-data-dir="$HERE/user-data" "$@"
          APP_RUN_EOF
          chmod +x "$APPDIR/AppRun"

          cat > "$APPDIR/custom-vscode.desktop" << 'CUSTOM_DESKTOP_EOF'
          [Desktop Entry]
          Version=1.0
          Type=Application
          Name=VSCode for UOS
          Comment=Custom Visual Studio Code for UOS
          Exec=AppRun %F
          Icon=code
          Terminal=false
          Categories=Development;IDE
          StartupNotify=true
          StartupWMClass=Code
          CUSTOM_DESKTOP_EOF

          echo "🔧 确保图标文件存在..."
          ICON_SOURCES=(
            "$APPDIR/resources/app/resources/linux/code.png"
            "$APPDIR/resources/app/linux/code.png"
            "$BUILD_DIR/resources/app/resources/linux/code.png"
            "$BUILD_DIR/resources/app/linux/code.png"
          )
          ICON_COPIED=false
          for src in "${ICON_SOURCES[@]}"; do
            if [ -f "$src" ]; then
              echo "找到图标: $src"
              cp "$src" "$APPDIR/code.png"
              ICON_COPIED=true
              echo "✅ 图标已复制到 $APPDIR/code.png"
              break
            fi
          done

          if [ "$ICON_COPIED" = false ]; then
            echo "⚠️ 未找到图标，创建占位图标..."
            echo "iVBORw0KGgoAAAANSUhEUgAAAIAAAACACAYAAADDPmHLAAAABHNCSVQICAgIfAhkiAAAAAlwSFlzAAALEwAACxMBAJqcGAAAABl0RVh0U29mdHdhcmUAd3d3Lmlua3NjYXBlLm9yZ5vuPBoAAABSSURBVHic7c2xDQAgDAPBzP/tPEGDhsK6U5hZcI6T9jIAAAAAAAAAAAAAAIDfuQD0k9M/U/d6+gCgd9n7Pn0A0Lvs9Z8+AOhd9npPHwD0Lvs9fQDQe+gCq69uS+oQh28AAAAASUVORK5CYII=" | base64 -d > "$APPDIR/code.png"
            echo "✅ 占位图标已创建"
          fi

          if [ -f "$APPDIR/code.png" ]; then
            echo "✅ 图标文件已就绪: $APPDIR/code.png"
          else
            echo "❌ 图标文件仍然缺失！"
            exit 1
          fi

          echo ""
          echo "=========================================="
          echo "[STEP] 生成 AppImage"
          echo "=========================================="
          export ARCH=x86_64
          echo "设置 ARCH=x86_64"

          echo "使用 appimagetool 打包..."
          if /usr/local/bin/appimagetool --no-appstream "$APPDIR" "custom-vscode-uos-${VERSION}.AppImage" 2>&1; then
            echo "appimagetool 执行成功"
          else
            echo "尝试提取模式..."
            /usr/local/bin/appimagetool --appimage-extract
            if [ -d "squashfs-root" ]; then
              ./squashfs-root/AppRun --no-appstream "$APPDIR" "custom-vscode-uos-${VERSION}.AppImage" 2>&1
            fi
          fi

          if [ ! -f "custom-vscode-uos-${VERSION}.AppImage" ]; then
            APPIMAGE_FILE=$(find . -maxdepth 1 -name "*.AppImage" 2>/dev/null | head -1)
            if [ -n "$APPIMAGE_FILE" ]; then
              echo "找到 AppImage: $APPIMAGE_FILE"
              mv "$APPIMAGE_FILE" "custom-vscode-uos-${VERSION}.AppImage"
            else
              echo "❌ AppImage 生成失败！"
              exit 1
            fi
          fi

          echo "✅ AppImage 生成成功"
          echo "📊 当前大小: $(du -h custom-vscode-uos-${VERSION}.AppImage | cut -f1)"

          mkdir -p artifacts
          mv "custom-vscode-uos-${VERSION}.AppImage" artifacts/

          echo ""
          echo "=========================================="
          echo "[STEP] 打包 tar.gz"
          echo "=========================================="
          if [ -d "$BUILD_DIR" ]; then
            cd "$(dirname "$BUILD_DIR")"
            tar -czf "$OLDPWD/artifacts/custom-vscode-uos-${VERSION}.tar.gz" --preserve-permissions "$(basename "$BUILD_DIR")" 2>/dev/null || echo "tar.gz 打包跳过"
            cd "$OLDPWD"
          fi

          echo ""
          echo "=========================================="
          echo "[SUCCESS] 构建完成"
          echo "=========================================="
          echo "产物列表:"
          ls -la artifacts/
          EOF

          chmod +x .github/scripts/build-in-docker.sh
          echo "✅ 构建脚本已创建"

      - name: 🐳 Run build in Docker
        run: |
          echo "=========================================="
          echo "🐳 运行 Rocky Linux 8 容器构建"
          echo "=========================================="

          docker run --rm \
            -v "$(pwd):/workspace" \
            --workdir /workspace \
            rockylinux:8 \
            /bin/bash /workspace/.github/scripts/build-in-docker.sh

      - name: 📤 Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: custom-vscode-uos
          path: |
            artifacts/custom-vscode-uos-*.tar.gz
            artifacts/custom-vscode-uos-*.AppImage
          retention-days: 30

      - name: 📊 Build summary
        if: always()
        run: |
          echo "=========================================="
          echo "📊 BUILD SUMMARY"
          echo "=========================================="
          echo "🟢 Status: ${{ job.status }}"
          echo "📦 Version: ${{ github.event.inputs.version || '1.116.0' }}"
          echo "=========================================="
          if [ "${{ job.status }}" == "success" ]; then
            VERSION="${{ github.event.inputs.version || '1.116.0' }}"
            echo "🎉 Build completed!"
            echo ""
            echo "📥 Download artifacts:"
            echo "  1. custom-vscode-uos-${VERSION}.AppImage (推荐)"
            echo "  2. custom-vscode-uos-${VERSION}.tar.gz (备选)"
            echo ""
            echo "📌 On UOS (no root needed):"
            echo "  AppImage: 直接双击运行"
            echo "  tar.gz: 解压后双击 tscode 运行"
          else
            echo "❌ Build failed!"
            echo "请检查日志中的错误信息"
          fi
          echo "=========================================="