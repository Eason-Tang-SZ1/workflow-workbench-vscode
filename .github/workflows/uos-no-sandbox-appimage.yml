name: Build Custom VSCode for UOS (AppImage + Double-click)

on:
  workflow_dispatch:
    inputs:
      branch:
        description: 'Branch to build'
        required: true
        default: 'main'
      version:
        description: 'Package version'
        required: false
        default: '1.116.0'

jobs:
  build:
    runs-on: ubuntu-22.04
    timeout-minutes: 120

    steps:
      - name: 📥 Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.inputs.branch }}
          fetch-depth: 1

      - name: 🐳 Build in Rocky Linux 8 container
        run: |
          echo "=========================================="
          echo "🐳 Rocky Linux 8 构建 (glibc 2.28)"
          echo "=========================================="

          # 确保脚本可执行
          chmod +x .github/scripts/build-in-docker.sh

          # 运行容器
          docker run --rm \
            -v "$(pwd):/workspace" \
            --workdir /workspace \
            rockylinux:8 \
            /bin/bash /workspace/.github/scripts/build-in-docker.sh

      - name: 📤 Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: custom-vscode-uos
          path: |
            artifacts/custom-vscode-uos-*.tar.gz
            artifacts/custom-vscode-uos-*.AppImage
          retention-days: 30

      - name: 📊 Build summary
        if: always()
        run: |
          echo "=========================================="
          echo "📊 BUILD SUMMARY"
          echo "=========================================="
          echo "🟢 Status: ${{ job.status }}"
          echo "📦 Version: ${{ github.event.inputs.version || '1.116.0' }}"
          echo "=========================================="
          if [ "${{ job.status }}" == "success" ]; then
            VERSION="${{ github.event.inputs.version || '1.116.0' }}"
            echo "🎉 Build completed!"
            echo ""
            echo "📥 Download artifacts:"
            echo "  1. custom-vscode-uos-${VERSION}.AppImage (推荐)"
            echo "  2. custom-vscode-uos-${VERSION}.tar.gz (备选)"
            echo ""
            echo "📌 On UOS (no root needed):"
            echo "  AppImage: 直接双击运行"
            echo "  tar.gz: 解压后双击 tscode 运行"
          else
            echo "❌ Build failed!"
            echo "请检查日志中的错误信息"
          fi
          echo "=========================================="